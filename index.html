    </button>`
  ).join('');

  // -- SORT CONTROLS --
  const sortHTML = ['priority','recent','name','phase'].map(s =>
    `<button onclick="_listSort='${s}';rList()"
      style="padding:4px 10px;border-radius:6px;border:1px solid ${_listSort===s?'var(--accent)':'var(--border)'};background:${_listSort===s?'rgba(13,155,138,.08)':'transparent'};color:${_listSort===s?'var(--accent)':'var(--muted)'};font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .15s">

  // -- PATIENT ROWS --

      const statusBadge = (() => {

      const priorLine = pr.level >= 2

      return `

          <div class="vela-pat-identity">
            <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
              <div style="font-family:var(--font-serif);font-size:16px;color:var(--ink);font-weight:400;letter-spacing:-.01em">${e(p.name||'Namnlös')}</div>

            ${priorLine}

          <!-- Status column -->
          <div class="vela-pat-status">

            <div style="font-size:10px;color:var(--muted);margin-top:3px">${(p.visits||[]).length} besök</div>
          </div>

          <!-- Quick action — appears on hover via CSS -->
          <div class="vela-pat-action" onclick="event.stopPropagation();${action.fn}">
            ${action.label}
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </div>
        </div>
      </div>`;
    }).join('') + `</div>`;
  }

  document.getElementById('s-list').innerHTML = `<div class="cx">
    <!-- Header -->
    <div style="display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap">
      <div>
        <div style="font-family:var(--font-serif);font-size:25px;color:var(--ink);font-weight:400;letter-spacing:-.02em">Patienter</div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px">${S.patients.length} registrerade${list.length < S.patients.length ? ' · ' + list.length + ' visas' : ''}</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input class="search-inp" placeholder="Sök namn eller diagnos..." value="${e(S.search)}"
          oninput="S.search=this.value;rList()"
          style="width:220px;margin-bottom:0">
        <button class="btn btn-p" onclick="newPat()">+ Ny patient</button>
      </div>
    </div>

    <!-- Smart filters -->
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      ${filterHTML}

    <!-- Sort -->
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px;align-items:center">
      <span style="font-size:11px;color:var(--muted);margin-right:4px">Sortera:</span>

    ${rowsHTML}
  </div>`;
}

// -- PHASE MANAGEMENT ----------------------------------------------------------
function getCurrentPhase(pat) {
  return pat.phase || 1;
}

function setPhase(phaseId) {
  if (!S.pat) return;
  const cur = getCurrentPhase(S.pat);
  if (phaseId < cur) {
    // Downgrade -- ask for confirmation
    if (!confirm(`Justera ner till Fas ${phaseId}? Patienten återgår till en tidigare fas.`)) return;
  }
  S.pat = savePat({...S.pat, phase: phaseId});
  rDetail();
}

function getPhasePromptAddition(phase) {
  const additions = {
    1: `\n\nBEHANDLINGSFAS: Fas 1 -- Smärtlindring
Fokusera på: smärtlindrande övningar, lätt rörlighetsträning, avlastning, andning och avspänning.
UNDVIK: tung belastning, uthållighetsövningar, styrkeövningar.
Övningarna ska vara skonsamma, 0-3 NRS under och efter träning.`,
    2: `\n\nBEHANDLINGSFAS: Fas 2 -- Stabilisering
Fokusera på: muskelstyrka, neuromuskulär kontroll, stabilisering, funktionella rörelsemönster.
Progressiv belastning är OK. Inkludera proprioception och balansövningar.
Bygga upp kapacitet steg för steg.`,
    3: `\n\nBEHANDLINGSFAS: Fas 3 -- Underhåll & friskvård
Fokusera på: upprätthålla styrka och rörlighet, förebygga återfall, generell friskvård.
Varierande träning, aerob kondition, livsstilsråd för långsiktig hälsa.
Patienten ska kunna självhantera.`
  };
  return additions[phase] || '';
}

function renderPhaseBar(pat) {
  const cur = getCurrentPhase(pat);
  const ph = PHASES[cur-1];
  const next = PHASES[cur];
  const lastVisit = pat.visits && pat.visits[0];
  const lastDate = lastVisit && lastVisit.date;
  const fw = lastVisit && lastVisit.form && lastVisit.form.followup;
  let nextDue = '';
  if (lastDate && fw) {
    const d = new Date(lastDate); d.setDate(d.getDate() + fw*7);
    nextDue = d.toLocaleDateString('sv-SE', {day:'numeric',month:'short'});
  }
  const steps = PHASES.map(p => {
    const done = p.id < cur;
    const active = p.id === cur;
    const dotBg = active ? p.color : done ? 'var(--teal)' : 'var(--border)';
    const labelColor = active ? 'var(--navy)' : done ? 'var(--teal)' : 'var(--text3)';
    const weight = active ? '700' : '400';
    return `<div onclick="setPhase(${p.id})" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex:1">
      <div style="width:10px;height:10px;border-radius:50%;background:${dotBg};transition:background .15s"></div>
      <div style="font-size:9px;font-weight:${weight};color:${labelColor};text-align:center;letter-spacing:.04em">${p.label}</div>
    </div>`;
  });
  const connectors = `<div style="position:absolute;top:5px;left:calc(50%/3 + 5px);right:calc(50%/3 + 5px);height:1px;background:var(--border);z-index:0"></div>`;

  const back = cur > 1
    ? `<button class="btn" style="font-size:10px;padding:3px 9px;flex-shrink:0;color:var(--text3)" onclick="setPhase(${cur-1})"><- ${PHASES[cur-2].label}</button>`
    : '';
  const advance = next
    ? `<button class="btn btn-p" style="font-size:10px;padding:3px 9px;flex-shrink:0" onclick="setPhase(${next.id})">-> ${next.label}</button>`
    : `<span style="font-size:10px;color:var(--green);font-weight:600">Slutförd</span>`;

  return `<div style="background:${ph.bg};border:1px solid ${ph.color}22;border-radius:10px;padding:10px 14px;margin-bottom:12px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div>
        <span style="display:inline-block;background:${ph.color};color:white;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 8px;border-radius:4px;margin-right:7px">${ph.label}</span>
        <span style="font-size:13px;font-weight:600;color:${ph.color}">${ph.name}</span>
        ${nextDue?`<span style="font-size:11px;color:var(--text3);margin-left:8px">Återbesök ${nextDue}</span>`:''}
      </div>
      <div style="display:flex;gap:5px">${back}${advance}</div>
    </div>
    <div style="position:relative;display:flex;gap:0">${connectors}${steps.join('')}</div>
  </div>`;
}

            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            Remissunderlag
          </button>`:''}
          ${hasVisits?`<button class="det-action-btn" id="prog-btn-${p.id}" onclick="showProgressNote('${p.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            Patientanalys
          </button>`:''}
          <button class="det-action-btn" onclick="go('editpat')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Redigera patient
          </button>
          <button class="det-action-btn" onclick="go('patjournal')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Exportera journal
          </button>
          <button class="det-action-btn danger" onclick="confDel('pat','${p.id}','${e(p.name||"patienten")}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            Radera patient
          </button>
        </div>
      </div>
    </div>`;

  // ── ONBOARDING GUIDE (only if incomplete) ──────────────────────────────────
  const hasPlan2 = (p.visits||[]).some(v => v.plan);
  const hasSoap2 = (p.visits||[]).some(v => v.soap?.S || v.note);
  const onboardSteps = [
    { done: true,     label: 'Patient registrerad',      action: null },
    { done: hasSoap2, label: 'Journalanteckning skapad', action: 'startManualSOAP()' },
    { done: hasPlan2, label: 'Hael-plan genererad',      action: 'newVisit()' },
    { done: hasPlan2, label: 'Hael-länk skickad',        action: hasPlan2 ? "go('doc')" : null },
  ];
  const allDone = onboardSteps.every(s => s.done);
  const nextStep = onboardSteps.find(s => !s.done);

  // ── PATIENT HEADER (compact) ────────────────────────────────────────────────
  const patHeader = `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px">
      <div style="flex:1;min-width:0">
        <div style="font-family:var(--font-serif,serif);font-size:22px;color:var(--ink);font-weight:400;letter-spacing:-.01em;line-height:1.2">${e(p.name||"Namnlös")}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:3px">${p.birthdate||""}${age&&!isNaN(age)?' · '+age+' år':''}</div>
        ${diagHtml}
      </div>
      <div style="text-align:right;flex-shrink:0">
        ${totalRevenue ? `<div style="font-size:11px;color:var(--muted)">Intäkter</div><div style="font-size:15px;font-weight:700;color:var(--ink)">${totalRevenue.toLocaleString('sv-SE')} kr</div>` : ''}
        <div style="font-size:11px;color:var(--muted);margin-top:4px">${(p.visits||[]).length} besök</div>
        ${latestVisit?.date ? `<div style="font-size:11px;color:var(--muted)">Senast ${latestVisit.date}</div>` : ''}
      </div>
    </div>
    ${p.phone||p.email ? `<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px;font-size:12px;color:var(--muted)">
      ${p.phone?`<span>📞 ${e(p.phone)}</span>`:''}
      ${p.email?`<span>✉ ${e(p.email)}</span>`:''}
    </div>` : ''}`;

  // ── COLLAPSIBLE SECTION HELPER ──────────────────────────────────────────────
  function collapsible(id, label, content, defaultOpen=false, badge='') {
    const openAttr = defaultOpen ? 'open' : '';
    return `<details class="det-collapsible" id="${id}" ${openAttr}>
      <summary class="det-collapsible-hdr">
        <span class="det-collapsible-label">${label}</span>
        ${badge ? `<span class="det-collapsible-badge">${badge}</span>` : ''}
        <svg class="det-collapsible-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      </summary>
      <div class="det-collapsible-body">${content}</div>
    </details>`;
  }

  // ── ASSEMBLE MAIN CONTENT ───────────────────────────────────────────────────
  let h = '';

  // 1. Patient header — always first
  h += patHeader;

  // 2. Briefing (AI, async — loads after render)
  if (hasVisits && getKey()) {
    h += renderBriefingShell(p.id);
  }

  // 3. Onboarding guide (only until complete)
  if (!allDone) {
    h += renderOnboardingGuide(p, onboardSteps, nextStep);
  }

  // 4. Besökshistorik — open if has visits
  const visitContent = !hasVisits
    ? `<div style="font-size:13px;color:var(--muted);padding:16px 0;text-align:center">Inga besök ännu. <a href="#" onclick="newVisit();return false" style="color:var(--teal)">Skapa första besöket</a></div>`
    : renderVisitTimeline(p) + renderPendingPlanApproval(p) + renderIntakeReviewPanel(p.id) + renderPainGraph(p) + renderPatientReportsPanel(p.id);
  h += collapsible('det-visits-'+p.id, 'Besökshistorik', visitContent, true,
    hasVisits ? String((p.visits||[]).length) : '');

  // 6. Meddelanden — collapsed, badge if unread
  h += collapsible(
    'det-msgs-'+p.id, 'Meddelanden', renderMsgPanel(p.id), false,
    unreadMsgs ? String(unreadMsgs) : ''
  );

  // 7. Aktivitetslogg — collapsed by default
  h += collapsible('det-log-'+p.id, 'Aktivitetslogg', renderActivityLog(p), false);

  // 7. Admin (samtycke + betalning) — collapsed
  const adminContent = renderConsentBlock(p) + renderPaymentBlock(p);
  h += collapsible('det-admin-'+p.id, 'Samtycke & betalning', adminContent, false);

  // Briefing async
  if (hasVisits && getKey()) {
    setTimeout(() => generateBriefing(p), 80);
  }

  document.getElementById("s-detail").innerHTML=`<div class="cx" style="max-width:1100px"><div class="det-layout"><div class="det-main">${h}</div>${asideHtml}</div></div>`;
}
function renderOnboardingGuide(p, steps, nextStep) {
  const firstName = e(p.name?.split(' ')[0] || 'patienten');
  const nextIdx = steps.findIndex(s => !s.done);

  const stepsHTML = steps.map((s, i) => {
    const isNext = i === nextIdx;
    const dotStyle = s.done
      ? 'background:var(--teal);border:2px solid var(--teal)'
      : isNext
        ? 'border:2px solid var(--teal);background:transparent'
        : 'border:2px solid var(--border);background:transparent';
    const dotInner = s.done
      ? '<svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M2 5.5l2 2 4-4"/></svg>'
      : isNext
        ? '<div style="width:8px;height:8px;border-radius:50%;background:var(--teal)"></div>'
        : '';
    const lineColor = s.done ? 'var(--teal)' : 'var(--border)';
    const textColor = s.done ? 'var(--muted)' : isNext ? 'var(--ink)' : 'var(--muted)';
    const fontWeight = isNext ? '600' : '400';
    const connector = i < steps.length - 1
      ? '<div style="position:absolute;top:11px;left:calc(50% + 11px);right:calc(-50% + 11px);height:2px;background:' + lineColor + '"></div>'
      : '';
    return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;position:relative">' +
      '<div style="width:22px;height:22px;border-radius:50%;' + dotStyle + ';display:flex;align-items:center;justify-content:center;z-index:1;flex-shrink:0">' + dotInner + '</div>' +
      connector +
      '<div style="font-size:10px;color:' + textColor + ';text-align:center;line-height:1.3;font-weight:' + fontWeight + '">' + e(s.label) + '</div>' +
      '</div>';
  }).join('');

  const nextBtn = nextStep?.action
    ? '<button onclick="' + nextStep.action + '" class="btn btn-p" style="margin-top:12px;font-size:12px;padding:7px 16px">Nästa steg: ' + e(nextStep.label) + ' &rarr;</button>'
    : '';

  // Only show if incomplete, and only show the NEXT step — not a full progress bar
  if (!nextStep) return '';
  return '<div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px">' +
    '<div style="width:28px;height:28px;border-radius:50%;background:rgba(13,155,138,.12);border:1.5px solid rgba(13,155,138,.3);display:flex;align-items:center;justify-content:center;flex-shrink:0">' +
    '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>' +
    '</div>' +
    '<div style="flex:1;min-width:0">' +
    '<div style="font-size:11px;color:var(--muted)">Nästa steg</div>' +
    '<div style="font-size:13px;font-weight:600;color:var(--navy)">' + e(nextStep.label) + '</div>' +
    '</div>' +
    (nextStep.action ? '<button onclick="' + nextStep.action + '" style="background:var(--navy);color:white;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font,sans-serif);flex-shrink:0">Gör det →</button>' : '') +
    '</div>';
}

function renderVisitTimeline(pat) {
  const visits = (pat.visits||[]).slice().sort((a,b) => (b.date||'') > (a.date||'') ? 1 : -1);
  if (!visits.length) return '';

  const rows = visits.map((v, idx) => {
    const isFirst = idx === 0;
    const isLast  = idx === visits.length - 1;
    const hasSoap = v.soap && (v.soap.S || v.soap.O || v.soap.A || v.soap.P);
    const hasPlan = !!v.plan;
    const exCount = (v.plan?.exercises||[]).length;
    const pain    = v.form?.pain ?? v.soapMeta?.pain;
    const service = v.service || '';
    const price   = v.servicePrice ? v.servicePrice.toLocaleString('sv-SE') + ' kr' : '';
    const st      = v.status || 'Aktiv';
    const sc      = SCOL[st] || { bg:'#eef0f3', col:'#5a6a7a' };
    const icd     = v.soapMeta?.icd10 || '';
    const diag    = v.form?.diagnosis || v.soapMeta?.diagnosis || '';
    const exp     = v._exp || false;

    // Clinical signals from this visit
    const cs = v.clinicalSignals;
    const signalHTML = cs ? (() => {
      const flags = [...(cs.redFlags||[]).map(f => `<span style="font-size:10px;background:var(--red-lt);color:#8a2020;padding:1px 7px;border-radius:8px">${e(f)}</span>`),
        ...(cs.yellowFlags||[]).map(f => `<span style="font-size:10px;background:var(--gold-lt);color:#7a5000;padding:1px 7px;border-radius:8px">${e(f)}</span>`)].join('');
      const trend = { improving:'Förbättring', stable:'Stabil', worsening:'Försämring' }[cs.painTrend] || '';
      return flags || trend ? `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:5px">${flags}${trend?`<span style="font-size:10px;color:${cs.painTrend==='improving'?'#1a7a4a':cs.painTrend==='worsening'?'#8a2020':'var(--muted)'};font-weight:600">${trend}</span>`:''}</div>` : '';
    })() : '';

    return `
    <div class="vt-item ${isLast ? 'vt-last' : ''}">
      <div class="vt-connector">
        <div class="vt-dot ${isFirst ? 'first' : ''}"></div>
        ${!isLast ? '<div class="vt-line"></div>' : ''}
      </div>
      <div class="vt-body">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;cursor:pointer" onclick="togVisit('${v.id}')">
          <div style="flex:1;min-width:0">
            <div class="vt-date">${v.date || '--'}${service ? ' · ' + e(service) : ''}${price ? ' · ' + price : ''}</div>
            <div class="vt-title">${diag || e(icd || 'Besök ' + (visits.length - idx))}</div>
            <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:4px">
              <span style="font-size:10px;font-weight:600;padding:1px 7px;border-radius:8px;background:${hasSoap?'var(--teal-lt)':'var(--surface3)'};color:${hasSoap?'var(--teal)':'var(--muted)'}">${hasSoap?'Journal':'Ingen journal'}</span>
              <span style="font-size:10px;font-weight:600;padding:1px 7px;border-radius:8px;background:${hasPlan?'var(--green-lt)':'var(--surface3)'};color:${hasPlan?'#1a7a4a':'var(--muted)'}">${hasPlan?`Plan · ${exCount} övn`:'Ingen plan'}</span>
              ${pain != null ? `<span style="font-size:10px;font-weight:600;padding:1px 7px;border-radius:8px;background:var(--surface2);color:var(--text2)">NRS ${pain}/10</span>` : ''}
              <span style="font-size:10px;font-weight:600;padding:1px 7px;border-radius:8px;background:${sc.bg};color:${sc.col}">${st}</span>
            </div>
            ${(() => {
              if (!hasPlan) return '';
              const _pLogs = getPassLogs(pat.id).filter(l => l.visitId === v.id || !l.visitId);
              if (!_pLogs.length) return '';
              const _done = _pLogs.filter(l => l.done === 'all' || l.done === 'most' || l.completed).length;
              const _pct = Math.round(_done / _pLogs.length * 100);
              const _col = _pct >= 70 ? 'var(--teal)' : _pct >= 40 ? 'var(--gold)' : 'var(--red)';
              return '<div style="margin-top:6px;display:flex;align-items:center;gap:8px">'
                + '<div style="flex:1;height:3px;background:var(--border2);border-radius:2px;overflow:hidden">'
                + '<div style="height:100%;background:'+_col+';border-radius:2px;width:'+_pct+'%;transition:width .6s ease"></div>'
                + '</div>'
                + '<div style="font-size:10px;color:var(--muted);font-family:var(--font-mono);flex-shrink:0">'+_done+'/'+_pLogs.length+' pass</div>'
                + '</div>';
            })()}
            ${signalHTML}
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;margin-top:2px">
            ${hasPlan ? `<button onclick="event.stopPropagation();S.visitId='${v.id}';S.plan=(S.pat.visits||[]).find(x=>x.id==='${v.id}')?.plan;go('doc')" style="font-size:11px;font-weight:600;color:var(--teal);background:rgba(13,155,138,.08);border:1px solid rgba(13,155,138,.2);border-radius:6px;padding:4px 10px;cursor:pointer;font-family:var(--font)">Hael-plan</button>` : ''}
            <span id="vtchev-${v.id}" style="color:var(--muted);font-size:14px;transition:transform .2s;${exp?'transform:rotate(90deg)':''}">›</span>
          </div>
        </div>

        <!-- Expanded detail -->
        <div id="vb-${v.id}" style="display:${exp?'block':'none'};margin-top:12px">
          ${hasPlan ? `
          <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:10px">
            <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Övningar · ${exCount} st</div>
            <div style="display:flex;flex-direction:column;gap:4px">
              ${(v.plan.exercises||[]).slice(0,6).map((ex,i) =>
                `<div style="display:flex;align-items:center;gap:8px;font-size:12px">
                  <span style="font-family:var(--font-mono);font-size:10px;color:var(--muted);min-width:16px">${String(i+1).padStart(2,'0')}</span>
                  <span style="color:var(--ink);flex:1">${e(ex.name)}</span>
                  <span style="color:var(--muted);font-size:11px">${ex.sets}×${ex.reps}</span>
                </div>`
              ).join('')}
              ${exCount > 6 ? `<div style="font-size:11px;color:var(--muted);margin-top:2px">+ ${exCount-6} till</div>` : ''}
            </div>
          </div>` : ''}
          ${hasSoap ? `
          <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:10px">
            <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Journal</div>
            ${['S','O','A','P'].filter(l => v.soap?.[l]).map(l =>
              `<div style="margin-bottom:8px">
                <div style="font-size:9px;font-weight:700;color:var(--teal);letter-spacing:.1em;margin-bottom:2px">${l}</div>
                <div style="font-size:12px;color:var(--text2);line-height:1.6">${e(v.soap[l])}</div>
              </div>`
            ).join('')}
          </div>` : ''}
          <div id="passlog-${v.id}" style="margin:8px 0">
            <div style="font-size:11px;color:var(--muted)">Läser genomförda pass...</div>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">
            <button onclick="S.visitId='${v.id}';startManualSOAP()" style="font-size:11px;font-weight:600;color:var(--teal);background:rgba(13,155,138,.06);border:1px solid rgba(13,155,138,.15);border-radius:6px;padding:5px 10px;cursor:pointer;font-family:var(--font)">${hasSoap?'Redigera journal':'Ny journal'}</button>
            ${hasPlan ? `<button onclick="S.visitId='${v.id}';S.plan=(S.pat.visits||[]).find(x=>x.id==='${v.id}')?.plan;go('doc')" style="font-size:11px;font-weight:600;color:var(--teal);background:rgba(13,155,138,.06);border:1px solid rgba(13,155,138,.15);border-radius:6px;padding:5px 10px;cursor:pointer;font-family:var(--font)">Öppna Hael-plan</button>` : `<button onclick="S.visitId='${v.id}';go('form')" style="font-size:11px;font-weight:600;color:var(--teal);background:rgba(13,155,138,.06);border:1px solid rgba(13,155,138,.15);border-radius:6px;padding:5px 10px;cursor:pointer;font-family:var(--font)">Skapa Hael-plan</button>`}
          </div>
        </div>
      </div>
    </div>`;
  });

  // Load pass log for latest visit and any pre-expanded visits
  setTimeout(() => {
    if (visits[0]) loadPassLog(visits[0].id, pat.id);
  }, 80);

  return `<div class="visit-timeline">${rows.join('')}</div>`;
}

function togVisit(vid){
  const p=S.pat;if(!p||!p.visits)return;
  const v=p.visits.find(x=>x.id===vid);if(!v)return;
  v._exp=!v._exp;
  const b=document.getElementById("vb-"+vid);
  const c=document.getElementById("ch-"+vid);
  if(b)b.style.display=v._exp?"block":"none";
  if(c)c.classList.toggle("open",v._exp);
  // Update timeline chevron
  const chev=document.getElementById("vtchev-"+vid);
  if(chev)chev.style.transform=v._exp?"rotate(90deg)":"";
  // Load pass log when expanding
  if(v._exp) loadPassLog(vid, p.id);
}

function openDiagEditor(patId) {
  const p = S.patients.find(x=>x.id===patId)||S.pat; if(!p) return;
  const current = (p.diagnoses||[]).length ? p.diagnoses.join('\n') : (p.diagnosis||'');
  const ov = document.createElement('div');
  ov.id = 'diag-edit-ov';
  ov.style.cssText = 'position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(10,20,35,.72);backdrop-filter:blur(5px)';
  ov.onclick = e => { if(e.target===ov) ov.remove(); };
  ov.innerHTML = `
  <div style="background:var(--surface);width:100%;max-width:400px;position:relative;z-index:1;box-shadow:0 8px 40px rgba(0,0,0,.18)" onclick="event.stopPropagation()">
    <div style="background:var(--navy);padding:18px 20px">
      <div style="font-size:16px;font-weight:600;color:white">Diagnoser</div>
      <div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:2px">En diagnos per rad · Första raden = primärdiagnos</div>
    </div>
    <div style="padding:18px 20px">
      <textarea id="diag-edit-ta" style="width:100%;border:1px solid var(--border);padding:10px 12px;font-size:13px;font-family:'DM Sans',sans-serif;line-height:1.7;resize:vertical;min-height:100px;outline:none;color:var(--text)">${e(current)}</textarea>
      <div style="display:flex;gap:8px;margin-top:14px">
        <button onclick="saveDiagEdit('${patId}')" style="flex:1;background:var(--navy);color:white;border:none;padding:11px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">Spara</button>
        <button onclick="document.getElementById('diag-edit-ov').remove()" style="flex:1;background:var(--surface);color:var(--text2);border:1px solid var(--border);padding:11px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif">Avbryt</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(ov);
  setTimeout(()=>document.getElementById('diag-edit-ta')?.focus(),150);
}

function saveDiagEdit(patId) {
  const raw = document.getElementById('diag-edit-ta')?.value||'';
  const arr = raw.split('\n').map(s=>s.trim()).filter(Boolean);
  const p = S.patients.find(x=>x.id===patId)||S.pat; if(!p) return;
  const updated = {...p, diagnoses: arr, diagnosis: arr[0]||p.diagnosis||''};
  const saved = savePat(updated);
  if(S.pat&&S.pat.id===patId) S.pat=saved;
  document.getElementById('diag-edit-ov')?.remove();
  if(S.screen==='detail') rDetail();

const MODEL_SONNET = 'claude-sonnet-4-20250514'; // Komplex planering, SOAP-analys
const MODEL_HAIKU  = 'claude-haiku-4-5-20251001'; // Snabba enkla anrop -- 80% billigare

async function callAPI(prompt,locked,key){
  // Split prompt: cache the static schema part, dynamic patient data stays live
  const staticPart = prompt.slice(prompt.indexOf('\n\nGenerera'));
  const dynPart = prompt.slice(0, prompt.indexOf('\n\nGenerera'));
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-beta":"prompt-caching-2024-07-31","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:MODEL_SONNET,max_tokens:4000,system:[{type:"text",text:"Du är senior fysioterapeut. Svara ALLTID med giltig JSON. Inga backticks.",cache_control:{type:"ephemeral"}}],messages:[{role:"user",content:[{type:"text",text:dynPart},{type:"text",text:staticPart,cache_control:{type:"ephemeral"}}]}]})});
  if(!res.ok){const er=await res.json().catch(()=>({}));throw new Error(er.error?.message||"API-fel "+res.status);}
  const d=await res.json();
  const t=(d.content||[]).map(b=>b.text||"").join("").replace(/```json|```/g,"").trim();
  if(!t)throw new Error("Tomt svar från API -- försök igen.");
  return JSON.parse(t);
}
function rLoading(){
  const isMeeting = S.loadMode === 'meeting';
  const title = isMeeting ? 'Analyserar samtal' : 'Genererar Hael-plan';
  const steps = isMeeting
    ? ["Transkriberar och filtrerar samtal","Strukturerar SOAP-journalanteckning","Skapar journalutkast"]
    : ["Analyserar diagnos och patientprofil","Väljer och doserar evidensbaserade övningar","Sammanställer Hael-plan"];
  const pct = Math.round((S.loadStep/3)*100);
  let h=`<div class="ldwrap">
    <img src="${LOGO}" style="height:50px;margin-bottom:12px">
    <div class="ldtitle">${title}</div>
    <div style="width:200px;height:4px;background:#1a3a4a;border-radius:2px;margin:12px auto 16px;overflow:hidden">
      <div style="height:100%;width:${pct}%;background:#4a9aaa;border-radius:2px;transition:width .6s ease"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">`;
  steps.forEach((s,i)=>{
    const c=S.loadStep>i?"done":S.loadStep===i+1?"active":"";
    h+=`<div class="ldstep ${c}">
      <span style="font-size:13px">·</span>
      <span>${s}</span>
    </div>`;
  });
  h+=`</div><div style="margin-top:16px;font-size:11px;color:rgba(255,255,255,0.4)">Tar vanligtvis 10-20 sekunder...</div></div>`;

function createNewPatientAndChoose() {
  const name = document.getElementById('npf-name')?.value.trim();
  const bdRaw = document.getElementById('npf-birthdate')?.value.trim();
  const errEl = document.getElementById('npf-err');
  if (!name || !bdRaw) { if(errEl) errEl.style.display='block'; return; }
  const birthdate = parseBirthdate(bdRaw);
  const email = document.getElementById('npf-email')?.value.trim();
  const phone = document.getElementById('npf-phone')?.value.trim();
  const address = document.getElementById('npf-address')?.value.trim();
  const diagnosis = document.getElementById('npf-diagnosis')?.value.trim() || '';
  const birthYear = birthdateToYear(birthdate);
  const notes = document.getElementById('npf-notes')?.value.trim();
  const consentJournal = document.getElementById('consent-journal')?.checked || false;
  const consentGdpr    = document.getElementById('consent-gdpr')?.checked || false;
  const consentHael    = document.getElementById('consent-hael')?.checked || false;
  const consents = [];
  const ts = new Date().toISOString();
  if (consentJournal) consents.push({ type: 'journal',    given: true, ts, method: 'registration' });
  if (consentGdpr)    consents.push({ type: 'gdpr',       given: true, ts, method: 'registration' });
  if (consentHael)    consents.push({ type: 'hael_plan',  given: true, ts, method: 'registration' });
  const pat = { id:'pat_'+Date.now(), name, birthdate, email, phone, address, birthYear, diagnosis, diagnoses: diagnosis ? [diagnosis] : [], notes, visits:[], consents, phase:1 };
  const saved = savePat(pat);
  S.pat = saved;
  document.getElementById('new-pat-flow').remove();
  openPat(saved.id);
  // Show a subtle success toast (not an intake prompt)
  showAutoSaveToast('Patient registrerad ✓');
}

function saveConsentPopup(patId) {
  const pat = S.patients.find(p=>p.id===patId);
  if (!pat) { document.getElementById('consent-popup')?.remove(); return; }
  const newConsents = [];
  CONSENT_TYPES.forEach(ct => { const cb=document.getElementById('cp-'+ct.key); if(cb&&cb.checked) newConsents.push({type:ct.key,date:new Date().toISOString().slice(0,10),revokedAt:null}); });
  if (newConsents.length) { const updated=savePat({...pat,consents:[...(pat.consents||[]),...newConsents]}); if(S.pat&&S.pat.id===patId) S.pat=updated; }
  document.getElementById('consent-popup')?.remove();
  if (S.screen==='detail') rDetail();
}

function renderPrevVisitPanel(pat, currentVisitId) {
  if (!pat||!pat.visits||pat.visits.length<2) return '';
  const visits = pat.visits;
  const currentIdx = currentVisitId ? visits.findIndex(v=>v.id===currentVisitId) : 0;
  const prevVisit = visits[currentIdx+1]||visits[1];
  if (!prevVisit) return '';
  const soap = prevVisit.soap||{};
  const hasSoap = soap.S||soap.O||soap.A||soap.P;
  const exs = prevVisit.plan?.exercises||[];
  let h = `<div style="background:var(--surface2);border:1px solid #c8e0f0;border-radius:10px;padding:14px 16px;margin-bottom:16px">
    <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#4a9aaa;margin-bottom:10px">Föregående besök -- ${prevVisit.date||'--'}</div>`;
  if (hasSoap) {
    ['S','O','A','P'].forEach(l => {
      if (!soap[l]) return;
      const labels={S:'Subjektivt',O:'Objektivt',A:'Bedömning',P:'Plan'};
      h+=`<div style="margin-bottom:7px"><span style="font-size:9px;font-weight:700;color:#4a9aaa;letter-spacing:.06em">${labels[l]}</span><div style="font-size:12px;color:var(--ink);line-height:1.5;margin-top:2px">${e(soap[l])}</div></div>`;
    });
  }
  if (exs.length) {
    h+=`<div style="margin-top:8px;padding-top:8px;border-top:1px solid #d0e8f0"><div style="font-size:9px;font-weight:700;color:#4a9aaa;margin-bottom:5px">ÖVNINGAR FÖRRA BESÖKET</div>${exs.map((ex,i)=>`<div style="font-size:11px;color:var(--ink);padding:3px 0">${i+1}. ${e(ex.name)} -- ${ex.sets}×${ex.reps}</div>`).join('')}</div>`;
  }
  return h+'</div>';
}

let meetRecognition = null;
let clinicalAnalysisTimer = null;
let clinicalAnalysisDebounce = null;
let lastAnalyzedText = '';
let clinicalPanelExpanded = true;
let meetTranscript = [];
let meetInterim = "";
let meetTimer = null;
let meetSeconds = 0;
let meetConsented = false;
let meetNote = "";
let currentSOAP = null;

function rMeeting() {
  const p = S.pat;
  if (!p) { go("list"); return; }
  const el = document.getElementById("s-meeting");

  const meetHeader = `
  <div style="background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:52px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:50">
    <button onclick="stopListening();go('detail')" style="background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:var(--muted);padding:0;font-family:var(--font);transition:color .15s" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Kundkort
    </button>
    <span style="color:var(--border2)">></span>
    <span style="font-size:13px;font-weight:600;color:var(--ink)">${e(p.name)}</span>
    <span style="font-size:11px;color:var(--muted)">-- Möte &amp; transkription</span>
  </div>`;

  if (!meetConsented) {
    el.innerHTML = meetHeader + `<div class="meet-wrap">
      <div class="meet-consent" style="margin-top:32px">
        <div class="meet-consent-title">Samtycke krävs</div>
        <div class="meet-consent-txt">
          Innan inspelningen startar behöver patienten ge sitt samtycke till att mötet spelas in och transkriberas för journalföring. Transkriptionen behandlas av AI och lagras lokalt.
        </div>
        <div class="meet-consent-btn">
          <button class="btn btn-p" style="width:100%;padding:13px;font-size:14px" onclick="giveConsent()">Patienten har samtyckt -- Starta</button>
          <button class="btn" style="width:100%;padding:10px" onclick="go('detail')">Avbryt</button>
        </div>
      </div>
    </div>`;
    return;
  }

  const mins = String(Math.floor(meetSeconds/60)).padStart(2,'0');
  const secs = String(meetSeconds%60).padStart(2,'0');
  const isListening = meetRecognition !== null;

  let transcriptHtml = meetTranscript.map(t =>
    `<div class="transcript-line"><span class="tl-time">${t.time}</span><span class="tl-text">${e(t.text)}</span></div>`
  ).join('');
  if (!transcriptHtml) transcriptHtml = '<div style="color:var(--text3);font-style:italic;padding:8px 0;font-size:13px">Inget transkriberat ännu -- tryck Starta inspelning och tala tydligt.</div>';

  el.innerHTML = meetHeader + `<div class="meet-wrap">
    <div class="meet-status">
      <div class="meet-status-dot ${isListening?'listening':'idle'}" id="meet-dot"></div>
      <span class="meet-status-txt" id="meet-status-txt">${isListening?'Lyssnar och transkriberar...':'Tryck Starta för att börja'}</span>
      <span class="meet-timer" id="meet-clock">${mins}:${secs}</span>
    </div>
    <div class="transcript-box" id="tbox">
      ${transcriptHtml}
      <div class="transcript-line" id="meet-interim-line" style="display:none">
        <span class="tl-time">--:--</span><span class="tl-text interim" id="meet-interim"></span>
      </div>
    </div>
    <div class="meet-controls" id="meet-btn-wrap">
      ${isListening
        ? `<button class="rec-btn stop" onclick="stopListening()">|| Pausa inspelning</button>`
        : `<button class="rec-btn start" onclick="startListening()">${meetTranscript.length?'> Återuppta':'> Starta'} inspelning</button>`
      }
    </div>
    <span class="meet-note-label">Egna noteringar</span>
    <textarea class="meet-note" placeholder="Kompletterande anteckningar -- syns inte i transkriptet..." oninput="meetNote=this.value;triggerClinicalAnalysis(meetTranscript.map(t=>t.text).join(' ')+' '+this.value)">${e(meetNote)}</textarea>

    ${clinicalPanelHTML("meeting")}

    <button class="meet-done-btn" id="meet-done-btn" onclick="finishMeeting()">
      Avsluta möte och skapa journal ->
    </button>
    <div class="meet-done-hint">Du kan avsluta även om inget transkriberats -- fyll i manuellt i noteringar.</div>
  </div>`;

  const tbox = document.getElementById("tbox");
  if (tbox) tbox.scrollTop = tbox.scrollHeight;

  // If there's already transcript text (resumed meeting), re-trigger clinical analysis
  if (meetTranscript.length > 0) {
    const existingText = meetTranscript.map(t=>t.text).join(' ') + (meetNote ? ' ' + meetNote : '');
    lastAnalyzedText = ''; // force re-analysis even if text matches
    triggerClinicalAnalysis(existingText);
  }
}

function giveConsent() {
  meetConsented = true;
  meetTranscript = [];
  meetInterim = '';
  meetSeconds = 0;
  meetNote = '';
  lastAnalyzedText = ''; // reset so AI triggers fresh on new transcript
  rMeeting();
  meetTimer = setInterval(() => {
    meetSeconds++;
    const el = document.getElementById('meet-clock');
    if (el) {
      const mins = String(Math.floor(meetSeconds/60)).padStart(2,'0');
      const secs = String(meetSeconds%60).padStart(2,'0');
      el.textContent = mins+':'+secs;
    }
  }, 1000);
  // Don't auto-start -- let user press the button
}

let _meetingStopping = false;
let _meetingSessionId = 0;

function stopListening() {
  _meetingStopping = true;
  _meetingSessionId++;
  if (meetRecognition) {
    const r = meetRecognition;
    meetRecognition = null;
    r.onresult = null;
    r.onerror = null;
    r.onend = null;
    r.onstart = null;
    try { r.abort(); } catch(ignored) {}
  }
  meetInterim = '';
  const intEl = document.getElementById('meet-interim');
  const intLine = document.getElementById('meet-interim-line');
  if (intEl) intEl.textContent = '';
  if (intLine) intLine.style.display = 'none';
  const dot = document.getElementById('meet-dot');
  const txt = document.getElementById('meet-status-txt');
  if (dot) dot.className = 'meet-status-dot idle';
  if (txt) txt.textContent = 'Inspelning pausad';
  updateRecBtn(false);
  setTimeout(() => { _meetingStopping = false; }, 500);
}

async function startListening() {
  if (meetRecognition) return; // guard: already active

  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Din webbläsare stöder inte röstinspelning. Använd Chrome (desktop) eller Safari (iPhone).');
    return;
  }

  // Show pending state -- keep button as Starta while we wait for permission
  const dot0 = document.getElementById('meet-dot');
  const txt0 = document.getElementById('meet-status-txt');
  if (dot0) dot0.className = 'meet-status-dot idle';
  if (txt0) txt0.textContent = 'Väntar på mikrofontillstånd...';

  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      stream.getTracks().forEach(t => t.stop());
    } catch(err) {
      if (txt0) txt0.textContent = 'Mikrofontillstånd nekades';
      alert('Mikrofontillstånd nekades.\n\nGå till webbläsarens inställningar -> Sekretess -> Mikrofon och tillåt denna sida.');
      return;
    }
  }

  // Abort if user pressed stop during the permission wait
  if (_meetingStopping || meetRecognition) return;

  _meetingStopping = false;
  const mySession = ++_meetingSessionId;

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.lang = 'sv-SE';
  rec.continuous = true;
  rec.interimResults = true;
  rec.maxAlternatives = 1;

  rec.onstart = () => {
    if (meetRecognition !== rec) return;
    const d = document.getElementById('meet-dot');
    const t = document.getElementById('meet-status-txt');
    if (d) d.className = 'meet-status-dot listening';
    if (t) t.textContent = 'Lyssnar och transkriberar...';
    updateRecBtn(true);
  };

  rec.onresult = (event) => {
    if (meetRecognition !== rec) return;
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const text = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        const now = new Date();
        const time = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
        meetTranscript.push({ time, text: text.trim() });
        meetInterim = '';
        appendTranscriptLine(time, text.trim());
      } else {
        interim += text;
      }
    }
    meetInterim = interim;
    const intEl = document.getElementById('meet-interim');
    const intLine = document.getElementById('meet-interim-line');
    if (intEl) intEl.textContent = interim;
    if (intLine) intLine.style.display = interim ? '' : 'none';
    updateDoneBtn();
  };

  rec.onerror = (event) => {
    if (meetRecognition !== rec) return;
    if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
      meetRecognition = null;
      updateRecBtn(false);
      const t = document.getElementById('meet-status-txt');
      if (t) t.textContent = 'Mikrofontillstånd saknas';
    }
    // 'no-speech' and 'aborted' are normal during continuous recognition -- ignore
  };

  rec.onend = () => {
    // Only restart if this exact session is still active
    if (meetRecognition !== rec) return;
    if (_meetingStopping) return;
    if (_meetingSessionId !== mySession) return;
    setTimeout(() => {
      if (meetRecognition !== rec || _meetingStopping || _meetingSessionId !== mySession) return;
      try {
        rec.start();
      } catch(e) {
        // Restart failed -- show resume button
        meetRecognition = null;
        updateRecBtn(false);
        const t = document.getElementById('meet-status-txt');
        if (t) t.textContent = 'Avbruten -- tryck Fortsätt';
      }
    }, 300);
  };

  // Assign to global ONLY after setting up all handlers
  meetRecognition = rec;

  try {
    rec.start();
  } catch(e) {
    meetRecognition = null;
    updateRecBtn(false);
    if (txt0) txt0.textContent = 'Kunde inte starta';
    alert('Kunde inte starta inspelning: ' + e.message);
  }
}

function triggerClinicalAnalysis(text) {
  clearTimeout(clinicalAnalysisDebounce);
  clinicalAnalysisDebounce = setTimeout(() => runClinicalAnalysis(text), 2500);
}

async function runClinicalAnalysis(text) {
  if (!text || text.trim().length < 30) return;
  if (text.trim() === lastAnalyzedText.trim()) return;
  lastAnalyzedText = text.trim();
  const key = getKey();
  if (!key) return;
  const panel = document.getElementById('clinical-panel-body');
  if (!panel) return;

  // Update status indicator
  const pulse = document.getElementById('clin-pulse');
  const status = document.getElementById('clin-status');
  if (pulse) pulse.style.background = '#4a9aaa';
  if (status) status.textContent = '-- analyserar...';

  panel.innerHTML = `<div style="display:flex;align-items:center;gap:8px;padding:12px;color:#4a9aaa;font-size:12px"><div style="width:6px;height:6px;border-radius:50%;background:#4a9aaa;animation:pulse 1s infinite"></div>Analyserar...</div>`;
  const patInfo = S.pat ? (() => {
    const p = S.pat;
    const prevVisits = (p.visits||[]).slice(0,3).map(v => {
      const soap = v.journal?.soap || v.soap || {};
      const d = v.date||'';
      return `Besök ${d}: ${[soap.A,soap.P].filter(Boolean).join(' | ')}`;
    }).filter(s=>s.length>10).join('\n');
    return `Patient: ${p.name}, f.${p.birthdate||p.birthYear||'?'}, diagnos: ${p.diagnosis||'okänd'}${prevVisits?'\nTidigare besök:\n'+prevVisits:''}`;
  })() : '';
  const prompt = `Du är erfaren klinisk fysioterapeut som handleder en kollega i realtid. Analysera materialet nedan. Svara ENBART med JSON utan backticks.\n\n${patInfo}\n\nTEXT/TRANSKRIPT:\n${text.slice(-2000)}\n\nJSON-format:\n{"tentativeDiagnosis":[{"name":"Diagnos","icd10":"M54.5","probability":"Hög","reasoning":"kortfattad motivering"}],"redFlags":[],"missingInfo":["fråga 1","fråga 2"],"priorityTests":[{"test":"Testnamn","rationale":"varför","finding":"förväntat fynd"}],"treatmentGuidelines":["riktlinje 1","riktlinje 2"],"nextStep":"Vad du bör göra härnäst"}\n\nViktigt: icd10 ska vara exakt ICD-10 kod (t.ex. M54.5, M75.1, S83.2). Inkludera alltid icd10 i varje diagnos.`;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:MODEL_HAIKU,max_tokens:1200,system:"Svara ALLTID med giltig JSON. Inga backticks.",messages:[{role:"user",content:prompt}]})});
    const data = await res.json();
    const txt = (data.content||[]).map(b=>b.text||'').join('');
    const cleaned = txt.replace(/```json|```/g,'').trim();
    if (!cleaned) throw new Error('Tomt API-svar (stop_reason: '+(data.stop_reason||'?')+')');
    const result = JSON.parse(cleaned);
    renderClinicalPanel(result);
  } catch(err) {
    console.error('Clinical AI error:', err);
    if (panel) panel.innerHTML = `<div style="padding:12px;font-size:11px;color:var(--muted)">Analys misslyckades: ${e(err.message||'okänt fel')}</div>`;
  }
}

function renderClinicalPanel(r) {
  const panel = document.getElementById('clinical-panel-body');

  const pulse = document.getElementById('clin-pulse');
  const status = document.getElementById('clin-status');
  if (pulse) { pulse.style.background = '#4af0a0'; pulse.style.animation = 'none'; }
  if (status) status.textContent = '-- uppdaterad ' + new Date().toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
  const probColor = {'Hög':'#1a7a4a','Medel':'#8a6000','Låg':'#6a7a8a'};
  const probBg = {'Hög':'var(--green-lt)','Medel':'#fff3cd','Låg':'#f0f2f4'};
  let h = '';
  if (r.redFlags&&r.redFlags.length) h+=`<div style="background:#fee;border-left:3px solid #c07070;padding:10px 12px;margin-bottom:10px;border-radius:0 6px 6px 0"><div style="font-size:9px;font-weight:700;color:#c07070;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">Röda flaggor</div>${r.redFlags.map(f=>`<div style="font-size:12px;color:#8a2020;margin-bottom:2px">${e(f)}</div>`).join('')}</div>`;
  if (r.nextStep) h+=`<div style="background:var(--teal-lt);border-left:3px solid var(--teal);padding:10px 12px;margin-bottom:10px;border-radius:0 6px 6px 0"><div style="font-size:9px;font-weight:700;color:var(--teal);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">Nästa steg</div><div style="font-size:12px;color:#1a3a4a;line-height:1.5">${e(r.nextStep)}</div></div>`;
  if (r.tentativeDiagnosis&&r.tentativeDiagnosis.length){
    h+=`<div style="margin-bottom:10px"><div style="font-size:9px;font-weight:700;color:var(--navy);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px">Differentialdiagnoser + ICD-10</div>`;
    r.tentativeDiagnosis.forEach(d=>{
      const col=probColor[d.probability]||'#6a7a8a', bg=probBg[d.probability]||'#f0f2f4';
      const icdCode = d.icd10 || '';
      const icdBtn = icdCode ? `<button onclick="setClinicalICD('${e(icdCode)}','${e(d.name)}')" style="margin-left:6px;background:#e8f0f8;border:1px solid #b0c8e0;border-radius:4px;font-size:9px;font-weight:700;color:#1a4a7a;padding:2px 6px;cursor:pointer;font-family:'DM Mono',monospace">-> Sätt ICD-10</button>` : '';
      h+=`<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:7px;padding:9px 11px;background:var(--surface);border-radius:8px;border:1px solid #e8ecf0">

function setClinicalICD(code, diagName) {
  // Set in all active ICD-10 fields (works in both meeting SOAP and manual SOAP)
  ['ms-icd','sbs-focus'].forEach(id => {
    const el = document.getElementById(id);
    if (el && el.placeholder && el.placeholder.includes('ICD')) { el.value = code; el.dispatchEvent(new Event('input')); }
  });
  // Direct currentSOAP update
  if (typeof currentSOAP !== 'undefined') {
    currentSOAP.icd10 = code;
    currentSOAP.icd10desc = diagName;
    // Update visible fields
    const icdEl = document.getElementById('ms-icd') || document.querySelector('[placeholder="M54.5"]');
    const descEl = document.getElementById('ms-icddesc') || document.querySelector('[placeholder="ICD-10 beskrivning..."]');
    if (icdEl) icdEl.value = code;
    if (descEl) descEl.value = diagName;
  }
  // Toast
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a4a7a;color:white;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.2)';
  t.textContent = `ICD-10 satt: ${code} -- ${diagName}`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

function appendTranscriptLine(time, text) {
  triggerClinicalAnalysis(meetTranscript.map(t=>t.text).join(' '));

  // Persist transcript to localStorage immediately -- crash protection
  if (S.pat) {
    try {
      localStorage.setItem('hael:meetdraft:'+S.pat.id, JSON.stringify({
        transcript: meetTranscript,
        note: meetNote,
        patId: S.pat.id,
        savedAt: Date.now()
      }));
    } catch(e) {}
  }

  const tbox = document.getElementById('tbox');
  if (!tbox) return;
  const placeholder = tbox.querySelector('div[style*="italic"]');

  const div = document.createElement('div');
  div.className = 'transcript-line';
  div.innerHTML = `<span class="tl-time">${time}</span><span class="tl-text">${e(text)}</span>`;
  tbox.appendChild(div);

}

function updateDoneBtn() {

  meetTranscript = [];
  meetInterim = '';
  meetSeconds = 0;
  meetNote = '';

async function finishMeeting() {
  stopListening();
  if (meetTimer) { clearInterval(meetTimer); meetTimer = null; }
  const key = getKey();
  if (!key) { alert('API-nyckel saknas. Gå till Inställningar.'); return; }

  const fullTranscript = meetTranscript.map(t => `[${t.time}] ${t.text}`).join('\n');
  const extra = meetNote ? `\n\nEgna noteringar: ${meetNote}` : '';

  // If nothing captured at all, open manual SOAP instead
  if (!fullTranscript && !meetNote) {
    alert('Ingen transkription eller noteringar. Fyller i journalen manuellt.');
    go(S.pat ? 'detail' : 'list');
    startManualSOAP();
    return;
  }

  S.loadMode = 'meeting';
  S.loadStep = 1;
  go('loading');

  const prompt = `Du är erfaren fysioterapeut och journalförare. Analysera detta medicinska samtal och skapa en strukturerad SOAP-journalanteckning på svenska.

VIKTIGT: Extrahera ENBART medicinskt och kliniskt relevant information. Ignorera smalltalk, sidospår, diskussioner om icke-medicinska ämnen (t.ex. väder, sport, fritid) och allt som inte är direkt relevant för patientens besvär, symtom, undersökning eller behandling.

TRANSKRIPTION:
${fullTranscript}${extra}

Returnera ENBART giltig JSON utan backticks:
{
  "soap": {
    "S": "Subjektivt -- patientens berättelse, symtom, smärtbeskrivning, varaktighet, aggravations- och lindrande faktorer",
    "O": "Objektivt -- undersökningsfynd, tester, rörelseomfång, palpation, neurologisk status",
    "A": "Bedömning -- diagnos eller differentialdiagnos, funktionsnivå, prognos",
    "P": "Plan -- behandlingsplan, åtgärder, hemprogram, uppföljning"
  },
  "diagnosis": "Mest trolig diagnos (välj från: Ländryggssmärta (ospecifik), Nacksmärta / cervikalt syndrom, Rotatorkuffproblem / axelsmärta, Knäartros, Höftartros, Tennisarmbåge (lateral epikondylit), Hälseneproblem (Achillestendinopati), Plantarfasciit, Frozen shoulder (adhesiv kapsulir), Diskbråck lumbal, Patellofemoralt smärtsyndrom, Fibromyalgi, Annan / fritext)",
  "customDiagnosis": "Om Annan/fritext -- ange diagnos här, annars tom sträng",
  "pain": 5,
  "motivation": 6,
  "history": "ingen",
  "knowledge": "låg",
  "location": "hem",
  "exercises": 5,
  "followup": 4,
  "clinicalFocus": "Specifika kliniska fynd och fokusområden för rehabplanen",
  "icd10": "Mest trolig ICD-10 kod, t.ex. M54.5",
  "icd10desc": "Beskrivning av ICD-10 koden på svenska, t.ex. Ländryggssmärta"
}

pain ska vara 0-10 baserat på patientens beskrivning.
motivation ska vara 1-10 baserat på vad som framkom.
history: ingen/sporadisk/regelbunden baserat på träningsbakgrund.
knowledge: låg/medel/hög baserat på patientens förståelse.
location: hem/gym baserat på vad som diskuterades.
Filtrera bort allt som INTE är medicinskt relevant -- vardagsprat, hälsningar, väder, mat etc ska INTE ingå i SOAP-anteckningen.`;

  try {
    S.loadStep = 2;
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-beta":"prompt-caching-2024-07-31","anthropic-dangerous-direct-browser-access":"true"},
      body: JSON.stringify({
        model: MODEL_SONNET, max_tokens: 6000,
        system: [{type:"text",text:"Du är erfaren fysioterapeut. Svara ALLTID med giltig JSON. Inga backticks.",cache_control:{type:"ephemeral"}}],
        messages: [{role:"user", content:prompt}]
      })
    });
    S.loadStep = 3;
    const data = await res.json();
    const text = (data.content||[]).map(b=>b.text||'').join('');
    let cleaned = text.replace(/```json|```/g,'').trim();
    console.log('RAW API RESPONSE:', JSON.stringify(data));
    console.log('CLEANED TEXT:', cleaned.slice(0,500));
    if(!cleaned.endsWith('}')){const lb=cleaned.lastIndexOf('}');if(lb>0)cleaned=cleaned.slice(0,lb+1);}
    if(!cleaned){throw new Error('Tomt svar från API. stop_reason: '+(data.stop_reason||'?'));}
    const result = JSON.parse(cleaned);
    currentSOAP = { ...result, transcript: meetTranscript, date: new Date().toISOString().slice(0,10), note: meetNote };

async function saveSOAPToVisit(goToPlan) {
  const p = S.pat;
  if (!p || !currentSOAP) return;
  const diag = currentSOAP.diagnosis || p.diagnosis || '';

  // Read SOAP from live DOM if available, otherwise from currentSOAP
  const liveSoap = {};
  ['S','O','A','P'].forEach(l => {
    const el = document.getElementById('soap-'+l) || document.getElementById('ms-'+l) || document.getElementById('sbs-'+l);
    liveSoap[l] = (el && el.value) || (currentSOAP.soap && currentSOAP.soap[l]) || '';
  });
  const mergedSoap = {...(currentSOAP.soap||{}), ...liveSoap};
  const soapText = ['S','O','A','P'].map(l => `${l}: ${mergedSoap[l]||''}`).join('\n\n');

  // If adding to an existing visit, update it in place
  const existingId = currentSOAP.existingVisitId;
  let vid;
  let updVisits;
  if (existingId && (p.visits||[]).find(v => v.id === existingId)) {
    vid = existingId;
    updVisits = (p.visits||[]).map(v => v.id === existingId
      ? {...v, soap: mergedSoap, note: soapText, transcript: currentSOAP.transcript, soapMeta: {...currentSOAP, soap: mergedSoap}}
      : v
    );
  } else {
    vid = 'v_' + Date.now();
    const svc = window._pendingService || {};
    const newVisit = {
      id: vid,
      date: currentSOAP.date,
      form: null, plan: null, status: 'Aktiv',
      note: soapText,
      soap: mergedSoap,
      transcript: currentSOAP.transcript,
      soapMeta: {...currentSOAP, soap: mergedSoap},
      service: svc.name || '',
      servicePrice: svc.price || 0,
    };
    window._pendingService = null;
    updVisits = [newVisit, ...(p.visits||[])];
  }

  const isFirstVisit = !(p.visits||[]).length;
  const updPat = {...p, diagnosis: diag, visits: updVisits};
  const saved = savePat(updPat);
  S.pat = saved;
  S.visitId = vid;

  if (isFirstVisit || !(p.diagnoses||[]).length) {
    setTimeout(() => aiExtractDiagnoses(saved.id), 1500);
  }

  if (goToPlan) {
    // Pre-fill form from SOAP analysis
    S.form = {
      name: p.name || '',
      birthdate: p.birthdate || "", birthYear: p.birthYear || 1980,
      diagnosis: currentSOAP.diagnosis || diag,
      customDiag: currentSOAP.customDiagnosis || '',
      pain: currentSOAP.pain || 5,
      history: currentSOAP.history || 'ingen',
      knowledge: currentSOAP.knowledge || 'låg',
      location: currentSOAP.location || 'hem',
      motivation: currentSOAP.motivation || 6,
      exercises: currentSOAP.exercises || 5,
      followup: currentSOAP.followup || 4,
      notes: currentSOAP.clinicalFocus || ''
    };
    resetMeeting();
    go('form');
  }
}

function autoSaveJournalDraft() {
  if (S.screen !== 'manualsoap' && S.screen !== 'sbs-soap') return;
  const draft = {
    patId: S.pat && S.pat.id,
    screen: S.screen,
    soap: {
      S: (document.getElementById('ms-S')||document.getElementById('sbs-S')||{}).value||'',

function checkJournalDraft() {
  try {
    const raw = sessionStorage.getItem('hael:journaldraft');
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (!d || !S.pat || d.patId !== S.pat.id) return false;
    if (Date.now() - d.savedAt > 2*60*60*1000) return false; // 2h expiry
    return d;
  } catch(e) { return false; }
}

function restoreJournalDraft(draft) {
  setTimeout(() => {
    ['S','O','A','P'].forEach(l => {
      const el = document.getElementById('ms-'+l) || document.getElementById('sbs-'+l);
      if (el && draft.soap[l]) { el.value = draft.soap[l]; el.dispatchEvent(new Event('input')); }
    });
    sessionStorage.removeItem('hael:journaldraft');
    showAutoSaveToast('Utkast återställt');
  }, 200);
}

async function finishManualSOAP(goPlan) {
  // Read values
  const soap = {
    S: document.getElementById('ms-S').value.trim(),
    O: document.getElementById('ms-O').value.trim(),
    A: document.getElementById('ms-A').value.trim(),
    P: document.getElementById('ms-P').value.trim()
  };
  const diagnosis = document.getElementById('ms-diag').value;
  const customDiagnosis = document.getElementById('ms-custom').value.trim();
  const icd10 = document.getElementById('ms-icd').value.trim();
  const icd10desc = document.getElementById('ms-icddesc').value.trim();
  
  // If any SOAP content exists, use AI to extract rehab params
  const soapText = [soap.S,soap.O,soap.A,soap.P].filter(Boolean).join('\n');
  const key = getKey();
  
  if (soapText && key) {
    S.loadMode = 'plan'; S.loadStep = 1; go('loading');
    try {
      S.loadStep = 2;
      const prompt = `Analysera denna SOAP-journalanteckning och extrahera rehabparametrar. Svara ENBART med JSON utan backticks.

SOAP:
S: ${soap.S}
O: ${soap.O}
A: ${soap.A}
P: ${soap.P}
Diagnos: ${diagnosis}

JSON:
{"pain":5,"motivation":6,"history":"ingen","knowledge":"låg","location":"hem","exercises":5,"followup":4,"clinicalFocus":"specifika fynd och fokusområden"}

pain 0-10, motivation 1-10, history: ingen/sporadisk/regelbunden, knowledge: låg/medel/hög, location: hem/gym`;
      const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:MODEL_HAIKU,max_tokens:500,system:"Svara ALLTID med giltig JSON. Inga backticks.",messages:[{role:"user",content:prompt}]})});
      S.loadStep = 3;
      const data = await res.json();
      const text = (data.content||[]).map(b=>b.text||'').join('');
      const cleaned = text.replace(/```json|```/g,'').trim();
      if (!cleaned) throw new Error('Tomt svar');
      const params = JSON.parse(cleaned);
      currentSOAP = {...currentSOAP, ...params, soap, diagnosis, customDiagnosis, icd10, icd10desc};
    } catch(err) {
      // Fallback without AI params
      currentSOAP = {...currentSOAP, soap, diagnosis, customDiagnosis, icd10, icd10desc};
    }
  } else {
    currentSOAP = {...currentSOAP, soap, diagnosis, customDiagnosis, icd10, icd10desc};
  }

  if (goPlan) {
    await saveSOAPToVisit(true);
  } else {
    go('soap');
  }
}

function checkMeetDraft() {
  if (!S.pat) return null;
  try {
    const raw = localStorage.getItem('hael:meetdraft:'+S.pat.id);
    if (!raw) return null;
    const d = JSON.parse(raw);
    if (!d || d.patId !== S.pat.id) return null;
    if (Date.now() - d.savedAt > 8*60*60*1000) return null; // 8h expiry
    if (!d.transcript || !d.transcript.length) return null;
    return d;
  } catch(e) { return null; }
}

function clearMeetDraft() {
  if (S.pat) try { localStorage.removeItem('hael:meetdraft:'+S.pat.id); } catch(e) {}
}

function startMeeting() {
  if (!S.pat) return;

  // Check for a saved draft from a previous crashed/interrupted session
  const draft = checkMeetDraft();
  if (draft) {
    const mins = Math.round((Date.now() - draft.savedAt) / 60000);
    const timeAgo = mins < 60 ? `${mins} min sedan` : `${Math.round(mins/60)} tim sedan`;
    const ov = document.createElement('div');
    ov.id = 'meet-draft-overlay';
    ov.style.cssText = 'position:fixed;inset:0;z-index:600;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(10,20,35,.72)';
    ov.innerHTML = `<div style="background:var(--surface);border-radius:16px;width:100%;max-width:420px;padding:24px;box-shadow:0 8px 40px rgba(0,0,0,.25)">
      <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-bottom:6px">Avbruten inspelning hittad</div>
      <div style="font-size:17px;font-weight:600;color:var(--navy);margin-bottom:8px">${draft.transcript.length} rader sparade</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:20px">Från ett möte ${timeAgo}. Vill du fortsätta där du slutade?</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-p" style="flex:1;padding:11px" onclick="restoreMeetDraft(${JSON.stringify(draft).replace(/"/g,'&quot;')})">Återuppta</button>
        <button class="btn" style="flex:1;padding:11px" onclick="clearMeetDraft();document.getElementById('meet-draft-overlay').remove();resetMeeting();go('meeting')">Nytt möte</button>
      </div>
    </div>`;
    document.body.appendChild(ov);
    return;
  }

  resetMeeting();
  go('meeting');
}

function restoreMeetDraft(draft) {
  const ov = document.getElementById('meet-draft-overlay');
  if (ov) ov.remove();
  meetConsented = true;
  meetTranscript = draft.transcript || [];
  meetNote = draft.note || '';
  meetSeconds = 0;
  meetInterim = '';
  go('meeting');
  meetTimer = setInterval(() => {
    meetSeconds++;
    const el = document.getElementById('meet-clock');
    if (el) {
      const mins = String(Math.floor(meetSeconds/60)).padStart(2,'0');
      const secs = String(meetSeconds%60).padStart(2,'0');
      el.textContent = mins+':'+secs;
    }
  }, 1000);
  showAutoSaveToast('Transkript återställt -- '+meetTranscript.length+' rader');
}

// -- PAIN CHART ----------------------------------------------------------------
function renderPainChart(visits) {
  const pts = [...visits].reverse().filter(v=>v.form&&v.form.pain!=null).slice(0,10);
  if (pts.length < 2) return '';
  const W=340, H=70, PAD=10;
  const vals = pts.map(v=>v.form.pain);
  const min=0, max=10;
  const xStep = (W-PAD*2)/(pts.length-1);
  const yScale = (H-PAD*2)/(max-min);
  const points = vals.map((v,i)=>({
    x: PAD+i*xStep,
    y: H-PAD-(v-min)*yScale
  }));
  const path = points.map((p,i)=>(i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`)).join(' ');
  const area = path + ` L${points[points.length-1].x},${H-PAD} L${PAD},${H-PAD} Z`;
  const dots = points.map((p,i)=>`<circle cx="${p.x}" cy="${p.y}" r="3" fill="${vals[i]>=7?'#c07070':vals[i]>=4?'#c8a030':'#5a9860'}"/>`).join('');
  const labels = points.map((p,i)=>`<text x="${p.x}" y="${H}" font-size="7" fill="#3a4a5a" text-anchor="middle">${pts[i].date.slice(5)}</text>`).join('');
  return `<div class="chart-wrap">
    <div class="chart-title">Smärtutveckling (NRS)</div>
    <div class="chart-svg-wrap">
      <svg width="100%" viewBox="0 0 ${W} ${H+12}" preserveAspectRatio="xMidYMid meet">
        <defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2a7a8a" stop-opacity="0.18"/><stop offset="100%" stop-color="#2a7a8a" stop-opacity="0"/></linearGradient></defs>
        <line x1="${PAD}" y1="${PAD}" x2="${PAD}" y2="${H-PAD}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
        <line x1="${PAD}" y1="${H-PAD}" x2="${W-PAD}" y2="${H-PAD}" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
        ${[0,5,10].map(v=>`<text x="${PAD-3}" y="${H-PAD-(v-min)*yScale+3}" font-size="7" fill="#3a4a5a" text-anchor="end">${v}</text>`).join('')}
        <path d="${area}" fill="url(#ag)"/>
        <path d="${path}" fill="none" stroke="#2a7a8a" stroke-width="1.5" stroke-linejoin="round"/>
        ${dots}
        ${labels}
      </svg>
    </div>
  </div>`;
}

  const p = S.patients.find(x => x.id === patId) || S.pat;

  if (S.pat?.id === patId) { S.pat = p; rDetail(); }
  showAutoSaveToast('Obegränsad tillgång aktiverad (Pro)');
}

function zpSetTier(patId, visitId, tierId) {
  const p = S.patients.find(x => x.id === patId) || S.pat;
  if (!p) return;
  const vIdx = (p.visits||[]).findIndex(v => v.id === visitId);
  if (vIdx < 0) return;
  p.visits[vIdx].paymentTier = tierId;
  savePat(p);
  if (S.pat?.id === patId) { S.pat = p; rDetail(); }
  showAutoSaveToast('Tier ändrad till ' + (PAYMENT_TIERS[tierId]?.name || tierId));
}

function exportBackup(silent) {
  // Collect all patients from both storage key formats
  const seen = new Set();
  const patients = [];
  S.patients.forEach(p => { if (p&&p.id&&!seen.has(p.id)) { seen.add(p.id); patients.push(p); } });
  // Also sweep localStorage for any orphaned keys
  for (let i=0; i<localStorage.length; i++) {
    const k = localStorage.key(i);
    if (!k) continue;
    if (k.startsWith('pat:') || k.startsWith('kansei-data:') || k.startsWith('kpat_')) {
      try {
        const p = JSON.parse(localStorage.getItem(k));
        if (p&&p.id&&!seen.has(p.id)) { seen.add(p.id); patients.push(p); }
      } catch(e) {}
    }
  }
  // Also collect economics user entries
  const ekEntries = (() => { try { return JSON.parse(localStorage.getItem('kansei-ek:intakter')||'[]'); } catch(e){return[];} })();

  const data = {
    appName: 'Hael',
    version: 2,
    exported: new Date().toISOString(),
    exportedReadable: new Date().toLocaleString('sv-SE'),
    patientCount: patients.length,
    patients,
    
  };

  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const ts = new Date().toISOString().slice(0,16).replace('T','_').replace(':','-');
  a.download = `hael-export-${ts}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  if (!silent) showAutoSaveToast('Backup nedladdad');
  return patients.length;
}

function importBackup() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    try {
      const data = JSON.parse(text);
      // Support both old format (patients array) and new format (version 2)
      const patients = data.patients;
      if (!patients||!Array.isArray(patients)) { alert('Ogiltig backupfil -- inga patienter hittades.'); return; }
      let count = 0;
      patients.forEach(p => {
        if (p&&p.id) {
          localStorage.setItem('kansei-data:'+p.id, JSON.stringify(p));
          localStorage.setItem('pat:'+p.id, JSON.stringify(p));
          count++;
        }
      });
      // Import economics user entries if present
      if (data.ekonomi&&data.ekonomi.userEntries&&Array.isArray(data.ekonomi.userEntries)) {
        localStorage.setItem('kansei-ek:intakter', JSON.stringify(data.ekonomi.userEntries));
      }
      alert(`${count} patienter importerade från backup (${data.exportedReadable||data.exported||'okänt datum'}).\n\nSidan laddas om.`);
      loadPats();
      go('dashboard');
    } catch(err) { alert('Kunde inte läsa filen: '+err.message); }
  };
  input.click();
}

function renderPainGraph(pat) {
  const visits = (pat.visits||[]).slice().reverse(); // oldest first
  const painPoints = visits.filter(v => v.form && v.form.pain != null);
  if (painPoints.length < 2) return ''; // need at least 2 points

  const W = 280, H = 60, PAD = 8;
  const n = painPoints.length;
  const xs = painPoints.map((_, i) => PAD + (i / (n - 1)) * (W - PAD * 2));
  const ys = painPoints.map(v => PAD + ((10 - v.form.pain) / 10) * (H - PAD * 2));

  // polyline
  const pts = xs.map((x, i) => `${x},${ys[i]}`).join(' ');

  // color: improving = green, worsening = red
  const first = painPoints[0].form.pain;
  const last = painPoints[painPoints.length-1].form.pain;
  const trend = last < first ? '#4a9860' : last > first ? '#c07070' : '#4a9aaa';

  // dots + labels
  let dots = '';
  painPoints.forEach((v, i) => {
    dots += `<circle cx="${xs[i]}" cy="${ys[i]}" r="3" fill="${trend}" opacity="0.9"/>`;
    if (i === 0 || i === n-1) {
      const anchor = i === 0 ? 'start' : 'end';
      dots += `<text x="${xs[i]}" y="${H - 1}" text-anchor="${anchor}" font-size="8" fill="#5a6a7a">${v.form.pain}/10</text>`;
      dots += `<text x="${xs[i]}" y="${H + 9}" text-anchor="${anchor}" font-size="7" fill="var(--muted)">${v.date||''}</text>`;
    }
  });

  const arrow = last < first ? 'v Förbättring' : last > first ? '^ Försämring' : '-> Oförändrad';
  const diff = Math.abs(last - first);

  return `<div style="margin:12px 0 4px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px">
    <div style="font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px">
      Smärtutveckling (NRS) &nbsp;<span style="color:${trend};font-size:11px">${arrow} ${diff > 0 ? diff + ' enheter' : ''}</span>
    </div>
    <svg width="100%" viewBox="0 0 ${W} ${H + 14}" style="overflow:visible">
      <polyline points="${pts}" fill="none" stroke="${trend}" stroke-width="2" stroke-linejoin="round" opacity="0.7"/>
      ${dots}
    </svg>
  </div>`;
}

function buildMailBody(vid, liveUrl, inclLink, inclPdf) {
  const p = S.pat;
  const v = (p.visits||[]).find(x=>x.id===vid);
  if (!v||!v.plan) return '';
  const plan = v.plan;
  const firstName = (p.name||'').split(' ')[0] || 'Hej';
  const diag = plan.diagnosis || p.diagnosis || '';
  const clinic = CLINIC;

  // Followup date
  const fw = plan.form?.followup;
  const visitDate = v.date;
  let followupLine = '';
  if (fw && visitDate) {
    const d = new Date(visitDate); d.setDate(d.getDate()+fw*7);
    const dateStr = d.toLocaleDateString('sv-SE',{day:'numeric',month:'long',year:'numeric'});
    followupLine = `
Rekommenderat återbesök: ${dateStr}
`;
  }

  let body = `Hej ${firstName},

Tack för ditt besök hos ${clinic.name} ${visitDate||''}.
`;

  if (inclLink) {
    body += `
Din Hael-plan finns här:
${liveUrl}

Vi använder Hael -- ett digitalt verktyg från Vela -- för att skicka din Hael-plan direkt till din telefon. Öppna länken för att se alla övningar med instruktioner, veckoschema och smärthanteringsråd. Planen uppdateras automatiskt om vi gör ändringar.
`;
  }

  if (inclPdf) {
    body += `
En PDF-version av planen bifogas separat -- öppna och skriv ut vid behov.
`;
  }

  body += followupLine;
  body += `
Hör gärna av dig om du har frågor.

Med vänliga hälsningar,
${clinic.name}
${clinic.phone}
${clinic.email}`;
  return body;
}

function updateMailPreview(vid, liveUrl) {
  const inclLink = document.getElementById('md-link')?.checked ?? true;
  const inclPdf = document.getElementById('md-pdf')?.checked ?? false;
  const preview = document.getElementById('md-preview');
  if (preview) preview.textContent = buildMailBody(vid, liveUrl, inclLink, inclPdf);
}

function sendMailDialog(vid, encodedUrl) {
  const liveUrl = decodeURIComponent(encodedUrl);
  const inclLink = document.getElementById('md-link')?.checked ?? true;
  const inclPdf = document.getElementById('md-pdf')?.checked ?? false;
  const toEmail = document.getElementById('md-email')?.value.trim() || '';
  const p = S.pat;
  const v = (p?.visits||[]).find(x=>x.id===vid);
  if (!v||!v.plan) return;
  const clinic = CLINIC;
  const diag = v.plan.diagnosis || p.diagnosis || '';

  const subject = encodeURIComponent(`Din Hael-plan -- ${clinic.name}`);
  const body = encodeURIComponent(buildMailBody(vid, liveUrl, inclLink, inclPdf));
  const mailto = `mailto:${encodeURIComponent(toEmail)}?subject=${subject}&body=${body}`;

  document.getElementById('mail-dialog-overlay')?.remove();

  if (inclPdf) {
    // Open print view first, then mail
    printPlanAsPDF(vid);
    setTimeout(() => { window.location.href = mailto; }, 800);
  } else {
    window.location.href = mailto;
  }
}

function printPlanAsPDF(vid) {
  const p = S.pat;
  if (!p) return;
  S.visitId = vid;
  const v = (p.visits||[]).find(x=>x.id===vid);

}

const RED_FLAGS = [
  {pattern: /nattsmärta|natt\s*smärta/i, label: 'Nattsmärta', msg: 'Smärta som väcker patienten på natten -- kan indikera inflammatorisk artrit, infektion eller malignitet.'},
  {pattern: /oförklarlig\s*viktminskning|viktnedgång/i, label: 'Viktminskning', msg: 'Oförklarlig viktminskning -- bör utredas för systemsjukdom.'},
  {pattern: /blåspåverkan|tarmpåverkan|inkontinens|urinretention/i, label: 'Blås/tarm', msg: 'Blås- eller tarmstörning -- kan indikera cauda equina-syndrom. Akut remiss.'},
  {pattern: /sadelbedövning|perianal/i, label: 'Sadelbedövning', msg: 'Sadelbedövning -- cauda equina-syndrom tills motsatsen bevisats. Akut remiss.'},
  {pattern: /feber|frossa|svettning\s*på\s*natten/i, label: 'Feber/svettning', msg: 'Feber eller kraftig svettning -- kan indikera infektion eller systemsjukdom.'},
  {pattern: /steroidbehandling|immunosuppression|immundämpande/i, label: 'Immunosuppression', msg: 'Patient med immunosuppression -- ökad risk för atypiska infektioner.'},
  {pattern: /cancer|tumör|malignitet|onkologi/i, label: 'Cancerhistorik', msg: 'Cancerhistorik -- rygg-/ledsmärta kan vara metastas.'},
  {pattern: /neurologisk\s*bortfall|förlamning|pares|pareser/i, label: 'Neurologisk bortfall', msg: 'Neurologiska bortfall -- prioritera neurologisk utredning.'},
  {pattern: /trauma|fall\s*från\s*höjd|trafikolycka/i, label: 'Allvarligt trauma', msg: 'Allvarligt trauma -- uteslut fraktur.'},
  {pattern: /progressiv|tilltagande\s*svaghet/i, label: 'Progressiv svaghet', msg: 'Progressiv motorisk svaghet -- neurologisk utredning prioriteras.'},
];

function checkRedFlags(soapText) {
  if (!soapText) return [];
  const found = [];
  RED_FLAGS.forEach(f => {
    if (f.pattern.test(soapText)) found.push(f);
  });
  return found;
}

function renderRedFlagBanner(flags) {
  if (!flags || !flags.length) return '';
  const items = flags.map(f => `<div class="rf-item"><strong>${f.label}:</strong> ${f.msg}</div>`).join('');
  return `<div class="rf-banner">
    <div class="rf-title">Röda flaggor detekterade -- granska innan behandling</div>
    ${items}
  </div>`;
}
