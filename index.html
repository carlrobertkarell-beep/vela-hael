function analyzeClinicInsights(patients) {
  const exCount = {};
  const exImprovedCount = {};

  patients.forEach(p => {
    const visits = (p.visits||[]);
    // Find visits with plans where NRS improved vs previous
    visits.forEach((v, i) => {
      if (!v.plan?.exercises) return;
      const currPain = v.form?.pain;
      const prevPain = visits[i+1]?.form?.pain;
      const improved = currPain != null && prevPain != null && prevPain > currPain;
      v.plan.exercises.forEach(ex => {
        const key = (ex.name||'').toLowerCase().trim();
        exCount[key] = (exCount[key]||0) + 1;
        if (improved) exImprovedCount[key] = (exImprovedCount[key]||0) + 1;
      });
    });
  });

  // Score: times used + bonus for improvement correlation
  const scored = Object.entries(exCount).map(([name, count]) => ({
    name, count, improved: exImprovedCount[name]||0,
    score: count + (exImprovedCount[name]||0) * 1.5
  })).filter(x => x.count >= 2)
    .sort((a,b) => b.score - a.score)
    .slice(0, 6);

  return scored;
}

function renderClinicStats(patients) {
  if (!patients.length) return '';
  const now = Date.now();
  const DAY = 86400000;
  const active = patients.filter(p => (p.visits||[])[0]?.status === 'Aktiv').length;
  const thisWeekStart = now - (new Date().getDay()||7)*DAY;
  const lastWeekStart = thisWeekStart - 7*DAY;
  let thisWeekRev = 0, lastWeekRev = 0, totalRev = 0;
  patients.forEach(p => (p.visits||[]).forEach(v => {
    const d = new Date(v.date||'').getTime(); if (!d) return;
    const amt = v.servicePrice || 0;
    totalRev += amt;
    if (d >= thisWeekStart) thisWeekRev += amt;
    else if (d >= lastWeekStart) lastWeekRev += amt;
  }));
  const withPlan = patients.filter(p => (p.visits||[]).some(v => v.plan)).length;
  const inactive7 = patients.filter(p => {
    const sl = (p.sessionLogs||[]).sort((a,b) => b.date > a.date ? 1 : -1)[0];
    return !sl || (now - new Date(sl.date||0)) > 7*DAY;
  }).length;
  const weekDelta = lastWeekRev > 0 ? Math.round(((thisWeekRev - lastWeekRev) / lastWeekRev) * 100) : null;
  const deltaHtml = weekDelta !== null
    ? ' <span style="font-size:10px;color:' + (weekDelta >= 0 ? '#1a7a4a' : 'var(--red,#c05050)') + '">' + (weekDelta >= 0 ? '+' : '') + weekDelta + '%</span>'
    : '';

  return '<div class="clinic-stats-grid">'
    + '<div class="cstat"><div class="cstat-val">' + active + '</div><div class="cstat-lbl">Aktiva patienter</div></div>'
    + '<div class="cstat"><div class="cstat-val">' + (thisWeekRev > 0 ? thisWeekRev.toLocaleString('sv-SE') + ' kr' : '--') + '</div><div class="cstat-lbl">Intäkt denna vecka' + deltaHtml + '</div></div>'
    + '<div class="cstat"><div class="cstat-val">' + withPlan + '</div><div class="cstat-lbl">Med Hael-plan</div></div>'
    + '<div class="cstat" style="' + (inactive7 > 0 ? 'border-color:rgba(200,160,48,.3)' : '') + '"><div class="cstat-val" style="' + (inactive7 > 0 ? 'color:var(--gold,#c8a030)' : '') + '">' + inactive7 + '</div><div class="cstat-lbl">Inaktiva >7 dagar</div></div>'
    + '</div>';
}

// Storage helpers for pass logs (localStorage + Supabase sync)
const PASSLOG_KEY = (patId) => `zenya:passlogs:${patId}`;

function getPassLogs(patId) {
  try { return JSON.parse(localStorage.getItem(PASSLOG_KEY(patId))||'[]'); } catch(e) { return []; }
}

function savePassLog(patId, entry) {
  try {
    const logs = getPassLogs(patId);
    logs.unshift(entry); // newest first
    localStorage.setItem(PASSLOG_KEY(patId), JSON.stringify(logs.slice(0,60)));
  } catch(e) {}
}

// Track selected button values
const _ciSelections = {};
function ciSelect(group, val, btn) {
  _ciSelections[group] = val;
  const container = document.getElementById('ci-'+group+'-btns');
  if (!container) return;
  container.querySelectorAll('button').forEach(b => {
    const isSelected = b.dataset.val === val;
    b.style.background = isSelected ? 'var(--navy)' : 'white';
    b.style.color = isSelected ? 'white' : 'var(--text2)';
    b.style.borderColor = isSelected ? 'var(--navy)' : 'var(--border)';
  });
}

async function submitCheckIn(patId, visitId) {
  const pain = parseInt(document.getElementById('ci-pain')?.value||'5');
  const energy = _ciSelections['energy'] || null;
  const move = _ciSelections['move'] || null;
  const done = _ciSelections['done'] || null;
  const note = document.getElementById('ci-note')?.value?.trim() || '';
  const ts = new Date().toISOString();

  const entry = { visitId, ts, pain, energy, move, done, note };
  savePassLog(patId, entry);

  // Try to sync to Supabase
  try {
    await fetch(`${SB_URL}/rest/v1/pass_log`, {
      method:'POST',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body: JSON.stringify({pat_id:patId, visit_id:visitId, logged_at:ts, pain_after:pain,
        energy_level: energy ? parseInt(energy) : null,
        movement_quality: move ? parseInt(move) : null,
        completion: done || null,
        patient_note: note || null
      })
    });
  } catch(err) {}

  // Show confirmation + progress
  const box = document.getElementById('pub-checkin');
  if (!box) return;

  const logs = getPassLogs(patId);
  const totalSessions = logs.length;
  const streak = calcStreak(logs);
  const painFirst = logs.length >= 2 ? logs[logs.length-1].pain : null;
  const painTrend = painFirst != null ? pain - painFirst : null;
  const trendStr = painTrend === null ? '' : painTrend < 0
    ? `<div style="color:#1a7a4a;font-weight:600"> Smärta v${Math.abs(painTrend)} poäng sedan start</div>`
    : painTrend > 0
      ? `<div style="color:#c07070;font-weight:600">Smärta +${painTrend} poäng sedan start</div>`
      : `<div style="color:#7a5000">-> Smärta oförändrad sedan start</div>`;

  const feedbackMsg = pain >= 7
    ? 'Du rapporterar hög smärta -- ta det lugnt och hör av dig till kliniken om det håller i sig.'
    : done === 'few'
      ? 'Du klarade bara delar av passet — det kan vara ett tecken på att programmet behöver justeras. Din behandlare ser detta.'
      : energy === '1'
        ? 'Låg energi kan vara ett tecken på att kroppen behöver mer återhämtning.'
        : 'Pass registrerat. Varje pass ger din behandlare bättre underlag för din behandling.';

  box.innerHTML = `
    <div style="padding:6px 0">
      <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--teal);margin-bottom:10px">Rapport mottagen</div>
      <div style="font-size:13px;color:var(--navy);font-weight:600;margin-bottom:4px">${new Date(ts).toLocaleDateString('sv-SE',{weekday:'long',day:'numeric',month:'long'})} · ${new Date(ts).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'})}</div>
      <div style="font-size:12px;color:var(--text3);line-height:1.65;margin-top:8px;padding-top:8px;border-top:1px solid #f0f2f5">${feedbackMsg}</div>
      ${totalSessions > 1 ? `<div style="font-size:11px;color:var(--text3);margin-top:8px">${totalSessions} pass loggade totalt${streak>=3?' · '+streak+' pass i rad':''}</div>` : ''}
    </div>`;
}

function calcStreak(logs) {
  if (!logs.length) return 0;
  // Count consecutive days (within 2-day windows to allow rest days)
  let streak = 1;
  for (let i = 1; i < logs.length; i++) {
    const diffDays = (new Date(logs[i-1].ts) - new Date(logs[i].ts)) / (1000*60*60*24);
    if (diffDays <= 2) streak++; else break;
  }
  return streak;
}

                  class="sj-act-${patId}">
                  ${a}

          <button onclick="sjSave('${patId}','${visitId}')"
            style="background:#0d9b8a;color:white;border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;margin-top:4px">

function sjSelect(btn, group) {
  document.querySelectorAll('.' + group.replace(/-/g,'\\-') + '[data-val]').forEach(b => {
    b.style.background = 'rgba(255,255,255,.04)';
    b.style.borderColor = 'rgba(255,255,255,.1)';
    b.style.color = group.includes('mood') ? '' : 'rgba(255,255,255,.55)';
  });
  btn.style.background = '#0d9b8a';
  btn.style.borderColor = '#0d9b8a';
  btn.style.color = 'white';
  btn.dataset.selected = '1';
}

function sjToggleActivity(btn, group) {
  const active = btn.dataset.selected === '1';
  btn.dataset.selected = active ? '' : '1';
  btn.style.background = active ? 'rgba(255,255,255,.04)' : '#0d9b8a';
  btn.style.borderColor = active ? 'rgba(255,255,255,.1)' : '#0d9b8a';
  btn.style.color = active ? 'rgba(255,255,255,.5)' : 'white';
}

function sjSave(patId, visitId) {
  const today = new Date().toISOString().slice(0,10);
  const getVal = (cls) => {
    const btn = document.querySelector(`.${CSS.escape(cls)}[data-selected="1"]`);
    return btn ? parseFloat(btn.dataset.val) : null;
  };
  const getActivity = (cls) => {
    const btns = document.querySelectorAll(`.${CSS.escape(cls)}[data-selected="1"]`);
    return btns.length ? [...btns].map(b=>b.dataset.val).join(', ') : null;
  };

  const entry = {
    date: today,
    sleep:    getVal(`sj-sleep-${patId}`),
    stress:   getVal(`sj-stress-${patId}`),
    energy:   getVal(`sj-energy-${patId}`),
    mood:     getVal(`sj-mood-${patId}`),
    activity: getActivity(`sj-act-${patId}`),
  };

  const key = 'hael:symptoms:' + patId;
  let logs = [];
  try { logs = JSON.parse(localStorage.getItem(key)||'[]'); } catch(e) {}
  logs = logs.filter(l => l.date !== today);
  logs.push(entry);
  if (logs.length > 90) logs = logs.slice(-90);
  try { localStorage.setItem(key, JSON.stringify(logs)); } catch(e) {}

  // Show confirmation
  showAutoSaveToast && showAutoSaveToast('Check-in sparad OK');

  // Re-render section
  const existing = document.querySelector('[data-sj-pat="' + patId + '"]');
  if (existing) existing.outerHTML = renderSymptomJournal(patId, visitId);
  else location.reload();
}

    ov.style.animation = 'fadeOutOv .25s ease forwards';
    setTimeout(() => ov.remove(), 280);
  };

  render();
  document.body.appendChild(ov);
}

function pubProgressSectionHTML(patId) {
  const logs = getPassLogs(patId);
  const pat = window._publicPlanCache?.pat || S.patients?.find(p => p.id === patId);
  const visit = pat?.visits?.[0];
  const plan = visit?.plan || S.plan;

  // Gather all data sources
  const totalSessions = logs.length;
  const streak = calcStreak(logs);
  const symptomLogs = (pat?.symptomLogs || []).filter(l => l.nrs != null)
    .sort((a,b) => (a.date||'') < (b.date||'') ? -1 : 1);
  const firstNRS = symptomLogs[0]?.nrs ?? visit?.form?.pain ?? logs[logs.length-1]?.pain ?? null;
  const lastNRS  = symptomLogs[symptomLogs.length-1]?.nrs ?? logs[0]?.pain ?? firstNRS;
  const nrsDelta = (firstNRS != null && lastNRS != null) ? Math.round((lastNRS - firstNRS) * 10) / 10 : null;
  const fullPasses = logs.filter(l => l.done === 'all' || l.done === 'most').length;
  const completionRate = totalSessions > 0 ? Math.round((fullPasses / totalSessions) * 100) : 0;
  const weeksSince = visit?.date
    ? Math.max(1, Math.floor((Date.now() - new Date(visit.date)) / (7 * 86400000)))
    : null;
  const totalWeeks = plan?.form?.followup || visit?.form?.followup || 6;
  const weekProgress = weeksSince ? Math.min(100, Math.round((weeksSince / totalWeeks) * 100)) : 0;
  const functionalGoal = pat?.functionalGoal || plan?.functionalGoal || '';
  const diagShort = (plan?.diagnosis || visit?.form?.diagnosis || '').split('(')[0].trim();

  if (totalSessions < 1 && !symptomLogs.length) return '';

  // Build narrative headline
  function getHeadline() {
    if (nrsDelta !== null && nrsDelta <= -2)
      return `Din smärta har minskat ${Math.abs(nrsDelta)} poäng.`;
    if (streak >= 5)
      return `${streak} pass i rad. Det är ovanligt bra.`;
    if (completionRate >= 80 && totalSessions >= 4)
      return `Du genomför ${completionRate}% av dina övningar. Det märks.`;
    if (totalSessions >= 10)
      return `${totalSessions} pass. Kontinuitet är medicin.`;
    if (totalSessions >= 3)
      return `${totalSessions} pass genomförda. Du är i rörelse.`;
    return 'Din rehabresa har börjat.';
  }

  function getSubline() {
    if (weeksSince && totalWeeks)
      return `Vecka ${Math.min(weeksSince, totalWeeks)} av ${totalWeeks}${diagShort ? ' · ' + diagShort : ''}`;
    return diagShort || '';
  }

  // NRS sparkline
  const chartData = symptomLogs.length >= 2 ? symptomLogs : logs.filter(l=>l.pain!=null).map(l=>({nrs:l.pain,date:l.date})).reverse();
  let sparklineHTML = '';
  if (chartData.length >= 2) {
    const W = 240, H = 44, PAD = 6;
    const vals = chartData.map(l => l.nrs);
    const minV = Math.min(...vals), maxV = Math.max(...vals);
    const range = maxV - minV || 1;
    const xs = vals.map((_, i) => PAD + (i / (vals.length - 1)) * (W - PAD * 2));
    const ys = vals.map(v => PAD + ((maxV - v) / range) * (H - PAD * 2));
    const path = xs.map((x, i) => `${i===0?'M':'L'}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(' ');
    const fillPath = path + ` L${xs[xs.length-1].toFixed(1)},${H} L${xs[0].toFixed(1)},${H} Z`;
    const trendColor = nrsDelta !== null && nrsDelta < -0.5 ? '#0aab7c'
      : nrsDelta !== null && nrsDelta > 0.5 ? '#e53935' : '#0d9b8a';
    sparklineHTML = `<div style="margin:14px 0 10px">
      <div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:8px">Smärttrend NRS</div>
      <svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block;overflow:visible">
        <defs><linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="${trendColor}" stop-opacity=".25"/>
          <stop offset="100%" stop-color="${trendColor}" stop-opacity="0"/>
        </linearGradient></defs>
        <path d="${fillPath}" fill="url(#pg)"/>
        <path d="${path}" fill="none" stroke="${trendColor}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        ${xs.map((x,i) => `<circle cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="3.5" fill="${trendColor}"/>`).join('')}
      </svg>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.3);margin-top:4px;font-family:'JetBrains Mono',monospace">
        <span>Start NRS ${firstNRS ?? '--'}</span>
        <span>Nu NRS ${lastNRS ?? '--'}</span>
      </div>
    </div>`;
  }

  // Week progress bar
  const progressBar = weeksSince ? `<div style="margin-bottom:14px">
    <div style="display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.35);margin-bottom:5px">
      <span>Programframsteg</span>
      <span>Vecka ${Math.min(weeksSince,totalWeeks)} / ${totalWeeks}</span>
    </div>
    <div style="height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden">
      <div style="height:100%;width:${weekProgress}%;background:var(--teal,#0d9b8a);border-radius:2px;transition:width .6s ease"></div>
    </div>
  </div>` : '';

  // Functional goal progress
  const goalHTML = functionalGoal ? `<div style="margin:14px 0;padding:12px 14px;background:rgba(255,255,255,.05);border-radius:10px;border-left:2px solid rgba(13,155,138,.5)">
    <div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:4px">Mitt mål</div>
    <div style="font-size:13px;color:rgba(255,255,255,.75);line-height:1.5">${e(functionalGoal)}</div>
  </div>` : '';

  // Insight line
  const insightLines = [];
  if (nrsDelta !== null && nrsDelta <= -1.5)
    insightLines.push(`Smärtminskning på ${Math.abs(nrsDelta).toFixed(1)} enheter — det är kliniskt signifikant.`);
  if (streak >= 7)
    insightLines.push(`${streak} dagar i rad är ovanligt. De flesta ger upp vid dag 3.`);
  if (completionRate >= 80 && totalSessions >= 5)
    insightLines.push(`${completionRate}% genomförandegrad. Forskning visar att regelbundenhet avgör resultatet mer än intensitet.`);
  if (nrsDelta !== null && nrsDelta > 1 && totalSessions < 5)
    insightLines.push(`Smärtan kan tillfälligt öka i början — det är vanligt. Fortsätt, kroppen anpassar sig.`);
  const insightHTML = insightLines[0] ? `<div style="margin-top:12px;font-size:12px;color:rgba(255,255,255,.45);line-height:1.65;font-style:italic">${insightLines[0]}</div>` : '';

  return `<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;margin:0 14px 18px;padding:18px 16px">
    <!-- Headline -->

// Clinician: render patient's self-reported data in detail view
function renderPatientReportsPanel(patId) {
  const logs = getPassLogs(patId);
  if (!logs.length) return '';
  const recent = logs.slice(0, 10);

  const energyLabel = {1:'Låg',2:'OK',3:'Bra'};
  const moveLabel = {1:'Stelt',2:'OK',3:'Flöt på'};
  const doneLabel = {all:'Alla',partial:'Delvis',few:'Bara några'};
  const doneColor = {all:'#1a7a4a',partial:'#8a6000',few:'#8a2020'};

  // Mini sparkline
  const pains = recent.slice().reverse().map(l=>l.pain);
  const W=120, H=28, PAD=3;
  const xs = pains.map((_,i) => PAD + (i/(pains.length-1||1))*(W-PAD*2));
  const ys = pains.map(p => PAD + ((10-p)/10)*(H-PAD*2));
  const points = xs.map((x,i)=>`${x},${ys[i]}`).join(' ');
  const trend = pains[pains.length-1] < pains[0] ? '#1a7a4a' : pains[pains.length-1] > pains[0] ? '#c07070' : '#4a9aaa';

  return `<div style="margin:16px 0">
    <div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:10px">Patientrapporter -- ${logs.length} pass loggade</div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden">
      <div style="padding:12px 16px;border-bottom:1px solid var(--bg);display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="flex-shrink:0">
          <polyline points="${points}" fill="none" stroke="${trend}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          ${xs.map((x,i)=>`<circle cx="${x}" cy="${ys[i]}" r="2.5" fill="${trend}"/>`).join('')}
        </svg>
        <div style="display:flex;gap:14px;flex-wrap:wrap">
          <div><div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">Senaste NRS</div><div style="font-size:18px;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace">${recent[0].pain}/10</div></div>
          <div><div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">Pass totalt</div><div style="font-size:18px;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace">${logs.length}</div></div>
          <div><div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">I rad</div><div style="font-size:18px;font-weight:700;color:var(--navy);font-family:'DM Mono',monospace">${calcStreak(logs)}</div></div>
        </div>
      </div>
      ${recent.map(l => {
        const d = new Date(l.ts).toLocaleDateString('sv-SE',{day:'numeric',month:'short'});
        const time = new Date(l.ts).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
        return `<div style="padding:9px 16px;border-bottom:1px solid var(--bg);display:flex;align-items:flex-start;gap:10px">
          <div style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;flex-shrink:0;min-width:68px">${d} ${time}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;flex:1">
            <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:8px;background:#eef0f3;color:var(--navy)">NRS ${l.pain}</span>
            ${l.energy ? `<span style="font-size:11px;padding:2px 8px;border-radius:8px;background:${l.energy==='3'?'#e8f5ee':l.energy==='1'?'#fde8e8':'#fdf3d8'};color:${l.energy==='3'?'#1a6a3a':l.energy==='1'?'#8a2020':'#7a5000'}">${energyLabel[l.energy]||l.energy}</span>` : ''}
            ${l.move ? `<span style="font-size:11px;padding:2px 8px;border-radius:8px;background:#f0f2f4;color:var(--text2)">${moveLabel[l.move]||l.move}</span>` : ''}
            ${l.done ? `<span style="font-size:11px;padding:2px 8px;border-radius:8px;background:#f0f2f4;color:${doneColor[l.done]||'var(--text2)'}">${doneLabel[l.done]||l.done}</span>` : ''}
          </div>
          ${l.note ? `<div style="font-size:11px;color:var(--text3);font-style:italic;max-width:180px;flex-shrink:0">"${e(l.note.slice(0,80))}${l.note.length>80?'...':''}"</div>` : ''}
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

// Check patient's pass_log for multi-metric alerts on dashboard
async function checkAdaptivePlanAlerts(patients) {
  const alertEl = document.getElementById('adaptive-alerts');
  if (!alertEl || !patients.length) return;
  const warnPats = [];

  patients.forEach(p => {
    const logs = getPassLogs(p.id);
    if (logs.length < 2) return;
    const recent = logs.slice(0, 4);

    // High pain 2+ sessions
    if (recent.length >= 2 && recent[0].pain >= 6 && recent[1].pain >= 6)
      warnPats.push({pat:p, icon:'', msg:`NRS ${recent[0].pain}/10 senaste ${Math.min(recent.filter(l=>l.pain>=6).length,recent.length)} pass -- plan kan behöva justeras`, tag:'Hög smärta', bg:'#fde8e8', col:'#8a2020', sev:3});

    // Completion dropping
    const notDone = recent.filter(l=>l.done==='few').length;
    if (notDone >= 2)
      warnPats.push({pat:p, icon:'med', msg:`Klarar bara delar av övningarna -- programmet kan vara för krävande`, tag:'Svår belastning', bg:'#fdf3d8', col:'#7a5000', sev:2});

    // Consistently low energy
    const lowEnergy = recent.filter(l=>l.energy==='1').length;
    if (lowEnergy >= 3)
      warnPats.push({pat:p, icon:'zz', msg:`Rapporterar låg energi ${lowEnergy} pass i rad -- kontrollera återhämtning`, tag:'Låg energi', bg:'#f0f2f4', col:'#4a5a6a', sev:1});
  });

  if (!warnPats.length) return;
  warnPats.sort((a,b)=>b.sev-a.sev);
  alertEl.innerHTML = `<div class="anomaly-hdr"><div class="anomaly-dot"></div><div style="font-size:12px;font-weight:700;color:#7a5000">Patientrapporter -- ${warnPats.length} signaler</div></div>` +
    warnPats.map(w => `<div class="anomaly-row" onclick="openPat('${w.pat.id}')">
      <div class="anomaly-icon"><div style="width:8px;height:8px;border-radius:50%;background:${w.sev>=3?'#c07070':w.sev>=2?'#c8a030':'#4a7aaa'};margin-top:2px"></div></div>
      <div style="flex:1"><div class="anomaly-name">${e(w.pat.name)}</div><div class="anomaly-msg">${w.msg}</div></div>
      <span class="anomaly-tag" style="background:${w.bg};color:${w.col}">${w.tag}</span>
    </div>`).join('');
  alertEl.style.display = 'block';
}

async function sendConsultMessage(patId) {
  const inp = document.getElementById('consult-inp');
  const msgs = document.getElementById('consult-msgs');
  const ov = document.getElementById('consult-overlay');
  const userText = inp?.value?.trim();
  if (!userText || !msgs || !ov) return;
  const key = getKey();
  if (!key) { alert('API-nyckel saknas.'); return; }
  inp.value = '';
  // Add user bubble
  msgs.innerHTML += `<div class="consult-bubble user">${e(userText)}</div>`;
  msgs.scrollTop = msgs.scrollHeight;
  // Add typing indicator
  const typingId = 'consult-typing-'+Date.now();
  msgs.innerHTML += `<div class="consult-bubble ai" id="${typingId}" style="color:var(--text3);font-style:italic">Analyserar...</div>`;
  msgs.scrollTop = msgs.scrollHeight;

  _consultHistory.push({role:'user', content:userText});
  const sysPrompt = ov.getAttribute('data-sys');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({model:MODEL_SONNET, max_tokens:800,
        system: sysPrompt,
        messages: _consultHistory
      })
    });
    const data = await res.json();
    const reply = (data.content||[]).map(b=>b.text||'').join('').trim();
    _consultHistory.push({role:'assistant', content:reply});
    const typingEl = document.getElementById(typingId);
    if (typingEl) typingEl.innerHTML = reply.replace(/\n/g,'<br>');
    msgs.scrollTop = msgs.scrollHeight;
  } catch(err) {
    const typingEl = document.getElementById(typingId);
    if (typingEl) typingEl.textContent = 'Fel -- kontrollera API-nyckel.';
  }
}

async function aiExtractDiagnoses(patId) {
  const pat = S.patients.find(p=>p.id===patId) || S.pat;
  if (!pat) return;
  const key = getKey(); if (!key) return;

  // Build context: SOAP + plan diagnosis
  const soapTexts = (pat.visits||[]).slice(0,3).map(v => {
    const s = v.soap||{};
    return [s.S,s.O,s.A,s.P].filter(Boolean).join(' ');
  }).join(' ');
  const planDiags = (pat.visits||[]).map(v => v.form?.diagnosis||v.plan?.diagnosis||'').filter(Boolean).join(', ');
  const context = [pat.notes||'', planDiags, soapTexts].filter(Boolean).join('\n');
  if (!context.trim()) return;

  const prompt = `Baserat på följande patientinformation, lista de troligaste diagnoserna/tillstånden i fallande prioritet. Returnera ENBART en JSON-array med strängar, max 5 diagnoser, inga kommentarer, inga backticks.\n\n${context.slice(0,1500)}`;
  try {
    const raw = await callAPI(prompt, [], key, MODEL_HAIKU);
    const clean = raw.replace(/```json|```/g,'').trim();
    const arr = JSON.parse(clean);
    if (!Array.isArray(arr)) return;
    const p2 = S.patients.find(p=>p.id===patId)||S.pat;
    if (!p2) return;
    const updated = {...p2, diagnoses: arr, diagnosis: arr[0]||p2.diagnosis||''};
    const saved = savePat(updated);
    if (S.pat && S.pat.id === patId) S.pat = saved;
    // Refresh detail view if open
    if (S.screen === 'detail' && S.pat?.id === patId) rDetail();
  } catch(e) {}
}

async function generateEpikris(patId) {
  const pat = S.patients.find(p=>p.id===patId) || S.pat;
  if (!pat) return;
  const key = getKey();
  if (!key) { alert('API-nyckel saknas.'); return; }
  const btn = document.getElementById('epikris-btn-'+patId);
  if (btn) { btn.textContent = 'Genererar epikris...'; btn.disabled = true; }

  const visits = (pat.visits||[]);
  const visitSummaries = visits.map((v,i) => {
    const soap = v.soap ? Object.entries(v.soap).filter(([,val])=>val).map(([k,val])=>`  ${k}: ${val}`).join('\n') : '';
    const plan = v.plan?.exercises?.length ? `  Plan: ${v.plan.exercises.length} övningar, ${v.plan.diagnosis||''}` : '';
    return `Besök ${visits.length-i} -- ${v.date||'?'}: NRS ${v.form?.pain??'?'}/10\n${soap}${plan}`;
  }).join('\n\n');

  const dateFirst = visits[visits.length-1]?.date || '--';
  const dateLast = visits[0]?.date || '--';
  const phase = PHASES[(pat.phase||1)-1]?.label || 'Fas 1';

  const prompt = `Skriv en professionell epikris/remissunderlag på svenska för nedanstående patient. Dokumentet ska vara kliniskt korrekt och formellt, lämpligt att bifoga en remiss eller överlämning till annan vårdgivare.

Patient: ${pat.name||'Okänd'}
Personnummer/Ålder: ${pat.birthdate||pat.birthYear||'--'}
Diagnos: ${pat.diagnosis||'--'}
Aktuell fas: ${phase}
Behandlingsperiod: ${dateFirst} - ${dateLast} (${visits.length} besök)
Klinik: ${CLINIC.name}, ${CLINIC.address}

Besöksöversikt:
${visitSummaries||'Inga journaler dokumenterade.'}

Strukturera epikrisen med dessa rubriker (inga onödiga fyllnadsfraser):
REMITTERANDE ENHET | PATIENTDATA | DIAGNOS OCH ANAMNES | UNDERSÖKNINGSFYND | BEHANDLING OCH FÖRLOPP | AKTUELLT STATUS | REKOMMENDATION`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({model:MODEL_SONNET, max_tokens:1200, messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const epikris = (data.content||[]).map(b=>b.text||'').join('').trim();
    if (btn) { btn.textContent = 'Generera epikris'; btn.disabled = false; }
    // Show in modal with copy + pre-formatted
    document.getElementById('mtitle').textContent = 'Epikris -- ' + (pat.name||'Patient');
    document.getElementById('mtext').style.cssText = 'white-space:pre-wrap;font-family:"DM Mono",monospace;font-size:11px;line-height:1.7;max-height:55vh;overflow-y:auto';
    document.getElementById('mtext').textContent = epikris;
    document.getElementById('modal').classList.add('open');
    document.getElementById('mconfirm').textContent = 'Kopiera epikris';
    document.getElementById('mconfirm').onclick = () => {
      navigator.clipboard.writeText(epikris).catch(()=>{});
      closeModal();
      document.getElementById('mtext').style.cssText = '';
      document.getElementById('mconfirm').textContent = 'OK';
      document.getElementById('mconfirm').onclick = closeModal;
    };
    // Reset button after success
    if (btn) { btn.textContent = 'Generera epikris'; btn.disabled = false; }
  } catch(err) {
    if (btn) { btn.textContent = 'Generera epikris'; btn.disabled = false; }
    alert('Fel vid generering: ' + err.message);
  }
}

function updateRemissPlaceholder(typeId) {
  const t = REMISS_TYPES.find(x => x.id === typeId);
  if (!t) return;
  const ta = document.getElementById('remiss-reason');
  if (ta) ta.placeholder = t.placeholder;
  REMISS_TYPES.forEach(x => {
    const lbl = document.getElementById('rtype-label-' + x.id);
    if (lbl) lbl.style.borderColor = x.id === typeId ? 'var(--accent)' : 'var(--border)';
  });
}

async function generateRemiss(patId) {
  const p = S.patients.find(x => x.id === patId) || S.pat;
  if (!p) return;
  const key = getKey(); if (!key) return;

  const typeVal   = document.querySelector('input[name="remiss-type"]:checked')?.value;
  const reason    = document.getElementById('remiss-reason')?.value?.trim();
  const notes     = document.getElementById('remiss-notes')?.value?.trim();
  const typeLabel = REMISS_TYPES.find(t => t.id === typeVal)?.label || typeVal;

  if (!typeVal)  { alert('Välj vart remissen ska skickas.'); return; }
  if (!reason)   { alert('Ange remissorsak.'); return; }

  const btn = document.getElementById('remiss-gen-btn');
  if (btn) { btn.textContent = 'Genererar...'; btn.disabled = true; }

  const visits    = p.visits || [];
  const diagList  = p.diagnoses?.length ? p.diagnoses.join(', ') : (p.diagnosis || '--');
  const age       = p.birthdate ? new Date().getFullYear() - parseInt(p.birthdate.slice(0,4)) : null;
  const phase     = PHASES[(p.phase||1)-1]?.label || '';
  const dateFirst = visits[visits.length-1]?.date || '--';
  const dateLast  = visits[0]?.date || '--';

  const soapSummary = visits.slice(0,3).map(v => {
    const s = v.soap; if (!s) return null;
    const parts = [];
    if (s.S) parts.push('S: ' + s.S.slice(0,140));
    if (s.O) parts.push('O: ' + s.O.slice(0,140));
    if (s.A) parts.push('A: ' + s.A.slice(0,80));
    if (!parts.length) return null;
    return `${v.date||'?'} (NRS ${v.form?.pain??'?'}/10):\n${parts.join('\n')}`;
  }).filter(Boolean).join('\n\n');

  const passLogs = getPassLogs(patId).slice(0,5);
  const avgPain  = passLogs.length ? (passLogs.reduce((s,l)=>s+(l.pain||0),0)/passLogs.length).toFixed(1) : null;

  const prompt = `Du är leg. naprapatt som skriver ett formellt remissbrev på svenska. Kliniskt korrekt, professionellt och koncist -- inga fyllnadsfraser.

REMITTERAS TILL: ${typeLabel}
FRÅGESTÄLLNING: ${reason}
${notes ? 'BEHANDLARENS TILLÄGG: ' + notes : ''}

PATIENT:
Namn: ${p.name||'--'}
${p.birthdate||p.birthYear ? 'Personnummer/Ålder: '+(p.birthdate||p.birthYear)+(age?' ('+age+' år)':'') : ''}
${p.phone ? 'Telefon: '+p.phone : ''}
Diagnoser: ${diagList}
Fas: ${phase} -- Behandlingsperiod: ${dateFirst}-${dateLast} (${visits.length} besök)
${avgPain ? 'Hemrapporterad smärta (NRS): '+avgPain+'/10' : ''}

JOURNALUTDRAG:
${soapSummary || 'Ingen journal dokumenterad.'}

Rubriker (VERSALER, innehåll på nästa rad):
REMITTERANDE ENHET
PATIENTDATA
DIAGNOS OCH ANAMNES
KLINISKA FYND
BEHANDLING OCH FÖRLOPP
FRÅGESTÄLLNING
ÖNSKAT OMHÄNDERTAGANDE

Avsluta med:
${CLINIC.name}
${CLINIC.address}
${CLINIC.phone} | ${CLINIC.email}
Datum: ${new Date().toLocaleDateString('sv-SE')}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({ model:MODEL_SONNET, max_tokens:1400, messages:[{role:'user',content:prompt}] })
    });
    const data = await res.json();
    const remiss = (data.content||[]).map(b=>b.text||'').join('').trim();
    if (btn) { btn.textContent = 'Generera remiss'; btn.disabled = false; }
    window._lastRemissText = remiss;

    const resultEl = document.getElementById('remiss-result');
    if (resultEl) {
      resultEl.style.display = 'block';
      resultEl.innerHTML = `
        <div style="border-top:1px solid var(--border);padding-top:16px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)">Genererat remissunderlag</div>
            <div style="display:flex;gap:6px">
              <button id="copy-remiss-btn" onclick="copyRemiss()" style="font-size:11px;font-weight:600;padding:5px 12px;background:var(--ink);color:white;border:none;border-radius:20px;cursor:pointer;font-family:var(--font)">Kopiera</button>
              <button onclick="printRemiss('${e(patId)}')" style="font-size:11px;font-weight:600;padding:5px 12px;background:transparent;color:var(--ink);border:1.5px solid var(--border2);border-radius:20px;cursor:pointer;font-family:var(--font)">Skriv ut</button>
            </div>
          </div>
          <div id="remiss-text-output" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-md);padding:16px;font-size:11.5px;font-family:var(--font-mono);line-height:1.85;white-space:pre-wrap;color:var(--ink);max-height:360px;overflow-y:auto">${e(remiss)}</div>
        </div>`;
      resultEl.scrollIntoView({ behavior:'smooth', block:'nearest' });
    }
  } catch(err) {
    if (btn) { btn.textContent = 'Generera remiss'; btn.disabled = false; }
    const resultEl = document.getElementById('remiss-result');
    if (resultEl) {
      resultEl.style.display = 'block';
      resultEl.innerHTML = `<div style="color:var(--red);font-size:12px;padding:10px 0">Fel vid generering: ${e(err.message)}</div>`;
    }
  }
}

function copyRemiss() {
  const text = window._lastRemissText || '';
  navigator.clipboard.writeText(text).catch(()=>{});
  const btn = document.getElementById('copy-remiss-btn');
  if (btn) { btn.textContent = 'Kopierad!'; setTimeout(()=>{ if(btn) btn.textContent='Kopiera'; }, 2000); }
}

function printRemiss(patId) {
  const text = window._lastRemissText || '';
  const p = S.patients.find(x => x.id === patId) || S.pat;
  const win = window.open('', '_blank');
  if (!win) return;
  win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Remiss -- ${e(p?.name||'')}</title>
  <style>body{font-family:'Times New Roman',serif;font-size:12pt;line-height:1.8;max-width:680px;margin:40px auto;color:#000}pre{white-space:pre-wrap;font-family:inherit;font-size:12pt}@media print{body{margin:20mm}}</style>
  </head><body><pre>${e(text)}</pre></body></html>`);
  win.document.close();
  setTimeout(()=>win.print(), 400);
}

let _briefingCache = []; // array of {date, time, text}

async function generateDailyBriefing(forceNew) {
  const today = new Date().toISOString().slice(0,10);
  const el  = document.getElementById('cc-briefing-text');
  const btn = document.getElementById('cc-briefing-btn');
  const hist = document.getElementById('cc-briefing-hist');
  if (!el) return;

  // Show latest cached entry if same day and not forced
  if (!forceNew && _briefingCache.length > 0 && _briefingCache[0].date === today) {
    _renderBriefing(_briefingCache[0]);
    return;
  }

  const key = getKey();
  if (!key) {
    el.innerHTML = '<span style="color:var(--muted);font-style:italic">Ange API-nyckel i Inställningar för daglig briefing.</span>';
    return;
  }

  el.innerHTML = '<span style="color:rgba(255,255,255,.3);font-style:italic">Genererar briefing...</span>';
  if (btn) btn.style.display = 'none';

  // Build context
  const now = new Date();
  const urgent = S.patients.filter(p => _clinPriority(p).level >= 3).slice(0,4);
  const overdue = S.patients.filter(p => {
    const v=(p.visits||[])[0]; if(!v?.date) return false;
    const due=new Date(v.date); due.setDate(due.getDate()+(v.form?.followup||4)*7);
    return due<=now;
  }).slice(0,4);
  const thisMonth = now.getMonth();
  let monthRevenue = 0;
  S.patients.forEach(p=>(p.visits||[]).forEach(v=>{
    const d=new Date(v.date||''); if(isNaN(d)) return;
    if(d.getMonth()===thisMonth) monthRevenue+=(v.servicePrice||0);
  }));

  const ctx = `Klinik: ${CLINIC.name||'Kliniken'}
Datum: ${now.toLocaleDateString('sv-SE',{weekday:'long',day:'numeric',month:'long'})}
Totalt patienter: ${S.patients.length}, Aktiva: ${S.patients.filter(p=>(p.visits||[])[0]?.status==='Aktiv').length}
Månadsintäkt: ${monthRevenue.toLocaleString('sv-SE')} kr
Kräver åtgärd: ${urgent.map(p=>p.name+'('+_clinPriority(p).primary+')').join(', ')||'inga'}
Förfallna återbesök: ${overdue.map(p=>p.name).join(', ')||'inga'}`;

  const prompt = `Du är AI-assistent för en kliniker. Skriv en kort morgonbriefing på 2-3 meningar på svenska. Tonen ska vara konkret och handlingsinriktad — som en erfaren kollega som sammanfattar läget. Nämn det viktigaste att agera på. Inga listor. Avsluta inte med "Ha en bra dag".\n\n${ctx}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:MODEL_HAIKU,max_tokens:200,messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const text = (data.content||[]).map(b=>b.text||'').join('').trim();
    if (text) {
      const entry = {
        date: today,
        time: now.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'}),
        text
      };
      _briefingCache.unshift(entry);
      if (_briefingCache.length > 5) _briefingCache.pop(); // keep last 5
      _renderBriefing(entry);
    }
  } catch(err) {
    el.innerHTML = '<span style="color:rgba(255,255,255,.4);font-style:italic">Briefing ej tillgänglig — kontrollera API-nyckel.</span>';
  }
}

let _briefingIdx = 0;
function _renderBriefing(entry) {
  const el  = document.getElementById('cc-briefing-text');
  const btn = document.getElementById('cc-briefing-btn');
  if (!el) return;
  el.style.cssText = 'font-size:14px;color:rgba(255,255,255,.8);line-height:1.8;font-style:normal';

    wrap.appendChild(ctrl);

  const idx = _briefingCache.indexOf(entry);

    +(idx > 0 ? '<button onclick="_briefingIdx--;_renderBriefing(_briefingCache[_briefingIdx])" style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.5);border-radius:7px;padding:5px 11px;font-size:11px;cursor:pointer;font-family:var(--font)">Nyare →</button>' : '')

}

async function sendVelaAsk(presetText) {
  const inp = document.getElementById('vela-ask-inp');
  const msgs = document.getElementById('vela-ask-msgs');
  const sugs = document.getElementById('vela-ask-sugs');
  const userText = presetText || inp?.value?.trim();

  if (inp) inp.value = '';
  if (sugs) sugs.remove();

  const key = getKey();

  // Add user message
  const userBubble = document.createElement('div');
  userBubble.className = 'vela-ask-msg-user';
  userBubble.textContent = userText;
  msgs.appendChild(userBubble);
  msgs.scrollTop = msgs.scrollHeight;

  // Typing indicator
  const typingId = 'va-typing-' + Date.now();
  const typing = document.createElement('div');
  typing.id = typingId;
  typing.className = 'vela-ask-msg-ai';
  typing.innerHTML = '<span style="opacity:.4;font-style:italic">Tänker...</span>';
  msgs.appendChild(typing);
  msgs.scrollTop = msgs.scrollHeight;

  if (!key) {
    typing.textContent = 'API-nyckel saknas — gå till Inställningar.';
    return;
  }

  // Build clinic context
  const now = new Date();
  const thisMonth = now.getMonth(); const thisYear = now.getFullYear();
  let monthRevenue = 0;
  S.patients.forEach(p => (p.visits||[]).forEach(v => {
    const d = new Date(v.date||''); if(isNaN(d)) return;
    if(d.getMonth()===thisMonth && d.getFullYear()===thisYear) monthRevenue += (v.servicePrice||0);
  }));

  const noInvoice = S.patients.filter(p => (p.visits||[]).some(v => v.servicePrice === 0 || !v.servicePrice));
  const inactive = S.patients.filter(p => {
    const last = (p.sessionLogs||[]).sort((a,b)=>b.date>a.date?1:-1)[0];
    return !last || (now - new Date(last.date||0)) > 7*86400000;
  });
  const urgent = S.patients.filter(p => _clinPriority(p).level >= 3);

  const ctx = `Du är AI-assistent för kliniken "${CLINIC.name || 'Kliniken'}".
Datum: ${now.toLocaleDateString('sv-SE')}
Totalt patienter: ${S.patients.length}
Aktiva patienter: ${S.patients.filter(p=>(p.visits||[])[0]?.status==='Aktiv').length}
Månadsintäkt: ${monthRevenue.toLocaleString('sv-SE')} kr

// ── PLAN RISK REVIEW SYSTEM ────────────────────────────────────────────────
// Runs after every plan generation. AI evaluates its own output and assigns
// green / yellow / red risk level. Green = auto-release. Yellow/red = queue.

async function reviewPlanRisk(patId, visitId) {
  const key = getKey(); if (!key) return;
  const pat = S.patients.find(p => p.id === patId) || S.pat;
  if (!pat) return;
  const visit = (pat.visits||[]).find(v => v.id === visitId);
  if (!visit?.plan) return;

  const plan = visit.plan;
  const form = visit.form || plan.form || {};
  const exList = (plan.exercises||[]).map((ex,i) => `${i+1}. ${ex.name} — ${ex.sets} set × ${ex.reps}, vila ${ex.rest}`).join('\n');

  const prompt = `Du är en erfaren naprapat som granskar en AI-genererad rehabiliteringsplan.
Din uppgift: bedöm om planen är säker att auto-releasas UTAN mänsklig granskning.

PATIENTDATA:
Namn: ${pat.name||'Okänd'}
Diagnos: ${form.diagnosis||plan.diagnosis||'Ej angiven'}
NRS smärta: ${form.pain||'okänt'}/10
Ålder/födelseår: ${form.birthYear||form.birthdate||'okänt'}
Anamnestiska noter: ${form.notes||'inga'}

GENERERAD PLAN (${(plan.exercises||[]).length} övningar, fas ${plan.phase||1}):
${exList}

Svara ENDAST med ett JSON-objekt, inga backticks, ingen annan text:
{
  "risk": "green" | "yellow" | "red",
  "reasons": ["kort orsak 1", "kort orsak 2"],
  "summary": "En mening om planen och patienten på svenska",
  "autoRelease": true | false
}

Röd = neurologiska tecken / röda flaggor / NRS >8 / komplex systemsjukdom / barn <16 år / gravid
Gul = NRS 7–8 / ovanlig diagnos / inkomplett data / hög ålder >75 / postoperativ
Grön = rutinfall, tydlig diagnos, NRS ≤6, inga röda flaggor, komplett underlag`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true' },
      body: JSON.stringify({ model: MODEL_SONNET, max_tokens: 400, messages: [{ role:'user', content: prompt }] })
    });
    const data = await res.json();
    const raw = (data.content||[]).map(b=>b.text||'').join('').trim();
    let review;
    try { review = JSON.parse(raw); } catch { review = { risk:'yellow', reasons:['Kunde inte tolka AI-svar'], summary:'Manuell granskning rekommenderas.', autoRelease:false }; }

    const autoReleaseHours = review.risk === 'green' ? 48 : 0;
    const autoReleaseAt = review.risk === 'green'
      ? new Date(Date.now() + autoReleaseHours * 3600 * 1000).toISOString()
      : null;

    const freshPat = S.patients.find(p => p.id === patId) || pat;
    const vIdx = (freshPat.visits||[]).findIndex(v => v.id === visitId);
    if (vIdx >= 0) {
      freshPat.visits[vIdx].planRisk = {
        level: review.risk,
        reasons: review.reasons || [],
        summary: review.summary || '',
        autoRelease: review.autoRelease !== false && review.risk === 'green',
        autoReleaseAt,
        reviewedAt: new Date().toISOString(),
        released: false,
      };
      savePat(freshPat);
      if (S.pat?.id === patId) S.pat = freshPat;
    }

    // If red — add to inbox immediately
    if (review.risk === 'red') {
      addInboxItem(patId, freshPat.name, 'ai_action', 'plan_risk_red',
        '⚠️ Plan kräver granskning',
        review.reasons.join(' · '),
        [{ label:'Granska nu', style:'primary', fn:`openDetail:${patId}` }]);
    }
  } catch(err) {
    console.error('[reviewPlanRisk]', err);
  }
}

// Runs on dashboard load — auto-releases green plans past their deadline
function checkPlanAutoRelease() {
  const now = new Date();
  let changed = false;
  S.patients.forEach(pat => {
    (pat.visits||[]).forEach(visit => {
      const r = visit.planRisk;
      if (!r || r.released) return;
      if (r.autoRelease && r.autoReleaseAt && new Date(r.autoReleaseAt) <= now) {
        r.released = true;
        r.releasedAt = now.toISOString();
        r.releasedBy = 'auto';
        visit.status = visit.status === 'Inväntar godkännande' ? 'Aktiv' : visit.status;
        changed = true;
      }
    });
    if (changed) savePat(pat);
  });
}

// Manually approve a plan from the review queue
function approvePlan(patId, visitId) {
  const pat = S.patients.find(p => p.id === patId);
  if (!pat) return;
  const vIdx = (pat.visits||[]).findIndex(v => v.id === visitId);
  if (vIdx < 0) return;
  const visit = pat.visits[vIdx];
  if (visit.planRisk) {
    visit.planRisk.released = true;
    visit.planRisk.releasedAt = new Date().toISOString();
    visit.planRisk.releasedBy = 'manual';
  }
  visit.status = 'Aktiv';
  savePat(pat);
  showAutoSaveToast('Plan godkänd ✓');
  if (S.screen === 'dashboard') rDashboard();
  if (S.pat?.id === patId) { S.pat = pat; rDetail(); }
}

// Build review queue HTML for dashboard panel
function buildReviewQueueHtml() {
  checkPlanAutoRelease();
  const queue = [];
  S.patients.forEach(pat => {
    (pat.visits||[]).forEach(visit => {
      const r = visit.planRisk;
      if (!r || r.released) return;
      if (r.level === 'green' && r.autoRelease) return; // auto handles these
      queue.push({ pat, visit, r });
    });
  });

  // Also collect green plans pending auto-release (show as info)
  const pending = [];
  S.patients.forEach(pat => {
    (pat.visits||[]).forEach(visit => {
      const r = visit.planRisk;
      if (!r || r.released) return;
      if (r.level === 'green' && r.autoRelease && r.autoReleaseAt) {
        pending.push({ pat, visit, r });
      }
    });
  });

  if (!queue.length && !pending.length) {
    return '<div style="font-size:12px;color:var(--muted);text-align:center;padding:16px 0;font-style:italic">Inga planer väntar granskning</div>';
  }

  const riskIcon = { red:'🔴', yellow:'🟡', green:'🟢' };
  const riskLabel = { red:'Röd flagga', yellow:'Granskas', green:'Auto-release' };

  let h = '';

  queue.forEach(({ pat, visit, r }) => {
    const releaseDate = r.autoReleaseAt ? new Date(r.autoReleaseAt).toLocaleDateString('sv-SE') : null;
    h += `<div style="border:1px solid ${r.level==='red'?'rgba(192,48,48,.3)':'rgba(138,96,0,.25)'};border-radius:12px;padding:12px;margin-bottom:10px;background:${r.level==='red'?'rgba(192,48,48,.05)':'rgba(138,96,0,.05)'}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:14px">${riskIcon[r.level]}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700;color:var(--text)">${e(pat.name)}</div>
          <div style="font-size:11px;color:var(--muted)">${e(visit.form?.diagnosis||visit.plan?.diagnosis||'Okänd diagnos')} · ${visit.date||''}</div>
        </div>
        <span style="font-size:10px;font-weight:600;color:${r.level==='red'?'#c03030':'#8a6000'};background:${r.level==='red'?'rgba(192,48,48,.1)':'rgba(138,96,0,.1)'};padding:3px 8px;border-radius:20px">${riskLabel[r.level]}</span>
      </div>
      ${r.reasons?.length ? `<div style="font-size:11px;color:var(--muted);margin-bottom:8px">${r.reasons.join(' · ')}</div>` : ''}
      <div style="display:flex;gap:8px">
        <button onclick="approvePlan('${pat.id}','${visit.id}')" style="flex:1;background:var(--teal);color:white;border:none;border-radius:8px;padding:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font)">✓ Godkänn</button>
        <button onclick="openPat('${pat.id}')" style="background:none;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 12px;font-size:11px;cursor:pointer;font-family:var(--font)">Granska</button>
      </div>
    </div>`;
  });

  if (pending.length) {
    h += `<div style="font-size:11px;color:var(--muted);padding:6px 0">🟢 ${pending.length} plan${pending.length>1?'er':''} auto-releasas inom 48h</div>`;
  }

  return h;
}

  const urgent = S.patients.filter(p => _clinPriority(p).level >= 3);
  const inactive = S.patients.filter(p => {
    const last = (p.sessionLogs||[]).sort((a,b)=>b.date>a.date?1:-1)[0];
    return !last || (now-new Date(last.date||0)) > 7*86400000;
  });
  const diagCount = {};
  S.patients.forEach(p => { const d = p.diagnosis||'Okänd'; diagCount[d]=(diagCount[d]||0)+1; });
  const topDiag = Object.entries(diagCount).sort((a,b)=>b[1]-a[1])[0];

  const prompt = `Du är en AI-analytiker för en klinik. Analysera datan och ge 4 konkreta insikter. Varje insikt ska ha: rubrik, analys (1-2 meningar), och en specifik rekommendation. Svara ENBART med JSON utan backticks:
[{"title":"rubrik","body":"analys","action":"rekommendation","level":"info|warning|success"}]

Klinikdata:
- Totalt patienter: ${S.patients.length}, Aktiva: ${S.patients.filter(p=>(p.visits||[])[0]?.status==='Aktiv').length}
- Månadsintäkt: ${monthRev.toLocaleString('sv-SE')} kr
- Kräver åtgärd: ${urgent.length} patienter (${urgent.slice(0,3).map(p=>p.name).join(', ')})
- Inaktiva >7 dagar: ${inactive.length}
- Vanligaste diagnos: ${topDiag?topDiag[0]+' ('+topDiag[1]+' pat)':'okänd'}
- Patienter utan Hael-plan: ${S.patients.filter(p=>!(p.visits||[]).some(v=>v.plan)).length}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({model:MODEL_HAIKU, max_tokens:600, messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const raw = (data.content||[]).map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
    const insights = JSON.parse(raw);
    const dotColors = {success:'var(--teal,#0d9b8a)',warning:'var(--gold,#c8a030)',info:'var(--navy,#0f2744)'};
    el.innerHTML = insights.map(function(ins) {
      return '<div class="intel-insight">'
        + '<div class="intel-insight-dot" style="background:'+(dotColors[ins.level]||dotColors.info)+'"></div>'
        + '<div>'
        + '<div class="intel-insight-title">'+e(ins.title)+'</div>'
        + '<div class="intel-insight-body">'+e(ins.body)+'</div>'
        + (ins.action ? '<div style="font-size:11px;color:var(--teal,#0d9b8a);font-weight:600;margin-top:4px">→ '+e(ins.action)+'</div>' : '')
        + '</div></div>';
    }).join('');
  } catch(err) {
    el.innerHTML = '<div style="font-size:13px;color:var(--red,#c05050)">Analys misslyckades — kontrollera API-nyckel.</div>';
  }
}

// ── SHOW DROPOUT LIST ──────────────────────────────────────────
function showDropoutList() {
  const now = new Date();
  const pats = S.patients.filter(function(p) {
    var v = (p.visits||[])[0]; if (!v || !v.plan) return false;
    var logs = getPassLogs(p.id);
    var days = logs.length
      ? Math.floor((now - new Date(logs[0].ts||0)) / 86400000)
      : Math.floor((now - new Date(v.date||0)) / 86400000);
    return days >= 10;
  }).map(function(p) {
    var v = (p.visits||[])[0];
    var logs = getPassLogs(p.id);
    var days = logs.length
      ? Math.floor((now - new Date(logs[0].ts||0)) / 86400000)
      : Math.floor((now - new Date(v.date||0)) / 86400000);
    var revRisk = 1800;
    return { p, days, revRisk };
  }).sort(function(a,b) { return b.days - a.days; });

  var ov = document.createElement('div');
  ov.id = 'dropout-ov';
  ov.style.cssText = 'position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeInOv .18s ease';
  ov.onclick = function(ev) { if(ev.target===ov) ov.remove(); };

  var rows = pats.map(function(x) {
    var initials = (x.p.name||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase();
    var urgency = x.days >= 21 ? '#e05555' : x.days >= 14 ? '#d4a843' : 'var(--text3)';
    var patId = x.p.id;
    var row = document.createElement('div');
    row.className = 'dropout-list-row';
    row.innerHTML = '<div style="width:36px;height:36px;border-radius:50%;background:var(--surface3);color:var(--ink);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);flex-shrink:0">'+initials+'</div>'
      + '<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--ink)">'+e(x.p.name)+'</div><div style="font-size:11px;color:var(--text3);margin-top:1px">'+e(x.p.diagnosis||'')+'</div></div>'
      + '<div style="text-align:right;flex-shrink:0"><div style="font-size:13px;font-weight:700;color:'+urgency+'">'+x.days+' dagar</div><div style="font-size:10px;color:var(--text3)">~'+x.revRisk.toLocaleString('sv-SE')+' kr risk</div></div>';
    row.onclick = function() { document.getElementById('dropout-ov').remove(); openPat(patId); };
    return row.outerHTML;
  }).join('');
  var totalRisk = pats.reduce(function(s,x){return s+x.revRisk;},0);

  ov.innerHTML = '<div style="background:var(--surface);border-radius:18px;width:100%;max-width:520px;overflow:hidden;box-shadow:var(--shadow-lg)" onclick="event.stopPropagation()">'
    + '<div style="background:var(--navy2);padding:20px 22px;display:flex;align-items:flex-start;justify-content:space-between">'
    + '<div>'
    + '<div style="font-size:16px;font-weight:700;color:white">Avhoppsrisk</div>'
    + '<div style="font-size:12px;color:rgba(255,255,255,.4);margin-top:3px">'+pats.length+' patienter · ~'+totalRisk.toLocaleString('sv-SE')+' kr i riskintäkt</div>'
    + '</div>'
    + '<button onclick="document.getElementById(\'dropout-ov\').remove()" style="background:none;border:none;color:rgba(255,255,255,.4);font-size:22px;cursor:pointer;line-height:1;padding:0">×</button>'
    + '</div>'
    + '<div style="max-height:400px;overflow-y:auto">'
    + (rows || '<div style="padding:32px;text-align:center;font-size:13px;color:var(--text3)">Inga riskpatienter just nu</div>')
    + '</div>'
    + '<div style="padding:14px 16px;border-top:1px solid var(--border);display:flex;gap:8px">'
    + '<button onclick="document.getElementById(\'dropout-ov\').remove()" style="flex:1;padding:10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;font-size:13px;cursor:pointer;font-family:var(--font);color:var(--ink)">Stäng</button>'
    + '<button onclick="document.getElementById(\'dropout-ov\').remove();openInbox()" style="flex:1;padding:10px;background:var(--navy);color:white;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font)">Skicka påminnelser →</button>'
    + '</div>'
    + '</div>';

  document.body.appendChild(ov);
}

function renderActivityLog(pat) {
  var events = [];
  function addEv(ts, source, category, text, detail) {
    if (!ts) return;
    var d = typeof ts === 'number' ? ts : new Date(ts).getTime();
    if (isNaN(d)) return;
    events.push({ ts:d, source:source, category:category, text:text, detail:detail||'' });
  }
  (pat.visits||[]).forEach(function(v, i) {
    var n = pat.visits.length - i;
    if (v.date) addEv(v.date+'T09:00:00','K','visit','Besök '+n+' registrerat',
      [v.form&&v.form.diagnosis||pat.diagnosis, v.service,
       v.servicePrice?v.servicePrice.toLocaleString('sv-SE')+' kr':''].filter(Boolean).join(' · '));
    if (v.soap&&(v.soap.S||v.soap.O||v.soap.A||v.soap.P)||v.note)
      addEv(v.date+'T09:30:00','K','journal','Journalanteckning skapad',(v.soap&&v.soap.A||'').slice(0,80));
    if (v.plan) addEv(v.date+'T10:00:00','K','plan','Hael-plan genererad',
      (v.plan.exercises||[]).length+' övningar');
    if (v.plan&&v.plan.lastAdjusted) addEv(v.plan.lastAdjusted,'S','plan_adj','Plan justerad av AI','');
  });
  (pat.messages||[]).forEach(function(m) {
    if (!m.ts) return;
    var src = m.from==='patient'?'P':m.aiGenerated?'S':'K';
    var lbls = {ai_inactivity:'AI: inaktivitet',ai_compliance:'AI: följsamhet',
      ai_pain_checkin:'AI: smärtkontroll',ai_followup_reminder:'AI: återbesök',
      quick:'Snabbmeddelande',custom:'Meddelande'};
    var lbl = lbls[m.type]||(m.from==='patient'?'Patientsvar':'Meddelande');
    addEv(m.ts,src,'message',lbl,(m.text||'').slice(0,80));
  });
  (pat.sessionLogs||[]).forEach(function(s) {
    if (!s.date||!s.done) return;
    addEv(s.date+'T12:00:00','P','pass','Pass genomfört · '+s.done+' övningar','');
  });
  var nrsLogs = (pat.symptomLogs||[]).filter(function(l){return l.nrs!=null;})
    .sort(function(a,b){return (a.date||'')<(b.date||'')?-1:1;});
  nrsLogs.forEach(function(l,i) {
    var prev = nrsLogs[i-1];
    if (!prev){addEv(l.date,'P','pain','Smärta loggad NRS '+l.nrs+'/10','');return;}
    var d = l.nrs-prev.nrs;
    if (Math.abs(d)>=1.5) addEv(l.date,'P','pain',
      d>0?'Smärta ökade till NRS '+l.nrs+'/10':'Smärta minskade till NRS '+l.nrs+'/10','');
  });
  getInbox().filter(function(x){return x.patId===pat.id;}).forEach(function(item) {
    addEv(item.ts,'S','ai_flag',item.title||'AI-flagga',(item.body||'').slice(0,80));
  });
  if (!events.length) return '';
  events.sort(function(a,b){return b.ts-a.ts;});
  var byDate = {};
  events.forEach(function(ev) {
    var d = new Date(ev.ts).toLocaleDateString('sv-SE',{weekday:'short',day:'numeric',month:'short'});
    if (!byDate[d]) byDate[d]=[];
    byDate[d].push(ev);
  });
  var sc = {
    K:{l:'Klinik',  w:'700',c:'var(--ink)',  dot:'var(--accent)'},
    P:{l:'Patient', w:'400',c:'var(--text2)',dot:'rgba(0,0,0,.2)'},
    S:{l:'System',  w:'400',c:'var(--muted)',dot:'rgba(0,0,0,.12)',i:true}
  };
  var groups = Object.entries(byDate).map(function(entry) {
    var date = entry[0], evs = entry[1];
    var rows = evs.map(function(ev) {
      var s = sc[ev.source]||sc.S;
      var time = new Date(ev.ts).toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'});
      return '<div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid rgba(0,0,0,.04)">'
        +'<div style="width:16px;height:16px;border-radius:4px;background:rgba(0,0,0,.04);'
        +'flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center">'
        +'<div style="width:5px;height:5px;border-radius:50%;background:'+s.dot+'"></div></div>'
        +'<div style="flex:1;min-width:0">'
        +'<div style="display:flex;align-items:baseline;gap:6px;flex-wrap:wrap">'
        +'<span style="font-size:12px;font-weight:'+s.w+';color:'+s.c+';'+(s.i?'font-style:italic;':'')+'">'
        +e(ev.text)+'</span>'
        +'<span style="font-size:10px;color:var(--muted)">'+time+'</span>'
        +'<span style="font-size:10px;color:rgba(0,0,0,.18)">'+s.l+'</span>'
        +'</div>'
        +(ev.detail?'<div style="font-size:11px;color:var(--muted);margin-top:2px">'+e(ev.detail)+'</div>':'')
        +'</div></div>';
    }).join('');
    return '<div style="margin-bottom:12px">'
      +'<div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;'
      +'color:var(--muted);padding:5px 0;border-bottom:1px solid var(--border);margin-bottom:3px">'
      +date+'</div>'+rows+'</div>';
  }).join('');
  return '<div style="margin-top:20px">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
    +'<div style="font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;'
    +'color:var(--muted)">Aktivitetslogg</div>'
    +'<div style="font-size:10px;color:var(--muted)">'+events.length+' händelser</div>'
    +'</div>'
    +'<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;'
    +'padding:12px 16px;max-height:460px;overflow-y:auto">'
    +(groups||'<div style="font-size:13px;color:var(--muted);text-align:center;padding:20px">'
    +'Ingen aktivitet ännu</div>')
    +'</div></div>';
}

  // Preserve existing logoData
  const existing = getClinicConfig();
  if (existing.logoData) cfg.logoData = existing.logoData;
  const fileInput = document.querySelector('#clinic-config-ov input[type="file"]');
  if (fileInput?._logoData) cfg.logoData = fileInput._logoData;

  saveClinicConfig(cfg);
  document.getElementById('clinic-config-ov')?.remove();
  const toast = document.getElementById('autosave-toast');
  if (toast) { toast.textContent = 'Klinikprofil sparad'; toast.style.display='block'; toast.style.opacity='1'; setTimeout(()=>{toast.style.opacity='0';setTimeout(()=>toast.style.display='none',400);},2000); }
  if (typeof rSettings === 'function' && document.getElementById('s-settings')?.classList.contains('active')) rSettings();
}


async function syncFromCloud() {
  setSyncStatus('syncing', 'Hämtar...');
  const cloudPats = await sbLoadAll();
  if (!cloudPats) { setSyncStatus('error', 'Anslutningsfel'); return; }

  // Merge: newer wins, but never overwrite local data that has visits/plans with empty cloud
  const local = {};
  S.patients.forEach(p => local[p.id] = p);

  cloudPats.forEach(cp => {
    if (!cp || !cp.id) return;
    const lp = local[cp.id];
    if (!lp) {
      local[cp.id] = cp;
      try { localStorage.setItem('kansei-data:'+cp.id, JSON.stringify(cp)); } catch(e) {}
    } else {
      const cloudNewer = (cp.updatedAt||0) > (lp.updatedAt||0);
      const localHasMoreData = (lp.visits||[]).length > (cp.visits||[]).length;
      if (cloudNewer && !localHasMoreData) {
        // Cloud is newer and not losing visits -- use cloud
        local[cp.id] = cp;
        try { localStorage.setItem('kansei-data:'+cp.id, JSON.stringify(cp)); } catch(e) {}
      } else if (cloudNewer && localHasMoreData) {
        // Cloud is newer but local has more visits -- merge visits from both
        const cloudVisitIds = new Set((cp.visits||[]).map(v=>v.id));
        const extraLocalVisits = (lp.visits||[]).filter(v=>!cloudVisitIds.has(v.id));
        const merged = {...cp, visits:[...(cp.visits||[]), ...extraLocalVisits]
          .sort((a,b)=>new Date(b.date||0)-new Date(a.date||0))};
        local[cp.id] = merged;
        try { localStorage.setItem('kansei-data:'+cp.id, JSON.stringify(merged)); } catch(e) {}
      }
      // else: local is newer, keep local (already in local[])
    }
  });

  S.patients = Object.values(local).sort((a,b) => (b.updatedAt||0)-(a.updatedAt||0));
  setSyncStatus('ok', cloudPats.length + ' patienter');
  setTimeout(() => setSyncStatus('idle', ''), 3000);

  // Re-render current screen
  if (S.screen === 'dashboard') rDashboard();
  else if (S.screen === 'list') rList();

  // Run inbox agent on fresh data
  setTimeout(() => runInboxAgent(S.patients), 500);
}

async function syncToCloud() {
  if (_sbSyncing) return;
  _sbSyncing = true;
  setSyncStatus('syncing', 'Sparar...');
  let ok = true;
  for (const p of S.patients) {
    const r = await sbUpsertPat(p);
    if (!r) { ok = false; break; }
  }
  _sbSyncing = false;
  if (ok) {
    setSyncStatus('ok', 'Synkad');
    setTimeout(() => setSyncStatus('idle', ''), 3000);
  } else {
    setSyncStatus('error', 'Synkfel');
  }
}
