async function generateProgressNote(pat) {
  const visits = (pat.visits||[]).slice(); // newest first
  if (visits.length < 1) return null;
  const key = getKey();
  if (!key) return null;

  // Build a structured summary of ALL visits
  const visitSummaries = visits.map((v, i) => {
    const soap = v.soap ? Object.entries(v.soap).filter(([,val])=>val).map(([k,val])=>`  ${k}: ${val}`).join('\n') : '';
    const pain = v.form?.pain ?? v.soapMeta?.pain ?? '--';
    const diag = v.form?.diagnosis || v.plan?.diagnosis || '';
    const planSummary = v.plan?.exercises?.length
      ? `  Plan: ${v.plan.exercises.length} övningar (${v.plan.exercises.slice(0,3).map(e=>e.name).join(', ')}${v.plan.exercises.length>3?'...':''})`
      : '';
    return `Besök ${visits.length - i} (${v.date||'okänt datum'})${diag?' -- '+diag:''}:\n  NRS: ${pain}/10\n${soap}${planSummary}`;
  }).join('\n\n');

  // Detect time gaps
  const dateFirst = visits[visits.length-1]?.date;
  const dateLast = visits[0]?.date;
  const totalMonths = (dateFirst && dateLast)
    ? Math.round((new Date(dateLast)-new Date(dateFirst)) / (1000*60*60*24*30))
    : null;

  const timeContext = totalMonths !== null
    ? (totalMonths > 12
        ? `Patienten har ett långt uppföljningsförlopp (${totalMonths} månader) med möjliga uppehåll. Ta hänsyn till tidsgapen mellan besök.`
        : `Besöken sträcker sig över ${totalMonths} månader.`)
    : '';

  const prompt = `Du är leg. fysioterapeut. Analysera patientens besökshistorik och svara ENBART med JSON utan backticks.

Patient: ${pat.name||'Okänd'}, ${pat.diagnosis||'--'}
${timeContext}

Besöksöversikt:
${visitSummaries}

JSON-format:
{
  "trend": "1-2 meningar om smärttrend och förlopp (NRS-värden, riktning)",
  "function": "1-2 meningar om funktionsutveckling och compliance med övningsprogram",
  "findings": "1-2 meningar om viktiga kliniska fynd eller varningssignaler (skriv 'Inga röda flaggor noterade.' om inget anmärkningsvärt)",
  "recommendation": "1-2 meningar om konkret rekommendation inför nästa besök",
  "phase": "Aktuell fas och motivering i en mening",
  "flag": true eller false (true om det finns röda flaggor eller remissbehov)
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({model:MODEL_HAIKU, max_tokens:700, messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const raw = (data.content||[]).map(b=>b.text||'').join('').trim();
    return JSON.parse(raw.replace(/```json|```/g,'').trim());
  } catch(e) {
    return null;
  }
}

  el.style.color = colors[state] || colors.idle;
}

async function sbUpsertPat(p) {
  try {
    const res = await fetchWithTimeout(
      SB_URL + '/rest/v1/patients?id=eq.' + encodeURIComponent(p.id),
      {
        method: 'PATCH',
        headers: { ...sbHeaders(), 'Prefer': 'return=minimal' },
        body: JSON.stringify({ data: p, updated_at: new Date().toISOString() })
      }
    );
    if (res.ok) return true;
    // Try insert if not found
    const ins = await fetchWithTimeout(
      SB_URL + '/rest/v1/patients',
      {
        method: 'POST',
        headers: { ...sbHeaders(), 'Prefer': 'return=minimal' },
        body: JSON.stringify({ id: p.id, data: p, updated_at: new Date().toISOString() })
      }
    );
    return ins.ok;
  } catch(e) { return false; }
}

async function sbLoadAll() {
  try {
    const res = await fetchWithTimeout(
      SB_URL + '/rest/v1/patients?select=id,data,updated_at&order=updated_at.desc&limit=500',
      { headers: sbHeaders() }
    );
    if (!res.ok) return null;
    const rows = await res.json();
    return rows.map(r => {
      const d = typeof r.data === 'string' ? JSON.parse(r.data) : r.data;
      return d || null;
    }).filter(Boolean);
  } catch(e) { return null; }
}

async function sbKeepAlive() {
  try {
    await fetchWithTimeout(
      SB_URL + '/rest/v1/patients?limit=1',
      { headers: sbHeaders() },
      3000
    );
  } catch(e) {}
  setTimeout(() => sbKeepAlive(), 4 * 60 * 1000);
}

async function _sbSaveClinicSettings(settings) {
  try {
    const existing = await fetchWithTimeout(
      SB_URL + '/rest/v1/clinic_settings?id=eq.' + SETTINGS_ID,
      { headers: sbHeaders() }
    );
    const rows = existing.ok ? await existing.json() : [];
    const method = rows.length ? 'PATCH' : 'POST';
    const url = rows.length
      ? SB_URL + '/rest/v1/clinic_settings?id=eq.' + SETTINGS_ID
      : SB_URL + '/rest/v1/clinic_settings';
    const body = rows.length
      ? { data: settings, updated_at: new Date().toISOString() }
      : { id: SETTINGS_ID, data: settings, updated_at: new Date().toISOString() };
    await fetchWithTimeout(url, {
      method,
      headers: { ...sbHeaders(), 'Prefer': 'return=minimal' },
      body: JSON.stringify(body)
    });
  } catch(e) {}
}

async function _sbLoadClinicSettings() {
  try {
    const res = await fetchWithTimeout(
      SB_URL + '/rest/v1/clinic_settings?id=eq.' + SETTINGS_ID,
      { headers: sbHeaders() }
    );
    if (!res.ok) return null;
    const rows = await res.json();
    if (!rows.length) return null;
    return typeof rows[0].data === 'string' ? JSON.parse(rows[0].data) : rows[0].data;
  } catch(e) { return null; }
}

async function loadClinicSettings() {
  const settings = await _sbLoadClinicSettings();
  if (!settings) { _applyClinicConfig(getClinicConfig()); return; }
  if (settings.voiceProfile) {
    try { localStorage.setItem(VOICE_PROFILE_KEY, JSON.stringify(settings.voiceProfile)); } catch(e) {}
  }
  if (settings.clinicConfig) {
    try { localStorage.setItem(CLINIC_CONFIG_KEY, JSON.stringify(settings.clinicConfig)); } catch(e) {}
    _applyClinicConfig(settings.clinicConfig);
  } else {
    _applyClinicConfig(getClinicConfig());
  }
}

let _authUser = null;
let _publicPlanCache = null;

async function sbSignIn(email, password) {
  try {
    const res = await fetch(SB_URL + '/auth/v1/token?grant_type=password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (data.access_token) {
      _authUser = data.user;
      localStorage.setItem('kansei:auth', JSON.stringify({ token: data.access_token, user: data.user, exp: Date.now() + (data.expires_in||3600)*1000 }));
      return { ok: true };
    }
    return { ok: false, msg: data.error_description || data.msg || 'Fel e-post eller lösenord.' };
  } catch(e) {
    return { ok: false, msg: 'Anslutningsfel -- kontrollera internet.' };
  }
}

async function sbSignOut() {
  localStorage.removeItem('kansei:auth');
  _authUser = null;
  rLogin();
}

function getStoredAuth() {
  try {
    const a = JSON.parse(localStorage.getItem('kansei:auth')||'null');
    if (a && a.exp > Date.now()) return a;
    return null;
  } catch(e) { return null; }
}

async function doSwapWithReason(idx, reason) {
  const key = getKey();
  if (!key) { alert('API-nyckel saknas.'); return; }
  const ex = S.plan?.exercises?.[idx];
  if (!ex) return;
  const f = S.form || S.plan?.form || {};

  // Show inline spinner on the exercise card in editex
  const items = document.querySelectorAll('.ee-item');
  if (items[idx]) items[idx].style.opacity = '0.4';

  const prompt = `Du är fysioterapeut. Byt ut EN övning i ett rehabprogram.

Diagnos: ${S.plan?.diagnosis || f.diagnosis || ''}
Patient: f.${f.birthdate||f.birthYear||'?'}, NRS ${f.pain||'?'}/10, plats: ${f.location||'hem'}
Övning att byta: "${ex.name}"
Anledning: ${reason || 'Generellt byte'}
Övriga övningar i programmet: ${(S.plan?.exercises||[]).filter((_,i)=>i!==idx).map(e=>e.name).join(', ')}

Svara ENBART med JSON utan backticks -- EN ny övning som ersätter den gamla:
{"name":"namn","purpose":"muskler och varför","startPosition":"exakt position","steps":["steg1","steg2","steg3","steg4"],"sets":3,"reps":"10","rest":"60 sek","tip":"säkerhetsanmärkning","correctFeel":"muskelaktivering","swapReason":"kort förklaring varför detta val"}`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:MODEL_HAIKU,max_tokens:800,system:"Svara ALLTID med giltig JSON. Inga backticks.",messages:[{role:"user",content:prompt}]})});
    const data = await res.json();
    const txt = (data.content||[]).map(b=>b.text||'').join('');
    const newEx = JSON.parse(txt.replace(/```json|```/g,'').trim());
    S.plan.exercises[idx] = newEx;
    if (S.pat && S.visitId) {
      S.pat.visits = S.pat.visits.map(v=>v.id===S.visitId?{...v,plan:S.plan}:v);
      savePat(S.pat);
    }
    rEditEx();
    // Show brief success toast
    const toast = document.createElement('div');
    toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a7a4a;color:white;padding:10px 20px;border-radius:20px;font-size:13px;z-index:700;animation:fadeInOv .2s ease';
    toast.textContent = `Bytt till "${newEx.name}"${newEx.swapReason ? ' -- ' + newEx.swapReason : ''}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3500);
  } catch(err) {
    alert('Byte misslyckades: ' + err.message);
    if (items[idx]) items[idx].style.opacity = '1';
  }
}

// -- INLINE PLAN EDITING --------------------------------------------------------
let _planEditMode = false;

function togglePlanEdit() {
  _planEditMode = !_planEditMode;
  const btn = document.querySelector('[onclick="togglePlanEdit()"]');
  if (_planEditMode) {
    if (btn) { btn.textContent = 'Spara ändringar'; btn.style.background = 'var(--teal)'; btn.style.color = 'white'; }
    enablePlanEdit();
  } else {
    savePlanEdits();
    if (btn) { btn.textContent = 'Redigera'; btn.style.background = ''; btn.style.color = ''; }
  }
}

function enablePlanEdit() {
  // Greeting
  const greet = document.querySelector('.dgreet');
  if (greet) { greet.contentEditable = 'true'; greet.style.outline = '2px solid var(--teal)'; greet.style.borderRadius = '6px'; greet.style.padding = '4px'; }
  // Goals text
  document.querySelectorAll('[data-goal-text]').forEach(el => { el.contentEditable = 'true'; el.style.outline = '1px solid var(--teal)'; el.style.borderRadius = '4px'; el.style.padding = '2px 4px'; });
  // Exercise names and dose
  document.querySelectorAll('[data-ex-name]').forEach(el => { el.contentEditable = 'true'; el.style.outline = '1px solid var(--teal)'; el.style.borderRadius = '4px'; });
  // Lifestyle tips
  document.querySelectorAll('[data-tip-text]').forEach(el => { el.contentEditable = 'true'; el.style.outline = '1px solid var(--teal)'; el.style.borderRadius = '4px'; });
  // Followup note
  const fn = document.querySelector('[data-followup-note]');
  if (fn) { fn.contentEditable = 'true'; fn.style.outline = '2px solid rgba(255,255,255,.5)'; fn.style.borderRadius = '6px'; }
}

function savePlanEdits() {
  if (!S.plan) return;
  const greet = document.querySelector('.dgreet');
  if (greet) S.plan.greeting = greet.textContent.trim();
  document.querySelectorAll('[data-goal-text]').forEach((el,i) => { if (S.plan.goals?.[i]) S.plan.goals[i].text = el.textContent.trim(); });
  document.querySelectorAll('[data-ex-name]').forEach((el,i) => { if (S.plan.exercises?.[i]) S.plan.exercises[i].name = el.textContent.trim(); });
  document.querySelectorAll('[data-tip-text]').forEach((el,i) => { if (S.plan.lifestyleTips?.[i]) S.plan.lifestyleTips[i] = el.textContent.trim(); });
  const fn = document.querySelector('[data-followup-note]');
  if (fn) S.plan.followupNote = fn.textContent.trim();
  if (S.pat && S.visitId) {
    S.pat.visits = S.pat.visits.map(v=>v.id===S.visitId?{...v,plan:S.plan}:v);
    savePat(S.pat);
  }
  // Turn off contentEditable
  ['.dgreet','[data-goal-text]','[data-ex-name]','[data-tip-text]','[data-followup-note]'].forEach(sel => {
    document.querySelectorAll(sel).forEach(el => { el.contentEditable = 'false'; el.style.outline = ''; el.style.padding = ''; });
  });
  _planEditMode = false;
}

async function generateTherapistMessage() {
  const key = getKey();
  if (!key || !S.plan || !S.pat) return;

  const ta = document.getElementById('therapist-msg-input');
  const btn = document.getElementById('therapist-msg-gen-btn');
  if (!ta) return;

  // Show loading state
  if (btn) { btn.textContent = 'Genererar...'; btn.disabled = true; }
  ta.placeholder = 'AI formulerar meddelande...';
  ta.style.opacity = '.5';

  const pat = S.pat;
  const plan = S.plan;
  const soap = (pat.visits||[]).find(v=>v.id===S.visitId)?.soap || {};
  const diagList = (pat.diagnoses||[]).length ? pat.diagnoses : [pat.diagnosis||''];
  const goals = (plan.goals||[]).map(g=>`${g.title}: ${g.text}`).join('\n');
  const exNames = (plan.exercises||[]).slice(0,4).map(e=>e.name).join(', ');

  const prompt = `Du är en omtänksam fysioterapeut. Skriv ett kort, personligt meddelande direkt till patienten som ska visas i deras rehabplan i mobilen.

PATIENT: ${pat.name||'Patienten'}, ${new Date().getFullYear() - (pat.birthYear||2000)} år
DIAGNOS: ${diagList.join(', ')}
JOURNALBEDÖMNING: ${soap.A||''}
BEHANDLINGSPLAN: ${soap.P||''}
MÅL: ${goals}
ÖVNINGAR I PLANEN: ${exNames}
SMÄRTNIVÅ: NRS ${plan.form?.pain||'?'}/10

Skriv 2-3 meningar. Ton: varm, professionell, uppmuntrande. Adressera patienten direkt (du/dig). Referera konkret till deras situation. Nämn INTE att du är en AI. Returnera BARA texten, inga citattecken, ingen förklaring.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({model:MODEL_HAIKU, max_tokens:200, system:'Skriv bara meddelandetexten, inget annat.', messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const msg = (data.content||[]).map(b=>b.text||'').join('').trim().replace(/^["']|["']$/g,'');
    if (msg && ta) {
      ta.value = msg;
      ta.style.opacity = '1';
      saveTherapistMessage(msg);
    }
  } catch(err) {
    console.warn('therapistMessage generation failed:', err);
  }
  if (btn) { btn.textContent = 'Generera förslag'; btn.disabled = false; }
  if (ta) ta.style.opacity = '1';
}

function saveTherapistMessage(msg) {
  if (!S.plan || !S.pat || !S.visitId) return;
  clearTimeout(window._therapistMsgTimer);
  window._therapistMsgTimer = setTimeout(() => {
    S.plan.therapistMessage = msg.trim();
    S.plan.therapistMessageDate = new Date().toISOString();
    S.pat.visits = S.pat.visits.map(v => v.id===S.visitId ? {...v, plan:S.plan} : v);
    savePat(S.pat);
    const saved = document.getElementById('therapist-msg-saved');
    if (saved) { saved.style.opacity='1'; setTimeout(()=>{ saved.style.opacity='0'; }, 1800); }
  }, 800);
}

// -- INTAKE SYSTEM -------------------------------------------------------------
// Three parts:
//   1. sendIntakeLink()          -- klinikern skickar länk till patienten
//   2. renderIntakeReview()      -- klinikern granskar AI-förslag på patientkortet
//   3. renderPublicIntakeForm()  -- patientens formulär (publikt via #intake=)

function sendIntakeLink(patId, intakeType) {
  const p = S.patients.find(x => x.id === patId) || S.pat;
  if (!p) return;
  // intakeType: 'new' = full anamnes, 'returning' = kortversion, undefined = auto-detect
  const hasVisits = (p.visits||[]).length > 0;
  const type = intakeType || (hasVisits ? 'returning' : 'new');

  const baseUrl = window.location.origin + window.location.pathname.replace('index.html','');
  const lastVisit = (p.visits||[])[0];
  const visitId = lastVisit?.id || '';
  const intakeUrl = baseUrl + '#intake=' + p.id
    + (visitId ? '&visit=' + visitId : '')
    + '&type=' + type;

  navigator.clipboard.writeText(intakeUrl).catch(()=>{});

  const firstName = (p.name||'').split(' ')[0] || 'Hej';
  const isNew = type === 'new';
  const subject = encodeURIComponent(
    isNew
      ? `Välkommen till ${CLINIC.name} — ett kort hälsoformulär`
      : `Inför din nästa fas — kort uppdatering till ${CLINIC.name}`
  );
  const bodyText = isNew
    ? `Hej ${firstName},\n\nVälkommen till ${CLINIC.name}!\n\nInnan vi skapar ditt personliga träningsprogram vill vi lära känna dig lite bättre. Det tar 3-4 minuter:\n\n${intakeUrl}\n\nNär du svarat granskar din naprapat svaren och programmet tas fram.\n\nMed vänliga hälsningar,\n${CLINIC.name}`
    : `Hej ${firstName},\n\nInför din nästa rehabfas vill vi veta hur det har gått och om något förändrats.\n\nFyller du i det korta formuläret? Det tar 2 minuter:\n\n${intakeUrl}\n\nMed vänliga hälsningar,\n${CLINIC.name}`;

  const mailtoUrl = `mailto:${encodeURIComponent(p.email||'')}?subject=${subject}&body=${encodeURIComponent(bodyText)}`;

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center';
  overlay.innerHTML = `
    <div style="background:var(--surface);border-radius:16px;padding:28px 24px 22px;max-width:440px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.18)" onclick="event.stopPropagation()">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#0f2744,#0d9b8a);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><path d="M22 2L11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </div>
        <div>
          <div style="font-size:15px;font-weight:700;color:var(--ink)">${isNew ? 'Hälsoformulär — ny patient' : 'Uppdateringsformulär — återkommande'}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${e(p.name)}</div>
        </div>
      </div>

      <div style="background:var(--bg);border-radius:8px;padding:10px 13px;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;word-break:break-all;margin-bottom:16px">${e(intakeUrl)}</div>

      <div style="font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6">
        ${isNew
          ? 'Patienten besvarar frågor om smärta, funktion, sömnkvalitet och träningsförutsättningar. Du granskar svaren innan planen skapas.'
          : 'Kort uppföljning — hur har det gått, vad har förändrats sedan sist. Du granskar svaren och uppdaterar planen.'}
      </div>

      <div style="display:flex;gap:8px;margin-bottom:10px">
        ${p.email ? `<button onclick="window.location.href='${mailtoUrl}'" style="flex:1;background:var(--teal);color:white;border:none;border-radius:9px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif">Öppna i e-post</button>` : ''}
        <button onclick="navigator.clipboard.writeText('${intakeUrl}').then(()=>this.textContent='Kopierat!')" style="${p.email ? 'flex:0 0 auto;' : 'flex:1;'}background:var(--bg2);color:var(--ink);border:1px solid var(--border);border-radius:9px;padding:12px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif">Kopiera länk</button>
      </div>
      ${!p.email ? '<div style="font-size:11px;color:var(--amber);text-align:center;margin-bottom:8px">Ingen e-post registrerad — kopiera länken manuellt</div>' : ''}
      <button onclick="this.closest('[style*=fixed]').remove()" style="width:100%;background:none;border:1px solid var(--border);border-radius:9px;padding:10px;font-size:13px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif">Stäng</button>
    </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', ev => { if (ev.target === overlay) overlay.remove(); });
}

  const pending = (p.visits||[]).filter(v => v.status === 'Inväntar godkännande' && v.plan?.exercises?.length);
  if (!pending.length) return '';
  const v = pending[0];
  const exCount = v.plan.exercises?.length || 0;
  const intake = (p.intakeForms||[]).find(f => f._planGenerated === v.id);
  const answers = intake?.answers || {};

  return `
    <div style="background:var(--bg);border:1.5px solid #0d9b8a;border-radius:12px;padding:16px 18px 14px;margin-bottom:18px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <div style="width:8px;height:8px;border-radius:50%;background:#0d9b8a;flex-shrink:0;animation:pulse 2s infinite"></div>
        <div style="font-size:12px;font-weight:700;color:var(--navy)">Träningsprogram redo för godkännande</div>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:14px;padding-left:16px">AI genererade ${exCount} övningar baserat på intake-svaren</div>

      ${Object.keys(answers).length ? `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:14px">
          ${Object.entries(answers).filter(([,v])=>v).slice(0,6).map(([k,val]) => `
            <div style="background:var(--bg2);border-radius:6px;padding:6px 9px">
              <div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1px">${e(INTAKE_LABELS[k]||k)}</div>
              <div style="font-size:11px;color:var(--text)">${e(String(val))}</div>
            </div>`).join('')}
        </div>` : ''}

      <div style="display:flex;gap:8px">
        <button onclick="approvePendingPlan('${p.id}','${v.id}')"
          style="flex:1;background:var(--teal);color:white;border:none;border-radius:9px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif">
          Godkänn &amp; skicka
        </button>
        <button onclick="previewPendingPlan('${p.id}','${v.id}')"
          style="flex:1;background:var(--bg2);color:var(--navy);border:1px solid var(--border);border-radius:9px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">
          Granska plan
        </button>
      </div>
      <button onclick="rejectPendingPlan('${p.id}','${v.id}')"
        style="width:100%;margin-top:7px;padding:9px;background:none;border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif">
        Avvisa -- generera om manuellt
      </button>
    </div>`;
}

function approvePendingPlan(patId, visitId) {
  const p = S.patients.find(x => x.id === patId) || S.pat;
  if (!p) return;
  const vIdx = (p.visits||[]).findIndex(v => v.id === visitId);
  if (vIdx < 0) return;
  p.visits[vIdx].status = 'Aktiv';
  p.visits[vIdx]._approvedAt = new Date().toISOString();
  // Mark intake as reviewed
  const intake = (p.intakeForms||[]).find(f => f._planGenerated === visitId);
  if (intake) intake._reviewedAt = new Date().toISOString();
  savePat(p);
  if (S.pat?.id === patId) S.pat = p;
  // Open share dialog so clinician can send link
  S.visitId = visitId;
  S.plan = p.visits[vIdx].plan;
  rDetail();
  setTimeout(() => sharePlan(patId, visitId), 300);
}

function previewPendingPlan(patId, visitId) {
  const p = S.patients.find(x => x.id === patId) || S.pat;
  if (!p) return;
  const v = (p.visits||[]).find(x => x.id === visitId);
  if (!v?.plan) return;
  S.pat = p; S.visitId = visitId; S.plan = v.plan;
  go('doc');
}

function rejectPendingPlan(patId, visitId) {
  if (!confirm('Avvisa det AI-genererade programmet? Du kan sedan skapa ett manuellt.')) return;
  const p = S.patients.find(x => x.id === patId) || S.pat;
  if (!p) return;
  p.visits = (p.visits||[]).filter(v => v.id !== visitId);
  savePat(p);
  if (S.pat?.id === patId) { S.pat = p; rDetail(); }
}

function renderIntakeReviewPanel(patId) {
  const p = S.patients.find(x => x.id === patId) || S.pat;
  if (!p) return '';
  const pending = (p.intakeForms||[]).filter(f => !f._reviewedAt)
    .sort((a,b) => new Date(b.ts)-new Date(a.ts));
  if (!pending.length) return '';
  const latest = pending[0];
  const a = latest.answers || {};
  const suggestions = latest.aiSuggestions || [];
  const isNew = (a._type || 'new') === 'new';

  // Group answers for display
  const clinicalFields = [
    ['currentPain',       'Smärta NRS',          a.currentPain ? a.currentPain+'/10' : ''],
    ['painLocation',      'Smärtlokal',           a.painLocation],
    ['painDuration',      'Duration',             { '<1v':'< 1 vecka','1-4w':'1–4 veckor','1-4v':'1–4 veckor','1-3m':'1–3 mån','3-12m':'3–12 mån','>1y':'> 1 år' }[a.painDuration]||a.painDuration],
    ['painPattern',       'Mönster',              { 'constant':'Konstant','activity':'Vid rörelse','morning':'Morgon','evening':'Kväll','variable':'Varierar' }[a.painPattern]||a.painPattern],
    ['painAggravates',    'Förvärras av',         a.painAggravates],
    ['painRelieves',      'Lindras av',           a.painRelieves],
    ['nightPain',         'Nattsmärta',           { 'no':'Nej','sometimes':'Ibland','often':'Ofta' }[a.nightPain]||a.nightPain],
    ['functionLimit',     'Funktionshinder',      a.functionLimit],
    ['previousTreatment', 'Tidigare beh.',        a.previousTreatment],
    ['medication',        'Medicin',              a.medication],
    ['sleepQuality',      'Sömn',                 { 'poor':'Dålig','ok':'Okej','good':'Bra' }[a.sleepQuality]||a.sleepQuality],
    ['stressLevel',       'Stress',               { 'low':'Låg','medium':'Måttlig','high':'Hög' }[a.stressLevel]||a.stressLevel],
    ['workSituation',     'Arbete/vardag',        a.workSituation],
  ].filter(([,, v]) => v);

  const trainingFields = [
    ['location',     'Plats',      { 'home':'Hemma','bands':'Hemma m. utr.','gym':'Gym','outdoor':'Utomhus' }[a.location]||a.location],
    ['daysPerWeek',  'Dagar/v',    a.daysPerWeek ? a.daysPerWeek + ' dagar' : ''],
    ['timePerSession','Tid/pass',  a.timePerSession ? a.timePerSession + ' min' : ''],
    ['equipment',    'Utrustning', a.equipment],
    ['motivation',   'Motivation', a.motivation ? a.motivation+'/10' : ''],
  ].filter(([,,v]) => v);

  const goalFields = [
    ['goals',        'Mål',         a.goals],
    ['limitations',  'Begr.',       a.limitations],
    ['progressSinceLast','Progress', { 'much_better':'Mycket bättre','better':'Bättre','same':'Oförändrad','worse':'Sämre' }[a.progressSinceLast]||a.progressSinceLast],
    ['whatWorked',   'Fungerade',   a.whatWorked],
    ['whatHasStopped','Nytt',       a.whatHasStopped],
    ['feedback',     'Övrigt',      a.feedback],
  ].filter(([,,v]) => v);

  function fieldGrid(fields) {
    return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px">
      ${fields.map(([,label,val]) => `
        <div style="background:var(--bg);border-radius:7px;padding:7px 9px">
          <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px">${label}</div>
          <div style="font-size:12px;color:var(--ink);line-height:1.4">${e(String(val))}</div>
        </div>`).join('')}
    </div>`;
  }

  const sugHtml = suggestions.length
    ? suggestions.map((s, i) => `
        <div id="intake-sug-${i}" style="border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:7px">
          <div style="display:flex;align-items:flex-start;gap:10px">
            <div style="flex:1">
              <div style="font-size:12px;font-weight:700;color:var(--ink);margin-bottom:3px">${e(s.change||'')}</div>
              <div style="font-size:11px;color:var(--muted);line-height:1.55">${e(s.reason||'')}</div>
            </div>
            <div style="display:flex;gap:5px;flex-shrink:0;margin-top:1px">
              <button onclick="intakeApproveSuggestion('${patId}','${latest.ts}',${i})"
                style="padding:5px 11px;background:var(--teal);color:white;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer">✓</button>
              <button onclick="intakeRejectSuggestion('${patId}','${latest.ts}',${i})"
                style="padding:5px 11px;background:var(--bg2);color:var(--muted);border:1px solid var(--border);border-radius:6px;font-size:11px;cursor:pointer">✕</button>
            </div>
          </div>
        </div>`).join('')
    : `<div style="font-size:12px;color:var(--muted);padding:8px 0">Analyserar — eller inga planändringar föreslogs.</div>`;

  const isGenerating = latest._planGenerating;

function intakeApproveSuggestion(patId, intakeTs, idx) {
  const p = S.patients.find(x => x.id === patId) || S.pat;
  if (!p) return;
  const intake = (p.intakeForms||[]).find(f => f.ts === intakeTs);
  if (!intake) return;
  const sug = intake.aiSuggestions?.[idx];
  if (!sug) return;

  // Apply the suggestion to the latest visit's plan
  const lastVisit = (p.visits||[])[0];
  if (lastVisit?.plan && sug.field) {
    if (sug.field === 'schedule' && sug.scheduleNote) {
      lastVisit.plan._intakeScheduleNote = sug.scheduleNote;
    } else if (sug.exerciseIndex != null && lastVisit.plan.exercises?.[sug.exerciseIndex]) {
      const ex = lastVisit.plan.exercises[sug.exerciseIndex];
      if (sug.newSets) ex.sets = sug.newSets;
      if (sug.newReps) ex.reps = sug.newReps;
      if (sug.newNote) ex.tip = sug.newNote;
      lastVisit.plan.exercises[sug.exerciseIndex] = ex;
    }
    lastVisit.plan._intakeApplied = (lastVisit.plan._intakeApplied||[]).concat(sug.change);
    lastVisit.plan.lastAdjusted = new Date().toISOString();
  }

  // Mark suggestion as approved
  intake.aiSuggestions[idx]._approved = true;
  savePat(p);
  if (S.pat?.id === patId) S.pat = p;

  // Remove from UI
  document.getElementById('intake-sug-'+idx)?.remove();

  // Show brief confirmation
  const el = document.getElementById('intake-sug-'+idx);
  if (!el) {
    // Already removed -- check if all done
    const remaining = (intake.aiSuggestions||[]).filter(s => !s._approved && !s._rejected);
    if (!remaining.length) intakeMarkReviewed(patId, intakeTs);
  }
}

function intakeRejectSuggestion(patId, intakeTs, idx) {
  const p = S.patients.find(x => x.id === patId) || S.pat;
  if (!p) return;
  const intake = (p.intakeForms||[]).find(f => f.ts === intakeTs);
  if (intake?.aiSuggestions?.[idx]) {
    intake.aiSuggestions[idx]._rejected = true;
    savePat(p);
    if (S.pat?.id === patId) S.pat = p;
  }
  document.getElementById('intake-sug-'+idx)?.remove();
  const remaining = (intake?.aiSuggestions||[]).filter(s => !s._approved && !s._rejected);
  if (!remaining.length) intakeMarkReviewed(patId, intakeTs);
}

function intakeMarkReviewed(patId, intakeTs) {
  const p = S.patients.find(x => x.id === patId) || S.pat;
  if (!p) return;
  const intake = (p.intakeForms||[]).find(f => f.ts === intakeTs);
  if (intake) { intake._reviewedAt = new Date().toISOString(); }
  savePat(p);
  if (S.pat?.id === patId) { S.pat = p; rDetail(); }
}

async function saveIntakeResponse(patId, visitId, answers) {
  const key = 'vela:intake:'+patId+(visitId?':'+visitId:'');
  // Save answers to localStorage so clinician can read them
  try { localStorage.setItem(key, JSON.stringify({ ts: new Date().toISOString(), answers })); } catch(e) {}
  // Sync to Supabase if available
  try {
    await fetch(`${SB_URL}/rest/v1/pass_log`, {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer '+SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ pat_id: patId, visit_id: visitId||null, logged_at: new Date().toISOString(), type: 'intake', data: answers })
    });
  } catch(e) {}
  // Attach to patient record in Supabase -- read patient, push intakeForm, save
  try {
    const r = await fetch(`${SB_URL}/rest/v1/patients?id=eq.${encodeURIComponent(patId)}&select=data`, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer '+SB_KEY }
    });
    if (r.ok) {
      const rows = await r.json();
      if (rows?.[0]?.data) {
        const pat = typeof rows[0].data === 'string' ? JSON.parse(rows[0].data) : rows[0].data;
        if (!pat.intakeForms) pat.intakeForms = [];
        const ts = new Date().toISOString();
        pat.intakeForms.unshift({ ts, visitId, answers, aiSuggestions: null });
        // Save back
        await fetch(`${SB_URL}/rest/v1/patients?id=eq.${encodeURIComponent(patId)}`, {
          method: 'PATCH',
          headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer '+SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
          body: JSON.stringify({ data: pat, updated_at: ts })
        });
        // Now trigger AI analysis server-side -- no API key needed client-side
        // We store answers; clinician's agent will pick it up on next scan
      }
    }
  } catch(e) {}
}

// -- GENERERA PLAN FRÅN INTAKE -----------------------------------------------
async function generatePlanFromIntake(patId, intakeTs) {
  const key = getKey(); if (!key) return;
  const p = S.patients.find(x => x.id === patId) || S.pat;
  if (!p) return;
  const intake = (p.intakeForms||[]).find(f => f.ts === intakeTs);
  if (!intake) return;
  const a = intake.answers || {};

  const timeMap = {'10':1,'20':2,'30':3,'45':4};
  const exerciseCount = Math.max(3, Math.min(8, Math.round((timeMap[a.timePerSession]||2) * 1.5)));
  const locationMap = { 'home':'hem', 'bands':'hem', 'gym':'gym', 'outdoor':'hem' };

  // -- Hämta klinisk kontext om besök finns ----------------------------------
  const existingVisits = (p.visits||[]).filter(v => v.soap || v.plan);
  const latestVisit    = existingVisits[0] || null;
  const hasClinical    = !!latestVisit;

  // Sätt S.pat och S.visitId så buildPr får full klinisk kontext
  const prevPat     = S.pat;
  const prevVisitId = S.visitId;
  S.pat     = p;
  S.visitId = latestVisit?.id || null;

  // Bygg intake-noteringar
  const intakeNotes = [
    a.currentPain       ? `Smärta vid ifyllnad: NRS ${a.currentPain}/10` : '',
    a.painLocation      ? `Smärtlokal: ${a.painLocation}` : '',
    a.painDuration      ? `Duration: ${{ '<1v':'< 1 vecka','1-4v':'1–4 veckor','1-3m':'1–3 mån','3-12m':'3–12 mån','>1y':'> 1 år' }[a.painDuration]||a.painDuration}` : '',
    a.painPattern       ? `Smärtmönster: ${{ 'constant':'Konstant','activity':'Vid rörelse','morning':'Störst på morgonen','evening':'Störst på kvällen','variable':'Varierar' }[a.painPattern]||a.painPattern}` : '',
    a.painAggravates    ? `Förvärras av: ${a.painAggravates}` : '',
    a.painRelieves      ? `Lindras av: ${a.painRelieves}` : '',
    a.nightPain && a.nightPain !== 'no' ? `Nattsmärta: ${{ 'sometimes':'Ibland','often':'Ofta' }[a.nightPain]||a.nightPain}` : '',
    a.functionLimit     ? `Funktionsbegränsning: ${a.functionLimit}` : '',
    a.previousTreatment ? `Tidigare behandling: ${a.previousTreatment}` : '',
    a.medication        ? `Medicin: ${a.medication}` : '',
    a.sleepQuality && a.sleepQuality !== 'good' ? `Sömn: ${{ 'poor':'Dålig','ok':'Okej' }[a.sleepQuality]||a.sleepQuality}` : '',
    a.stressLevel && a.stressLevel !== 'low'    ? `Stress: ${{ 'medium':'Måttlig','high':'Hög' }[a.stressLevel]||a.stressLevel}` : '',
    a.workSituation     ? `Arbete/vardag: ${a.workSituation}` : '',
    a.progressSinceLast ? `Progress sedan sist: ${{ 'much_better':'Mycket bättre','better':'Bättre','same':'Oförändrad','worse':'Sämre' }[a.progressSinceLast]||a.progressSinceLast}` : '',
    a.whatWorked        ? `Vad har fungerat: ${a.whatWorked}` : '',
    a.whatHasStopped    ? `Ny problematik: ${a.whatHasStopped}` : '',
    a.equipment && a.equipment !== 'none' ? `Utrustning: ${a.equipment}` : '',
    a.daysPerWeek       ? `Tränar ${a.daysPerWeek} dagar/vecka` : '',
    a.timePerSession    ? `${a.timePerSession} min per pass` : '',
    a.limitations       ? `Begränsningar/kontraindikationer: ${a.limitations}` : '',
    a.goals             ? `Patientens mål: ${a.goals}` : '',
    a.feedback          ? `Övrigt från patienten: ${a.feedback}` : '',
  ].filter(Boolean).join('\n');

  // Kombinera med SOAP om den finns
  const soapNotes = (() => {
    if (!latestVisit?.soap) return '';
    const s = latestVisit.soap;
    const parts = [
      s.S ? `S: ${s.S}` : '',
      s.O ? `O: ${s.O}` : '',
      s.A ? `A: ${s.A}` : '',
      s.P ? `P: ${s.P}` : '',
    ].filter(Boolean).join('\n');
    return parts ? `\nKLINISK JOURNAL (${latestVisit.date||'senaste besök'}):\n${parts}` : '';
  })();

  const clinicalNotes = [
    hasClinical ? 'UNDERLAG: Klinisk bedömning + patientens egna svar' : 'UNDERLAG: Patientens egna svar (inget kliniskt besök)',
    intakeNotes,
    soapNotes,
  ].filter(Boolean).join('\n');

  const painNRS = parseInt(a.currentPain || latestVisit?.form?.pain || '5');
  const motInt  = parseInt(a.motivation || '6');
  const hasGym  = (a.equipment||'').includes('gym') || a.location === 'gym';

  const form = {
    name:       p.name,
    birthdate:  p.birthdate || '',
    birthYear:  p.birthYear || '',
    diagnosis:  p.diagnosis || (p.diagnoses||[])[0] || latestVisit?.form?.diagnosis || '',
    pain:       painNRS,
    history:    latestVisit?.form?.history || (hasGym ? 'regelbunden' : motInt >= 7 ? 'sporadisk' : 'ingen'),
    knowledge:  latestVisit?.form?.knowledge || 'låg',
    location:   locationMap[a.location] || latestVisit?.form?.location || 'hem',
    motivation: motInt,
    exercises:  exerciseCount,
    followup:   latestVisit?.form?.followup || 4,
    notes:      clinicalNotes,
  };

  if (a.goals) p.functionalGoal = a.goals;
  intake._planGenerating = true;
  savePat(p);

  try {
    const gen = await callAPI(buildPr(form), [], key);
    const vid  = 'v_intake_' + Date.now();
    const plan = { ...gen, patientName: p.name, diagnosis: form.diagnosis, form, visitId: vid };
    const nv   = {
      id: vid,
      date: new Date().toISOString().slice(0,10),
      form, plan,
      status: 'Inväntar godkännande',
      note: '',
      _fromIntake: intakeTs,
      _basedOnVisit: latestVisit?.id || null,
    };
    const fresh = S.patients.find(x => x.id === patId) || p;
    if (!fresh.visits) fresh.visits = [];
    fresh.visits.unshift(nv);
    intake._planGenerated  = vid;
    intake._planGenerating = false;
    savePat(fresh);
    if (S.pat?.id === patId) S.pat = fresh;
    if (S.screen === 'detail') rDetail();
    setTimeout(() => reviewPlanRisk(patId, vid), 1500);
    addInboxItem(patId, fresh.name, 'ai_action', 'plan_pending_approval',
      'Plan redo för godkännande',
      `AI genererade ${(plan.exercises||[]).length} övningar${hasClinical ? ' (journal + intake)' : ' (intake)'}.`,
      [{ label:'Granska', style:'primary', fn:`openDetail:${patId}` }]);
  } catch(err) {
    intake._planGenerating    = false;
    intake._planGenerateError = err.message;
    savePat(p);
    console.error('generatePlanFromIntake error:', err);
  } finally {
    S.pat     = prevPat;
    S.visitId = prevVisitId;
  }
}

async function generateIntakeSuggestions(patId, intakeTs) {
  const key = getKey(); if (!key) return;
  const p = S.patients.find(x => x.id === patId) || S.pat;
  if (!p) return;
  const intake = (p.intakeForms||[]).find(f => f.ts === intakeTs);
  if (!intake || intake.aiSuggestions !== null) return; // null = not yet generated, [] = done but empty

  const lastVisit = (p.visits||[])[0];
  const plan = lastVisit?.plan;
  const exList = (plan?.exercises||[]).map((ex,i) => `${i}. ${ex.name} -- ${ex.sets} set × ${ex.reps}`).join('\n') || 'Ingen plan ännu';

  const prompt = `Du är en erfaren fysioterapeut. En patient har fyllt i ett intake-formulär inför en ny rehabfas. Analysera svaren och föreslå konkreta justeringar av rehabplanen.

PATIENTENS SVAR:
${Object.entries(intake.answers||{}).map(([k,v]) => `${INTAKE_LABELS[k]||k}: ${v}`).join('\n')}

BEFINTLIG PLAN:
${exList}

Returnera ENBART JSON utan backticks:
{"summary":"2-3 meningar om vad svaren visar","suggestions":[{"change":"Konkret ändring t.ex. Minska från 3×15 till 3×10","reason":"Varför, kopplat till svaret","field":"exercise|schedule|general","exerciseIndex":0,"newSets":null,"newReps":null,"newNote":null,"scheduleNote":null}]}

Max 4 förslag. Inga förslag om inget behöver ändras -- returnera då suggestions:[].
urgency: utgå från hur mycket svaren avviker från befintlig plan.`;

  try {
    const raw = await velaAPI(prompt, { model: MODEL_HAIKU, maxTokens: 800, json: false });
    const clean = raw.replace(/```json|```/g,'').trim();
    const result = JSON.parse(clean);
    intake.aiSuggestions = result.suggestions || [];
    intake.aiSummary = result.summary || '';
    savePat(p);
    if (S.pat?.id === patId) { S.pat = p; rDetail(); }
  } catch { intake.aiSuggestions = []; savePat(p); }
}

const _iqSingle = {};
function iqSelect(btn) {
  const group = btn.dataset.group;
  const container = btn.closest('[id^="iq-"], div') || btn.parentElement;
  container.querySelectorAll('[data-group="' + group + '"]').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  _iqSingle[group] = btn.dataset.val;
}

function iqMulti(btn) {
  const group = btn.dataset.group;
  if (!window._iqMulti) window._iqMulti = {};
  if (!window._iqMulti[group]) window._iqMulti[group] = [];
  const val = btn.dataset.val;
  const idx = window._iqMulti[group].indexOf(val);
  if (idx >= 0) {
    window._iqMulti[group].splice(idx, 1);
    btn.classList.remove('selected');
  } else {
    window._iqMulti[group].push(val);
    btn.classList.add('selected');
  }
}

// -- PLAN ADJUSTMENT -- AI läser check-in data och föreslår justering ----------
async function analyzePlanAdjustment(patId, visitId) {
  const key = getKey();
  if (!key) { alert('API-nyckel saknas. Gå till Inställningar.'); return; }

  const pat = S.patients.find(p=>p.id===patId) || S.pat;
  const visit = (pat?.visits||[]).find(v=>v.id===visitId);
  if (!pat || !visit?.plan) return;

  const logs = getPassLogs(patId).filter(l=>l.visitId===visitId);
  if (logs.length < 2) { alert('Behöver minst 2 loggade pass för att analysera.'); return; }

  const ov = document.createElement('div');
  ov.id = 'plan-adj-ov';
  ov.style.cssText = 'position:fixed;inset:0;z-index:700;display:flex;align-items:center;justify-content:center;padding:20px;background:rgba(10,20,35,.78);backdrop-filter:blur(6px)';
  ov.innerHTML = `<div style="background:var(--surface);border-radius:16px;width:100%;max-width:420px;padding:28px 24px;text-align:center">
    <div style="width:32px;height:32px;border:3px solid #dde6ee;border-top-color:var(--teal);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px"></div>
    <div style="font-size:15px;font-weight:600;color:var(--navy);margin-bottom:6px">Analyserar ${logs.length} pass...</div>
    <div style="font-size:12px;color:var(--text3)">AI läser check-in data och jämför med befintlig plan</div>
  </div>`;
  document.body.appendChild(ov);

  const recent = logs.slice(0,7).reverse();
  const avgPain = (recent.reduce((s,l)=>s+(l.pain||0),0)/recent.length).toFixed(1);
  const completionAll     = recent.filter(l=>l.done==='all').length;
  const completionPartial = recent.filter(l=>l.done==='partial').length;
  const completionFew     = recent.filter(l=>l.done==='few').length;
  const energyLow  = recent.filter(l=>l.energy==='1').length;
  const moveStiff  = recent.filter(l=>l.move==='1').length;
  const painTrend  = recent.length>=3 ? recent[recent.length-1].pain - recent[0].pain : 0;
  const patNotes   = recent.filter(l=>l.note).map(l=>`"${l.note}"`).join('\n');

  const plan = visit.plan;
  const exList = (plan.exercises||[]).map((ex,i)=>
    `${i+1}. ${ex.name} -- ${ex.sets||''}×${ex.reps||''} (nivå ${ex.level||1})`
  ).join('\n');
  const soap = visit.soap||{};
  const phase = PHASES[(pat.phase||1)-1];

  const prompt = `Du är erfaren fysioterapeut. Analysera patientens check-in data och föreslå justeringar av rehabplanen.

PATIENT: ${pat.name}, ${pat.diagnosis||''}
REHABFAS: ${phase.label} -- ${phase.name}
JOURNAL BEDÖMNING: ${soap.A||'ej angiven'}

BEFINTLIG PLAN (${plan.exercises?.length||0} övningar):
${exList}

CHECK-IN DATA -- ${recent.length} pass:
Smärta snitt: NRS ${avgPain}/10
Smärttrend: ${painTrend>0?`+${painTrend} (ökande)`:painTrend<0?`${painTrend} (minskande)`:'stabil'}
Genomförde alla: ${completionAll}/${recent.length} | Delvis: ${completionPartial}/${recent.length} | Bara några: ${completionFew}/${recent.length}
Låg energi: ${energyLow}/${recent.length} pass | Stelt: ${moveStiff}/${recent.length} pass
${patNotes?`\nPatientens noteringar:\n${patNotes}`:''}

Returnera ENBART giltig JSON utan backticks:
{"summary":"2-3 meningar som sammanfattar vad datan visar","urgency":"low|medium|high","adjustments":[{"type":"increase|decrease|replace|remove|add","exerciseIndex":0,"exerciseName":"namn","change":"Konkret ändring t.ex. Öka från 3×10 till 3×15","reason":"Varför -- kopplat till check-in datan"}],"scheduleNote":"kommentar om frekvens eller tom sträng","messageToPatient":"kort uppmuntrande meddelande till patienten"}

urgency: high=smärta ökande/NRS>7, medium=låg genomförandegrad/stagnation, low=kan progrediera.
Max 3 förslag. Varje förslag = en specifik konkret åtgärd.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({model:MODEL_HAIKU, max_tokens:900, system:'Svara ALLTID med giltig JSON. Inga backticks.', messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const txt = (data.content||[]).map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
    const result = JSON.parse(txt);
    ov.remove();
    showPlanAdjustmentOverlay(result, patId, visitId);
  } catch(err) {
    ov.remove();
    alert('Analys misslyckades: '+(err.message||'okänt fel'));
  }
}

async function applyPlanAdjustment(patId, visitId, resultEncoded) {
  const result = JSON.parse(decodeURIComponent(resultEncoded));
  const pat = S.patients.find(p=>p.id===patId)||S.pat;
  const visit = (pat?.visits||[]).find(v=>v.id===visitId);
  if (!pat||!visit?.plan) return;

  const key = getKey();
  const plan = {...visit.plan};
  let exercises = [...(plan.exercises||[])];

  // Collect add/replace types that need AI to generate new exercise details
  const needsGeneration = (result.adjustments||[]).filter(a=>a.type==='add'||a.type==='replace');

  // If we need new exercises, generate them first
  if (needsGeneration.length > 0 && key) {
    const loadOv = document.createElement('div');
    loadOv.style.cssText = 'position:fixed;inset:0;z-index:800;display:flex;align-items:center;justify-content:center;background:rgba(10,20,35,.6)';
    loadOv.innerHTML = `<div style="background:var(--surface);border-radius:12px;padding:24px 28px;text-align:center;max-width:300px">
      <div style="width:28px;height:28px;border:3px solid #dde6ee;border-top-color:var(--teal);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px"></div>
      <div style="font-size:14px;font-weight:600;color:var(--navy)">Genererar nya övningar...</div>
    </div>`;
    document.body.appendChild(loadOv);

    try {
      const genPrompt = `Du är fysioterapeut. Generera detaljerade övningar för en rehabplan. Returnera ENBART giltig JSON utan backticks.

Patient: ${pat.name}, ${pat.diagnosis||''}
Befintliga övningar att ersätta/lägga till för:
${needsGeneration.map(a=>`- ${a.exerciseName}: ${a.change} (${a.reason})`).join('\n')}

För varje övning, returnera:
{"exercises":[{"name":"namn","purpose":"anatomisk motivering","whyThisForYou":"personlig förklaring","level":1,"startPosition":"position","steps":["steg1","steg2","steg3","steg4"],"sets":3,"reps":"10","rest":"60 sek","tip":"säkerhetsanmärkning","correctFeel":"känsla"}]}`;

      const res = await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body: JSON.stringify({model:MODEL_HAIKU,max_tokens:1200,system:'Svara ALLTID med giltig JSON.',messages:[{role:'user',content:genPrompt}]})
      });
      const d = await res.json();
      const genResult = JSON.parse((d.content||[]).map(b=>b.text||'').join('').replace(/```json|```/g,'').trim());
      const newExercises = genResult.exercises||[];

      // Apply replace/add with generated data
      let genIdx = 0;
      needsGeneration.forEach(adj => {
        const newEx = newExercises[genIdx++];
        if (!newEx) return;
        if (adj.type==='replace' && exercises[adj.exerciseIndex]) {
          exercises[adj.exerciseIndex] = {...newEx, adjustmentNote:adj.change, adjustedAt:new Date().toISOString()};
        } else if (adj.type==='add') {
          exercises.push({...newEx, adjustmentNote:adj.change, adjustedAt:new Date().toISOString()});
        }
      });
    } catch(err) {
      console.warn('Exercise generation failed:', err);
    }
    loadOv.remove();
  }

  // Apply increase/decrease/remove adjustments
  (result.adjustments||[]).filter(a=>a.type!=='add'&&a.type!=='replace').forEach(adj => {
    const idx = adj.exerciseIndex;
    if ((adj.type==='increase'||adj.type==='decrease') && exercises[idx]) {
      exercises[idx] = {...exercises[idx], adjustmentNote:adj.change, adjustedAt:new Date().toISOString()};
      // Parse "3x15" or "3 set x 15 reps"
      const setsMatch = adj.change.match(/(\d+)\s*[×xX\*]\s*(\d+)/);
      if (setsMatch) { exercises[idx].sets=parseInt(setsMatch[1]); exercises[idx].reps=setsMatch[2]; }
      // Parse level change
      const levelMatch = adj.change.match(/nivå\s*(\d)/i);
      if (levelMatch) exercises[idx].level = parseInt(levelMatch[1]);
      // Parse rest
      const restMatch = adj.change.match(/(\d+)\s*sek\s*vila/i);
      if (restMatch) exercises[idx].rest = restMatch[1]+' sek';
    } else if (adj.type==='remove' && exercises[idx]) {
      exercises.splice(idx, 1);
    }
  });

  plan.exercises = exercises;

  // Apply patient message
  if (result.messageToPatient) {
    plan.therapistMessage = result.messageToPatient;
    plan.therapistMessageDate = new Date().toISOString();
  }

  plan.lastAdjusted = new Date().toISOString();
  plan.lastAdjustmentSummary = result.summary;

  const updPat = {...pat, visits:(pat.visits||[]).map(v=>v.id===visitId?{...v,plan}:v)};
  const saved = savePat(updPat);
  if (S.pat?.id===patId) { S.pat=saved; if(S.visitId===visitId) S.plan=plan; }

  document.getElementById('plan-adj-result-ov')?.remove();
  showAutoSaveToast('Plan uppdaterad -- synlig för patienten direkt');
  rDetail();
}




async function fetchWithTimeout(url, opts, ms) {
  var ctrl = new AbortController();
  var t = setTimeout(function(){ ctrl.abort(); }, ms);
  try {
    var r = await fetch(url, Object.assign({}, opts, { signal: ctrl.signal }));
    clearTimeout(t);
    return r;
  } catch(e) { clearTimeout(t); throw e; }
}
async function loadPublicPlan(patId, visitId) {
  const el = document.getElementById('s-public-plan');
  if (!el) return;

  // In-memory cache
  try {
    if (_publicPlanCache && _publicPlanCache.patId === patId && _publicPlanCache.visitId === visitId) {
      renderPublicPlan(_publicPlanCache.plan, _publicPlanCache.pat);
      return;
    }
  } catch(e) { /* ignore cache check errors */ }

  el.innerHTML = '<div class="pub-loading"><div style="margin-bottom:12px">Hämtar din Hael-plan...</div><div style="font-size:12px;color:#aaa">Ansluter till server -- kan ta n\u00e5gra sekunder</div></div>';

  // Helper: fetch with timeout

  // 1. Try Supabase with 8s timeout
  try {
    const r = await fetchWithTimeout(
      `${SB_URL}/rest/v1/patients?id=eq.${encodeURIComponent(patId)}&select=data`,
      { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY } },
      8000
    );
    if (r.ok) {
      const rows = await r.json();
      if (rows && rows.length > 0 && rows[0].data) {
        const raw = rows[0].data;
        const pat = typeof raw === 'string' ? JSON.parse(raw) : raw;
        const visit = (pat?.visits||[]).find(v => v.id === visitId);
        if (visit?.plan) {
          // -- ACCESS CHECK -----------------------------------------------
          const access = zpCheckAccess(visit);
          if (!access.ok) {
            window._zpRenewalPat = pat;
            zpRenderPaywall(patId, visitId, pat);
            return;
          }
          // ---------------------------------------------------------------
          _publicPlanCache = { patId, visitId, plan: visit.plan, pat };
          window._zpRenewalPat = pat;
          if (window._pubLoadTimeout) clearTimeout(window._pubLoadTimeout);
          try {
            renderPublicPlan(visit.plan, pat);
          } catch(renderErr) {
            console.error('renderPublicPlan failed:', renderErr);
            el.innerHTML = '<div style="text-align:center;padding:60px 24px;font-family:system-ui,sans-serif"><div style="font-size:20px;color:#e05555;margin-bottom:8px">Fel vid laddning</div><div style="font-size:13px;color:#888">Tekniskt fel: ' + (renderErr && renderErr.message ? renderErr.message : 'okänt') + '</div></div>';
            return;
          }
          if (shouldShowOnboarding(patId)) {
            setTimeout(() => showOnboarding(patId, visitId, pat.name, visit.plan?.diagnosis || pat.diagnosis), 400);
          }
          return;
        }
        // Fallback: visitId not found or plan missing -- try most recent visit that has a plan
        const fallbackVisit = (pat?.visits||[]).find(v => v.plan && v.plan.exercises?.length > 0);
        if (fallbackVisit?.plan) {
          const access = zpCheckAccess(fallbackVisit);
          if (!access.ok) { zpRenderPaywall(patId, fallbackVisit.id, pat); return; }
          console.warn('visitId mismatch -- using fallback visit', fallbackVisit.id, 'expected', visitId);
          _publicPlanCache = { patId, visitId: fallbackVisit.id, plan: fallbackVisit.plan, pat };
          if (window._pubLoadTimeout) clearTimeout(window._pubLoadTimeout);
          try { renderPublicPlan(fallbackVisit.plan, pat); } catch(e) {
            console.error('renderPublicPlan fallback failed:', e);
            document.getElementById('s-public-plan').innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#0e1825"><div style="text-align:center;color:white"><div style="font-size:18px;margin-bottom:8px">Fel: ' + (e&&e.message||'okänt') + '</div></div></div>';
          }
          return;
        }
        // Nothing found -- show diagnostic
        const visitIds = (pat?.visits||[]).map(v=>v.id).join(', ') || 'inga besök';
        el.innerHTML = `<div style="text-align:center;padding:80px 24px;font-family:var(--font)">
          <div style="font-family:var(--font-serif);font-size:26px;color:#0f2744;margin-bottom:12px">Plan ej tillgänglig</div>
          <div style="font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:16px">Patienten hittades men ingen Hael-plan finns sparad i molnet.<br>Be behandlaren trycka "Ladda upp alla" i Inställningar och skicka länken igen.</div>
          <div style="font-size:10px;color:#bbb;font-family:monospace">visit=${visitId}<br>found=${visitIds}</div>
        </div>`;
        return;
      }
    }
  } catch(e) {
    console.warn('Supabase fetch failed:', e.name === 'AbortError' ? 'Timeout' : e.message);
  }

  // 2. Fallback: localStorage (same device)
  try {
    const raw = localStorage.getItem('kansei-data:' + patId);
    if (raw) {
      const pat = JSON.parse(raw);
      const visit = (pat?.visits||[]).find(v => v.id === visitId);
      if (visit?.plan) {
        _publicPlanCache = { patId, visitId, plan: visit.plan, pat };
        renderPublicPlan(visit.plan, pat);
        return;
      }
    }
  } catch(e) { console.warn('localStorage fallback failed:', e); }

  // 3. Nothing worked — dark themed error
  var _patIdRetry = (patId||'').replace(/'/g, "\\'");
  var _visitIdRetry = (visitId||'').replace(/'/g, "\\'");
  el.innerHTML = '<div style="min-height:100vh;background:#0e1825;display:flex;align-items:center;justify-content:center;padding:24px;font-family:system-ui,sans-serif">'
    + '<div style="max-width:360px;text-align:center">'
    + '<div style="width:48px;height:48px;border-radius:50%;background:rgba(224,85,85,.15);display:flex;align-items:center;justify-content:center;margin:0 auto 20px">'
    + '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e05555" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>'
    + '<div style="font-size:20px;font-weight:700;color:white;margin-bottom:8px">Kunde inte ladda planen</div>'
    + '<div style="font-size:14px;color:rgba(255,255,255,.45);line-height:1.7;margin-bottom:24px">Kontrollera att du \u00e4r online och f\u00f6rs\u00f6k igen.<br>Om problemet kvarst\u00e5r, kontakta din behandlare.</div>'
    + '</div></div>';
  var _retryBtn = document.getElementById('pub-retry-btn');
  if (_retryBtn) {
    _retryBtn.onclick = function() { loadPublicPlan(patId, visitId); };
  }
}

function renderPublicPlanProgressGraph(pat, blurred) {
  const visits = (pat.visits||[]).slice().reverse();
  // Also include daily logs
  const allPts = [];
  visits.forEach(v => {
    if (v.form?.pain != null) allPts.push({ pain: v.form.pain, date: v.date });
    (v.logs||[]).forEach(l => { if (l.nrs != null) allPts.push({ pain: l.nrs, date: l.date }); });
  });
  allPts.sort((a,b) => (a.date||'') < (b.date||'') ? -1 : 1);
  const pts = allPts.filter((p,i,arr) => i===0 || p.date !== arr[i-1].date);
  if (pts.length < 2) return '';

  const W = 300, H = 60, PAD = 12;
  const n = pts.length;
  const xs = pts.map((_,i) => PAD + (i/(n-1))*(W-PAD*2));
  const ys = pts.map(p => PAD + ((10-p.pain)/10)*(H-PAD*2));
  const polyPts = xs.map((x,i) => `${x},${ys[i]}`).join(' ');
  const first = pts[0].pain, last = pts[pts.length-1].pain;
  const trend = last < first ? '#4acc88' : last > first ? '#e07070' : '#4a9aaa';
  const arrow = last < first ? 'v Smärtan minskar' : last > first ? '^ Smärtan ökar' : '-> Stabil';
  const diff = Math.abs(last-first);

  // Area fill path
  const areaPath = `M${xs[0]},${H} ` + xs.map((x,i) => `L${x},${ys[i]}`).join(' ') + ` L${xs[n-1]},${H} Z`;

  let dots = '';
  pts.forEach((v,i) => {
    if (!blurred) {
      dots += `<circle cx="${xs[i]}" cy="${ys[i]}" r="3.5" fill="${trend}" opacity=".9"/>`;
      if (i===0||i===n-1) {
        const anc = i===0?'start':'end';
        dots += `<text x="${xs[i]}" y="${H+14}" text-anchor="${anc}" font-size="9" fill="rgba(255,255,255,.7)" font-weight="700">${v.pain}/10</text>`;
        dots += `<text x="${xs[i]}" y="${H+24}" text-anchor="${anc}" font-size="8" fill="rgba(255,255,255,.35)">${v.date||''}</text>`;
      }
    }
  });

  const svgContent = `
    <defs>
      <linearGradient id="pg-grad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${trend}" stop-opacity=".25"/>
        <stop offset="100%" stop-color="${trend}" stop-opacity="0"/>
      </linearGradient>
      ${blurred ? `<filter id="pg-blur"><feGaussianBlur stdDeviation="3"/></filter>` : ''}
    </defs>
    <path d="${areaPath}" fill="url(#pg-grad)" ${blurred?'filter="url(#pg-blur)"':''}/>
    <polyline points="${polyPts}" fill="none" stroke="${trend}" stroke-width="2.5" stroke-linejoin="round" opacity=".85" ${blurred?'filter="url(#pg-blur)"':''}/>
    ${dots}`;

  if (blurred) {
    // Blurred version with lock overlay for free tier
    return `<div style="margin:12px 14px 0;background:var(--navy);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden">
      <div style="font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:4px">Din smärtutveckling</div>
      <div style="font-size:13px;font-weight:600;color:rgba(255,255,255,.25);margin-bottom:12px">${arrow}${diff>0?' · '+diff+' enheter':''}</div>
      <svg width="100%" viewBox="0 0 ${W} ${H+8}" style="overflow:visible;opacity:.5">${svgContent}</svg>
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(7,16,30,.55);backdrop-filter:blur(1px);border-radius:14px;gap:8px">
        <div style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <div style="text-align:center">
          <div style="font-size:12px;font-weight:700;color:rgba(255,255,255,.75);margin-bottom:3px">Din progress är registrerad</div>
          <div style="font-size:11px;color:rgba(255,255,255,.38);line-height:1.5">Uppgradera för att se din smärtkurva</div>
        </div>
        <button onclick="zpRenderPaywall(window._publicPlanCache?.patId||'',window._publicPlanCache?.visitId||'',window._publicPlanCache?.pat)" style="background:#0d9b8a;color:white;border:none;border-radius:8px;padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;margin-top:2px">
          Se min progress ->
        </button>
      </div>
    </div>`;
  }

  return `<div style="margin:12px 14px 0;background:var(--navy);border-radius:14px;padding:18px 20px;box-shadow:0 2px 8px rgba(0,0,0,.1)">
    <div style="font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:4px">Din smärtutveckling (NRS)</div>
    <div style="font-size:13px;font-weight:600;margin-bottom:12px;color:${trend}">${arrow}${diff>0?' · '+diff+' enheter':''}</div>
    <svg width="100%" viewBox="0 0 ${W} ${H+28}" style="overflow:visible">${svgContent}</svg>
  </div>`;
}

function _zpSessionKey(patId, visitId) {
  const today = new Date().toISOString().slice(0,10);
  return 'zenya:exsession:' + patId + ':' + visitId + ':' + today;
}

function zpInitSession(patId, visitId, total) {
  let state = {};
  try { state = JSON.parse(localStorage.getItem(_zpSessionKey(patId, visitId)) || '{}'); } catch(e) {}
  const doneCount = Object.values(state).filter(Boolean).length;
  // Restore checked state for each exercise
  for (let i = 0; i < total; i++) {
    if (state[i]) _zpApplyCheck(i, true);
  }
  _zpUpdateStrip(doneCount, total);
}

function zpCheckEx(patId, visitId, idx, total) {
  // Haptic feedback
  if (navigator.vibrate) navigator.vibrate([10]);

  // Load state
  const key = _zpSessionKey(patId, visitId);
  let state = {};
  try { state = JSON.parse(localStorage.getItem(key) || '{}'); } catch(e) {}

  // Toggle
  state[idx] = !state[idx];
  const nowDone = state[idx];
  try { localStorage.setItem(key, JSON.stringify(state)); } catch(e) {}

  // Haptic for check
  if (navigator.vibrate) navigator.vibrate(nowDone ? [15, 30, 15] : [10]);

  // Update UI with animation
  _zpApplyCheck(idx, nowDone);
  const doneCount = Object.values(state).filter(Boolean).length;
  _zpUpdateStrip(doneCount, total);

  // If all done — celebrate
  if (doneCount === total && total > 0) {
    const btn = document.getElementById('pub-pass-btn');
    if (btn && !btn.disabled) btn.classList.add('all-done');
    window._zpSessionState = { patId, visitId, state, total, completedAt: new Date().toISOString() };
    if (navigator.vibrate) navigator.vibrate([30, 50, 30, 50, 80]);
    _zpConfetti();
  }
}

function _zpConfetti() {
  // Lightweight confetti burst — no library needed
  const colors = ['#0d9b8a','#1fc8b4','#ffffff','#a8e6d9','#0aab7c'];
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:999;overflow:hidden';
  document.body.appendChild(container);
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    const size = 6 + Math.random() * 8;
    const x = 20 + Math.random() * 60; // start from center-ish
    const rotation = Math.random() * 360;
    const duration = 0.8 + Math.random() * 0.8;
    const drift = (Math.random() - 0.5) * 200;
    p.style.cssText = `position:absolute;top:40%;left:${x}%;width:${size}px;height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random() > 0.5 ? '50%' : '2px'};
      transform:rotate(${rotation}deg);
      animation:confettiFall ${duration}s ease-out forwards`;
    p.style.setProperty('--drift', drift + 'px');
    container.appendChild(p);
  }
  // Add keyframe if not exists
  if (!document.getElementById('confetti-style')) {
    const style = document.createElement('style');
    style.id = 'confetti-style';
    style.textContent = `
      @keyframes confettiFall {
        0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity:1; }
        100% { transform: translate(var(--drift), 280px) rotate(720deg) scale(0); opacity:0; }
      }`;
    document.head.appendChild(style);
  }
  setTimeout(() => container.remove(), 1600);
}


function _zpApplyCheck(idx, done) {
  const card = document.getElementById('zp-ex-' + idx);
  const ring = document.getElementById('zp-ring-' + idx);
  if (card) {
    card.classList.toggle('done', done);
    if (done) {
      card.style.transform = 'scale(0.985)';
      setTimeout(() => { card.style.transform = ''; }, 180);
    }
  }
  if (ring) {
    ring.classList.toggle('checked', done);
    if (done) {
      ring.style.transform = 'scale(1.3)';
      setTimeout(() => { ring.style.transform = ''; }, 200);
    }
  }
}

function _zpUpdateStrip(done, total) {
  const countEl = document.getElementById('zp-session-count');
  const barEl   = document.getElementById('zp-session-bar');
  const stripEl = document.getElementById('zp-session-strip');
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  if (countEl) {
    countEl.textContent = done + ' / ' + total;
    countEl.classList.toggle('done', done === total);
  }
  if (barEl) barEl.style.width = pct + '%';
  if (stripEl) stripEl.classList.toggle('active', done > 0);
}

const SOAP_PROMPT_KEY = 'hael:soap-prompts';

function getSoapPrompts() {
  try {
    const saved = JSON.parse(localStorage.getItem(SOAP_PROMPT_KEY)||'{}');
    return {
      S: saved.S || SOAP_PROMPT_DEFAULTS.S,
      O: saved.O || SOAP_PROMPT_DEFAULTS.O,
      A: saved.A || SOAP_PROMPT_DEFAULTS.A,
      P: saved.P || SOAP_PROMPT_DEFAULTS.P
    };
  } catch(e) { return SOAP_PROMPT_DEFAULTS; }
}

function saveSoapPrompts(prompts) {
  try { localStorage.setItem(SOAP_PROMPT_KEY, JSON.stringify(prompts)); } catch(e) {}
}

function closeDictModal() {
  if (_dictSR) { try { _dictSR.stop(); } catch(e) {} _dictSR = null; }
  document.getElementById('dict-modal')?.remove();
}

function markPromptDone(i) {
  const row = document.getElementById('dprow-'+i);
  const chk = document.getElementById('dpchk-'+i);
  if (!row || !chk) return;
  const done = row.dataset.done === '1';
  row.dataset.done = done ? '0' : '1';
  chk.style.background = done ? '' : 'var(--teal)';
  chk.style.borderColor = done ? '#b8c4d4' : 'var(--teal)';
  chk.innerHTML = done ? '' : '<svg width="9" height="7" viewBox="0 0 9 7"><polyline points="1,4 3.5,6.5 8,1" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  row.style.opacity = done ? '' : '.55';
}

function dictToggleRec() {
  const btn = document.getElementById('dict-rec-btn');
  const label = document.getElementById('dict-rec-label');
  const dot = document.getElementById('dict-rec-dot');

  if (_dictSR) {
    _dictSR.stop(); _dictSR = null;
    if (btn) { btn.style.background = '#1a5a3a'; }
    if (label) label.textContent = 'Fortsätt spela in';
    if (dot) { dot.style.background = 'white'; dot.style.animation = ''; }
    // Show AI and raw buttons if we have text
    const hasText = _dictRawText.trim().length > 0;
    const aiBtn = document.getElementById('dict-ai-btn');
    const rawBtn = document.getElementById('dict-raw-btn');
    if (aiBtn) aiBtn.style.display = hasText ? 'inline-flex' : 'none';
    if (rawBtn) rawBtn.style.display = hasText ? 'inline-flex' : 'none';
    return;
  }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Röstinmatning kräver Chrome på desktop.'); return; }
  const sr = new SR();
  sr.lang = 'sv-SE';
  sr.continuous = true;
  sr.interimResults = true;
  sr.onresult = (ev) => {
    const liveEl = document.getElementById('dict-live');
    const interimEl = document.getElementById('dict-interim');
    let interim = '';
    for (let i = ev.resultIndex; i < ev.results.length; i++) {
      if (ev.results[i].isFinal) {
        _dictRawText += ((_dictRawText && !_dictRawText.endsWith(' ')) ? ' ' : '') + ev.results[i][0].transcript;
        if (liveEl) liveEl.textContent = _dictRawText;
        if (interimEl) interimEl.textContent = '';
      } else {
        interim += ev.results[i][0].transcript;
      }
    }
    if (interimEl) interimEl.textContent = interim;
  };
  sr.onend = () => {
    if (_dictSR) return; // was manually stopped
    const aiBtn = document.getElementById('dict-ai-btn');
    const rawBtn = document.getElementById('dict-raw-btn');
    if (_dictRawText.trim()) {
      if (aiBtn) aiBtn.style.display = 'inline-flex';
      if (rawBtn) rawBtn.style.display = 'inline-flex';
    }
    if (label) label.textContent = 'Spela in igen';
    if (btn) btn.style.background = '#1a5a3a';
    if (dot) { dot.style.animation = ''; }
  };
  sr.start();
  _dictSR = sr;
  if (btn) btn.style.background = '#8a2020';
  if (label) label.textContent = 'Stoppa inspelning';
  if (dot) dot.style.animation = 'pulse 1s infinite';
  const aiBtn = document.getElementById('dict-ai-btn');
  if (aiBtn) aiBtn.style.display = 'none';
  const rawBtn2 = document.getElementById('dict-raw-btn');
  if (rawBtn2) rawBtn2.style.display = 'none';
  const previewWrap = document.getElementById('dict-preview-wrap');
  if (previewWrap) previewWrap.style.display = 'none';
  const insertBtn = document.getElementById('dict-insert-btn');
  if (insertBtn) insertBtn.style.display = 'none';
}

async function dictReformulate(letter) {
  const text = _dictRawText.trim();
  if (!text) return;
  const key = getKey();
  if (!key) { alert('API-nyckel saknas.'); return; }
  const statusEl = document.getElementById('dict-ai-status');
  const aiBtn = document.getElementById('dict-ai-btn');
  const insertBtn = document.getElementById('dict-insert-btn');
  const previewWrap = document.getElementById('dict-preview-wrap');
  const previewTa = document.getElementById('dict-preview-ta');
  if (statusEl) statusEl.textContent = 'Omformulerar...';
  if (aiBtn) aiBtn.disabled = true;

  const sectionName = {S:'Subjektivt (patientens berättelse)',O:'Objektivt (undersökningsfynd)',A:'Bedömning (diagnos och prognos)',P:'Plan (åtgärder och uppföljning)'}[letter];
  const prompt = `Du är leg. fysioterapeut som skriver kliniska journalanteckningar. Nedanstående text är en rösttranskription -- den kan innehålla talspråk, taligenkänningsfel, dialektala uttryck eller ofullständiga meningar. Producera alltid en klinisk text utan att kommentera transkriptionskvaliteten.

Instruktioner:
- Tolka sannolika kliniska innebörder även vid fel (t.ex. "hösena"->tendo Achillis, "diskbrock"->diskbråck, "insidan knät"->medialt om genu)
- Anatomiska termer: höger->dextra/dx, vänster->sinistra/sin, framsida->anteriort, baksida->posteriort, insida->medialt, utsida->lateralt, knäskål->patella, hälsena->tendo Achillis, inklämning->impingement, menisk insida->medial menisk, korsbandet fram->ACL, bak->PCL, axelled->glenohumeralt, nacke->cervikalt, ländrygg->lumbalt, bröstrygg->thorakalt
- Journalstil: löpande meningar, direkt ton, inga rubriker
- Sektion: ${sectionName}
- Svara ENBART med den kliniska texten -- ingen inledning, inga kommentarer

Transkription: "${text}"`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:MODEL_HAIKU, max_tokens:600, messages:[{role:'user',content:prompt}]})
    });
    const data = await res.json();
    const result = (data.content||[]).map(b=>b.text||'').join('').trim();
    if (previewWrap) previewWrap.style.display = 'block';
    if (previewTa) { previewTa.value = result; setTimeout(()=>{ previewTa.style.height='auto'; previewTa.style.height=previewTa.scrollHeight+'px'; },50); }
    if (insertBtn) insertBtn.style.display = 'inline-flex';
    if (statusEl) statusEl.textContent = '';
  } catch(err) {
    if (statusEl) statusEl.textContent = 'Fel -- prova igen';
  }
  if (aiBtn) aiBtn.disabled = false;
}

function detectAnomalies(patients) {
  const alerts = [];
  const now = new Date();

  patients.forEach(p => {
    const visits = (p.visits||[]);
    if (!visits.length) return;

    const latestVisit = visits[0];
    const latestPain = latestVisit.form?.pain ?? latestVisit.soapMeta?.pain;
    const latestDate = latestVisit.date ? new Date(latestVisit.date) : null;

    // 1. NRS ökar mellan senaste besöken
    if (visits.length >= 2) {
      const prevPain = visits[1].form?.pain ?? visits[1].soapMeta?.pain;
      if (latestPain != null && prevPain != null && latestPain - prevPain >= 3) {
        alerts.push({pat:p, icon:'high', msg:`NRS ökade ${prevPain}->${latestPain} sedan förra besöket`, tag:'Smärtökning', tagColor:'#fde8e8', tagText:'#8a2020', severity:2});
      }
    }

    // 2. Tre besök i rad utan förbättring
    if (visits.length >= 3) {
      const pains = visits.slice(0,3).map(v => v.form?.pain ?? v.soapMeta?.pain).filter(x=>x!=null);
      if (pains.length === 3 && pains[0] >= pains[1] && pains[1] >= pains[2] && pains[0] >= 5) {
        alerts.push({pat:p, icon:'med', msg:`NRS stagnerad/ökande tre besök i rad (${[...pains].reverse().join('->')})`, tag:'Ingen progress', tagColor:'#fdf3d8', tagText:'#7a5000', severity:2});
      }
    }

    // 3. Missat återbesök >60 dagar
    if (latestDate) {
      const fw = latestVisit.form?.followup || 4;
      const dueDate = new Date(latestDate); dueDate.setDate(dueDate.getDate() + fw * 7);
      const overdueDays = Math.round((now - dueDate) / (1000*60*60*24));
      if (overdueDays > 60) {
        alerts.push({pat:p, icon:'low', msg:`Återbesök ${overdueDays} dagar försenat (planerat ${dueDate.toLocaleDateString('sv-SE')})`, tag:'Försenat', tagColor:'#e8f0fe', tagText:'#1a3a8a', severity:1});
      }
    }

    // 4. Hög smärta (>=8) utan plan
    if (latestPain >= 8 && !latestVisit.plan) {
      alerts.push({pat:p, icon:'crit', msg:`Smärta NRS ${latestPain}/10 -- ingen Hael-plan skapad`, tag:'Åtgärd krävs', tagColor:'#fde8e8', tagText:'#8a2020', severity:3});
    }
  });

  // Sort by severity
  return alerts.sort((a,b) => b.severity - a.severity).slice(0,8);
}

function renderPlanReviewSection(patients) {
  // Find visits with active plans that have enough check-in data to warrant review
  const reviews = [];
  (patients||[]).forEach(pat => {
    (pat.visits||[]).filter(v=>v.plan).forEach(v => {
      const logs = getPassLogs(pat.id).filter(l=>l.visitId===v.id);
      if (logs.length < 2) return;
      const recent = logs.slice(0,5);
      const avgPain = recent.reduce((s,l)=>s+(l.pain||0),0)/recent.length;
      const lowCompletion = recent.filter(l=>l.done==='few'||l.done==='partial').length >= 2;
      const highPain = avgPain >= 6;
      const painRising = recent.length>=3 && recent[0].pain > recent[recent.length-1].pain + 1;
      const canProgress = avgPain <= 3 && recent.filter(l=>l.done==='all').length >= recent.length*0.8;
      const urgency = (highPain||painRising) ? 'high' : lowCompletion ? 'medium' : canProgress ? 'progress' : null;
      if (!urgency) return;
      // Don't re-surface if already adjusted after latest log
      const alreadyApplied = v.plan.lastAdjusted && new Date(v.plan.lastAdjusted) > new Date(logs[0].ts);
      if (alreadyApplied) return;
      reviews.push({ pat, visit:v, logs:recent, avgPain:Math.round(avgPain*10)/10, urgency });
    });
  });

  if (!reviews.length) return '';

  const urgencyColor = u => u==='high'?'#c05050':u==='medium'?'#c8a030':'#1a7a4a';
  const urgencyBg    = u => u==='high'?'#fdf5f5':u==='medium'?'#fffcf0':'#f2faf5';
  const urgencyLabel = u => u==='high'?'Hög smärta / stigande'
                          : u==='medium'?'Låg genomförandegrad'
                          : 'Redo att progrediera';

  return `<div class="anomaly-section" style="border-left-color:#4a7aaa;background:var(--surface2)">
    <div class="anomaly-hdr" style="border-bottom-color:#e0e8f5">
      <div class="anomaly-dot" style="background:#4a7aaa"></div>
      <div style="font-size:12px;font-weight:700;color:#1a3a6a">${reviews.length} plan${reviews.length>1?'er':''} väntar på granskning</div>
    </div>
    ${reviews.map(r => `
      <div style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid #e8eef6;cursor:pointer"
           onclick="openPat('${r.pat.id}')">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:var(--navy)">${e(r.pat.name)}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:1px">${r.logs.length} pass loggade · NRS snitt ${r.avgPain}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <span style="font-size:10px;font-weight:700;color:${urgencyColor(r.urgency)};background:${urgencyBg(r.urgency)};padding:3px 9px;border-radius:10px;white-space:nowrap">${urgencyLabel(r.urgency)}</span>
          <button onclick="event.stopPropagation();analyzePlanAdjustment('${r.pat.id}','${r.visit.id}')"
            style="background:var(--navy);color:white;border:none;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;border-radius:6px;white-space:nowrap">
            Analysera
          </button>
        </div>
      </div>`).join('')}
  </div>`;
}
