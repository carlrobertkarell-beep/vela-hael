<style id="vela-app-css">
/* ── DESIGN TOKENS ─────────────────────────────────────────── */
:root {
  /* ── Brand ─────────────────────────────────────────────── */
  --navy:    #0c1f3d;
  --navy2:   #091629;
  --teal:    #0d9b8a;
  --teal-lt: rgba(13,155,138,.12);
  --teal-dk: #0a7a6e;
  --accent:  #0d9b8a;
  --gold:    #d4a843;
  --gold-lt: rgba(212,168,67,.12);
  --red:     #e05555;
  --red-lt:  rgba(224,85,85,.12);
  --green:   #1fa060;
  --green-lt:rgba(31,160,96,.12);

  /* ── Dark theme (default) ──────────────────────────────── */
  --bg:       #0e1825;
  --bg2:      #111e2d;
  --surface:  #162030;
  --surface2: #1c2a3e;
  --surface3: #223248;
  --ink:      #e8edf4;
  --text:     #b8c4d4;
  --text2:    #8898aa;
  --text3:    #5a6e84;
  --muted:    #5a6e84;
  --border:   rgba(255,255,255,.08);
  --border2:  rgba(255,255,255,.05);

  /* ── Typography ────────────────────────────────────────── */
  --font:       'Plus Jakarta Sans', system-ui, sans-serif;
  --font-mono:  'JetBrains Mono', 'DM Mono', monospace;
  --font-serif: 'Fraunces', Georgia, serif;

  /* ── Geometry ──────────────────────────────────────────── */
  --r-sm: 6px; --r-md: 10px; --r-lg: 14px; --r-xl: 20px;

  /* ── Shadows (elevated on dark) ────────────────────────── */
  --shadow-xs: 0 1px 4px rgba(0,0,0,.3);
  --shadow-sm: 0 2px 10px rgba(0,0,0,.35);
  --shadow-md: 0 4px 24px rgba(0,0,0,.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,.5);

  /* ── Sidebar ───────────────────────────────────────────── */
  --sb-bg:        #0a1628;
  --sb-border:    rgba(255,255,255,.06);
  --sb-text:      rgba(255,255,255,.35);
  --sb-text2:     rgba(255,255,255,.72);
  --sb-hover:     rgba(255,255,255,.05);
  --sb-active-bg: rgba(13,155,138,.18);
  --sb-active-col:#3dcfbd;
}

/* ── Light mode override (optional, future toggle) ────────── */
body.light {
  --bg:       #f4f7fb;
  --bg2:      #eef1f7;
  --surface:  #ffffff;
  --surface2: #f6f8fc;
  --surface3: #eef1f7;
  --ink:      #0c1a2e;
  --text:     #3a4a5a;
  --text2:    #5a6a7a;
  --text3:    #8896a8;
  --muted:    #8896a8;
  --border:   #e4e9f0;
  --border2:  #f0f3f8;
  --teal-lt:  #e6f7f5;
  --gold-lt:  #fdf6e3;
  --red-lt:   #fdf0f0;
  --green-lt: #f0faf5;
  --shadow-xs: 0 1px 3px rgba(0,0,0,.06);
  --shadow-sm: 0 2px 8px rgba(0,0,0,.07);
  --shadow-md: 0 4px 20px rgba(0,0,0,.09);
  --shadow-lg: 0 8px 36px rgba(0,0,0,.12);
}

/* ── RESET ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); color: var(--ink); background: var(--bg); -webkit-font-smoothing: antialiased; color-scheme: dark; }
button, input, textarea, select { font-family: inherit; }

/* ── APP SHELL ──────────────────────────────────────────────── */
.app-shell { display: flex; height: 100vh; overflow: hidden; }
.main-content { flex: 1; overflow-y: auto; background: var(--bg); }
.screen { display: none; min-height: 100%; }
.screen.active { display: block; }

/* ── SIDEBAR ────────────────────────────────────────────────── */
.nav-sidebar {
  width: 230px; flex-shrink: 0; background: var(--sb-bg);
  display: flex; flex-direction: column;
  border-right: 1px solid rgba(255,255,255,.04);
  z-index: 150; transition: transform .25s ease;
}
.nav-logo {
  padding: 22px 18px 18px;
  border-bottom: 1px solid var(--sb-border);
  display: flex; align-items: center;
}
.nav-section { flex: 1; padding: 10px 10px 4px; overflow-y: auto; }
.nav-section-label {
  font-size: 9px; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; color: rgba(255,255,255,.22);
  padding: 12px 8px 6px; display: block;
}
.nav-item {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 9px 10px; border: none; border-radius: var(--r-md);
  background: transparent; color: var(--sb-text); font-size: 13px;
  font-weight: 500; cursor: pointer; text-align: left;
  transition: background .15s, color .15s; white-space: nowrap;
  font-family: var(--font);
}
.nav-item:hover { background: var(--sb-hover); color: var(--sb-text2); }
.nav-item.active { background: var(--sb-active-bg); color: var(--sb-active-col); font-weight: 600; box-shadow: inset 0 0 0 1px rgba(13,155,138,.2); }
.nav-item-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: .7; }
.nav-item.active .nav-item-icon { opacity: 1; }
.nav-ghost { opacity: .32 !important; cursor: not-allowed !important; pointer-events: none; }
.nav-ghost:hover { background: transparent !important; color: var(--sb-text) !important; }
.nav-badge {
  background: var(--red); color: white; font-size: 10px;
  font-weight: 700; padding: 1px 6px; border-radius: 10px;
  margin-left: auto; font-family: var(--font-mono);
}
.nav-footer { padding: 8px 10px 12px; border-top: 1px solid var(--sb-border); }

/* ── TOPBAR (mobile) ────────────────────────────────────────── */
.topbar {
  display: none; position: fixed; top: 0; left: 0; right: 0;
  height: 52px; background: var(--sb-bg); z-index: 140;
  align-items: center; padding: 0 6px; gap: 4px;
}
@media (max-width: 768px) {
  .topbar { display: flex; }
  .nav-sidebar { position: fixed; top: 0; bottom: 0; left: 0; transform: translateX(-100%); }
  .nav-sidebar.open { transform: translateX(0); box-shadow: var(--shadow-lg); }
  .main-content { padding-top: 52px; }
  .app-shell { display: block; height: auto; min-height: 100vh; }
}

/* ── CONTENT WRAPPER ────────────────────────────────────────── */
.cx { max-width: 1200px; margin: 0 auto; padding: 28px 32px 60px; }
@media (max-width: 768px) { .cx { padding: 16px 14px 60px; } }

/* ── COMMAND CENTER ─────────────────────────────────────────── */
.cc-wrap { max-width: 1200px; margin: 0 auto; padding: 0 32px 60px; }
@media (max-width: 768px) { .cc-wrap { padding: 0 14px 60px; } }

/* Header */
.cc-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 28px 0 24px; gap: 16px; flex-wrap: wrap;
}
.cc-greeting {
  font-family: var(--font-serif); font-size: clamp(22px,2.5vw,30px);
  font-weight: 300; color: var(--ink); letter-spacing: -.02em; line-height: 1.2;
}
.cc-date { font-size: 12px; color: var(--text3); margin-top: 5px; }
.cc-start-btn {
  background:var(--navy); color: white; border: none;
  border-radius: 12px; padding: 12px 22px; font-size: 13px;
  font-weight: 700; cursor: pointer; font-family: var(--font);
  display: flex; align-items: center; gap: 8px;
  transition: all .2s; flex-shrink: 0; letter-spacing: .01em;
  box-shadow: 0 2px 12px rgba(12,31,61,.2);
}
.cc-start-btn:hover { background: var(--teal); transform: translateY(-1px); box-shadow: 0 4px 18px rgba(13,155,138,.3); }

/* KPI strip */
.cc-kpi-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 20px; }
@media (max-width: 900px) { .cc-kpi-row { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 480px) { .cc-kpi-row { grid-template-columns: 1fr 1fr; } }

.cc-kpi {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 18px 20px 14px;
  position: relative; overflow: hidden;
  transition: box-shadow .2s, transform .2s;
  box-shadow: var(--shadow-xs);
}
.cc-kpi:hover { box-shadow: var(--shadow-sm); transform: translateY(-1px); border-color: rgba(255,255,255,.14); }
.cc-kpi-icon {
  width: 34px; height: 34px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 12px; flex-shrink: 0;
}
.cc-kpi-val {
  font-size: 26px; font-weight: 800; color: var(--ink);
  font-family: var(--font-mono); line-height: 1; margin-bottom: 4px;
  letter-spacing: -.02em;
}
.cc-kpi-lbl {
  font-size: 11px; color: var(--text3); font-weight: 600;
  text-transform: uppercase; letter-spacing: .07em;
}
.cc-kpi-delta {
  font-size: 11px; font-weight: 700; margin-top: 8px;
  display: flex; align-items: center; gap: 3px;
}
.cc-kpi-delta.up { color: var(--green); }
.cc-kpi-delta.dn { color: var(--red); }
.cc-kpi-delta.neu { color: var(--text3); }
.cc-kpi-spark { margin-top: 10px; }

/* AI Briefing */
.cc-briefing {
  background: linear-gradient(130deg, #0c1f3d 0%, #0c2a40 60%, #083830 100%);
  border-radius: 18px; padding: 22px 26px; margin-bottom: 20px;
  position: relative; overflow: hidden;
  box-shadow: 0 4px 24px rgba(12,31,61,.18);
}
.cc-briefing::after {
  content: ''; position: absolute; top: -60px; right: -60px;
  width: 200px; height: 200px; border-radius: 50%;
  background: radial-gradient(circle, rgba(13,155,138,.18) 0%, transparent 70%);
  pointer-events: none;
}
.cc-briefing-lbl {
  font-size: 9px; font-weight: 700; letter-spacing: .16em;
  text-transform: uppercase; color: rgba(13,155,138,.9);
  margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
}
.cc-briefing-lbl::before { content: ''; width: 16px; height: 1px; background: rgba(13,155,138,.6); }
.cc-briefing-text { font-size: 14px; color: rgba(255,255,255,.8); line-height: 1.8; max-width: 800px; }
.cc-briefing-btn {
  margin-top: 14px; background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.12); color: rgba(255,255,255,.55);
  border-radius: 8px; padding: 7px 14px; font-size: 11px;
  font-weight: 600; cursor: pointer; font-family: var(--font);
  transition: all .2s;
}
.cc-briefing-btn:hover { background: rgba(255,255,255,.15); color: white; }

/* Main grid */
.cc-grid {
  display: grid; grid-template-columns: 1fr 1fr 320px;
  gap: 16px; margin-bottom: 20px;
}
@media (max-width: 1100px) { .cc-grid { grid-template-columns: 1fr 1fr; } .cc-col-right { display: none; } }
@media (max-width: 700px)  { .cc-grid { grid-template-columns: 1fr; } }

.cc-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-xs);
}
.cc-panel-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 12px; border-bottom: 1px solid var(--border);
}
.cc-panel-title {
  font-size: 11px; font-weight: 700; color: var(--text2);
  letter-spacing: .06em; text-transform: uppercase;
}
.cc-panel-body { padding: 6px 0; }
.cc-panel-link {
  background: none; border: none; font-size: 11px; color: var(--teal);
  cursor: pointer; font-family: var(--font); font-weight: 700;
  padding: 0; transition: opacity .15s;
}
.cc-panel-link:hover { opacity: .7; }

/* Panel rows */
.cc-row {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 18px; border-bottom: 1px solid var(--border2);
  cursor: pointer; transition: background .12s;
}
.cc-row:last-child { border-bottom: none; }
.cc-row:hover { background: var(--surface2); border-radius: 0; }
.cc-row-av {
  width: 36px; height: 36px; border-radius: 50%; background:var(--navy);
  color: white; font-size: 11px; font-weight: 700; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
  font-family: var(--font-mono); letter-spacing: -.02em;
}
.cc-row-main { flex: 1; min-width: 0; }
.cc-row-name { font-size: 13px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cc-row-sub  { font-size: 11px; color: var(--text3); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cc-row-meta { flex-shrink: 0; text-align: right; }
.cc-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
.cc-badge-red  { background: var(--red-lt);   color: var(--red); }
.cc-badge-gold { background: var(--gold-lt);  color: var(--gold); }
.cc-badge-teal { background: var(--teal-lt);  color: var(--teal-dk); }
.cc-empty { padding: 24px 18px; text-align: center; font-size: 12px; color: var(--text3); }

/* Feed items */
.cc-feed-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border2); }
.cc-feed-item:last-child { border-bottom: none; }
.cc-feed-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
.cc-feed-title { font-size: 12px; font-weight: 600; color: var(--navy); line-height: 1.4; }
.cc-feed-sub   { font-size: 11px; color: var(--text3); margin-top: 2px; line-height: 1.4; }
.cc-feed-time  { font-size: 10px; color: var(--text3); margin-top: 3px; }

/* Bottom row */
.cc-bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 700px) { .cc-bottom-row { grid-template-columns: 1fr; } }

/* ── VELA ASK BUBBLE ────────────────────────────────────────── */
.vela-ask-bubble {
  position: fixed; bottom: 24px; right: 24px; z-index: 400;
  width: 52px; height: 52px; border-radius: 50%;
  background:var(--navy); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(12,31,61,.3);
  transition: transform .2s, box-shadow .2s;
}
.vela-ask-bubble:hover { transform: scale(1.08); background: var(--teal); box-shadow: 0 6px 28px rgba(13,155,138,.4); }
.vela-ask-panel {
  position: fixed; bottom: 86px; right: 24px; z-index: 399;
  width: 360px; max-height: 520px; background: var(--navy2);
  border: 1px solid rgba(255,255,255,.1); border-radius: 20px;
  box-shadow: var(--shadow-lg); display: flex; flex-direction: column;
  overflow: hidden; animation: fadeUp .22s ease;
}
@media (max-width: 500px) { .vela-ask-panel { left: 12px; right: 12px; width: auto; } .vela-ask-bubble { bottom: 16px; right: 16px; } }
.vela-ask-hdr { padding: 14px 16px; border-bottom: 1px solid rgba(255,255,255,.08); display: flex; align-items: center; gap: 10px; }
.vela-ask-hdr-icon { width: 30px; height: 30px; border-radius: 8px; background: rgba(13,155,138,.2); display: flex; align-items: center; justify-content: center; }
.vela-ask-title { font-size: 13px; font-weight: 700; color: white; }
.vela-ask-sub   { font-size: 10px; color: rgba(255,255,255,.35); }
.vela-ask-msgs  { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
.vela-ask-msg-ai   { background: rgba(255,255,255,.07); border-radius: 12px 12px 12px 4px; padding: 10px 13px; font-size: 13px; color: rgba(255,255,255,.8); line-height: 1.6; max-width: 90%; }
.vela-ask-msg-user { background: var(--teal); border-radius: 12px 12px 4px 12px; padding: 10px 13px; font-size: 13px; color: white; line-height: 1.6; max-width: 90%; align-self: flex-end; }
.vela-ask-suggestions { padding: 8px 14px; display: flex; flex-direction: column; gap: 5px; }
.vela-ask-sug { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); border-radius: 8px; padding: 8px 12px; font-size: 11px; color: rgba(255,255,255,.6); cursor: pointer; font-family: var(--font); text-align: left; transition: all .15s; }
.vela-ask-sug:hover { background: rgba(255,255,255,.1); color: white; }
.vela-ask-inp-row { padding: 10px 12px; border-top: 1px solid rgba(255,255,255,.08); display: flex; gap: 8px; }
.vela-ask-inp { flex: 1; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1); border-radius: 10px; padding: 9px 13px; font-size: 13px; color: white; font-family: var(--font); outline: none; }
.vela-ask-inp::placeholder { color: rgba(255,255,255,.25); }
.vela-ask-inp:focus { border-color: rgba(13,155,138,.5); }
.vela-ask-send { background: var(--teal); border: none; border-radius: 10px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: background .15s; }
.vela-ask-send:hover { background: var(--teal-dk); }

/* ── CONSULTATION POPUP ─────────────────────────────────────── */
.consult-ov { position: fixed; inset: 0; z-index: 600; display: flex; align-items: center; justify-content: center; background: rgba(7,16,30,.6); backdrop-filter: blur(6px); animation: fadeInOv .18s ease; padding: 24px; }
.consult-sheet { background: var(--surface); border-radius: 20px; width: 100%; max-width: 600px; max-height: 80vh; display: flex; flex-direction: column; box-shadow: var(--shadow-lg); animation: fadeUp .22s ease; }
.consult-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.consult-messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
.consult-bubble { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.65; max-width: 88%; }
.consult-bubble.ai   { background: var(--surface2); color: var(--ink); border-radius: 4px 14px 14px 14px; align-self: flex-start; }
.consult-bubble.user { background:var(--navy); color: white; border-radius: 14px 14px 4px 14px; align-self: flex-end; }
.consult-input-row { display: flex; gap: 10px; padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
.consult-inp { flex: 1; border: 1.5px solid var(--border); border-radius: var(--r-md); padding: 10px 14px; font-size: 14px; font-family: var(--font); color: var(--ink); outline: none; background: var(--surface2); }
.consult-inp:focus { border-color: var(--teal); }

/* ── MODAL ──────────────────────────────────────────────────── */
.modal-ov { display: none; position: fixed; inset: 0; z-index: 800; background: rgba(12,31,61,.55); backdrop-filter: blur(6px); align-items: center; justify-content: center; padding: 20px; }
.modal-ov.open { display: flex; animation: fadeInOv .18s ease; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px 24px; width: 100%; max-width: 400px; box-shadow: var(--shadow-lg); }
.modal-title { font-size: 17px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
.modal-text  { font-size: 14px; color: var(--text); line-height: 1.6; margin-bottom: 20px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

/* ── DETAIL LAYOUT ──────────────────────────────────────────── */
.det-layout { display: grid; grid-template-columns: 1fr 268px; gap: 20px; align-items: start; }
@media (max-width: 900px) { .det-layout { grid-template-columns: 1fr; } }
.det-main { min-width: 0; }
.det-aside { position: sticky; top: 24px; display: flex; flex-direction: column; gap: 12px; }
.det-action-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: var(--shadow-xs); }
.det-action-card-hdr { font-size: 9px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--text3); padding: 11px 16px 8px; border-bottom: 1px solid var(--border2); }
.det-action-card-body { padding: 6px 8px; display: flex; flex-direction: column; gap: 1px; }
.det-action-btn { display: flex; align-items: center; gap: 9px; width: 100%; padding: 9px 10px; border: none; background: transparent; color: var(--text); font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 8px; font-family: var(--font); text-align: left; transition: background .12s; }
.det-action-btn:hover { background: var(--surface3); }
.det-action-btn.primary { color: var(--teal); font-weight: 700; }
.det-action-btn.danger  { color: var(--red); }
.det-action-btn svg     { flex-shrink: 0; opacity: .55; }

/* ── ANOMALY / CLINICAL WARNINGS ────────────────────────────── */

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    // Inline SW via blob — no separate file needed
    const swCode = `
const CACHE = 'hael-v1';
const OFFLINE = ['/'];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(OFFLINE)).catch(()=>{}));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    fetch(e.request).then(r => {
      if (r && r.status === 200 && r.type === 'basic') {
        const clone = r.clone();
        caches.open(CACHE).then(c => c.put(e.request, clone));
      }
      return r;
    }).catch(() => caches.match(e.request).then(r => r || caches.match('/')))
  );
});`;
    try {
      const blob = new Blob([swCode], { type: 'application/javascript' });
      const url = URL.createObjectURL(blob);
      navigator.serviceWorker.register(url, { scope: '/' })
        .then(() => URL.revokeObjectURL(url))
        .catch(() => {});
    } catch(e) {}
  });
}

// Returns {ok, tier, features:[], expiresAt, freeUntil}
function zpCheckAccess(visit) {
  if (!visit) return { ok: false, tier: 'expired', features: [] };
  if (visit.accessOverride === 'unlimited') {
    const t = PAYMENT_TIERS[visit.paymentTier] || PAYMENT_TIERS.pro;
    return { ok: true, tier: 'manual', features: t.features };
  }
  if (visit.paidUntil && new Date(visit.paidUntil) > new Date()) {
    const t = PAYMENT_TIERS[visit.paymentTier];
    return { ok: true, tier: visit.paymentTier || 'bas', features: t ? t.features : ['stats','ai_messages'], expiresAt: visit.paidUntil };
  }
  const followupWeeks = visit.form?.followup || 4;
  if (visit.date) {
    const freeEnd = new Date(visit.date);
    freeEnd.setDate(freeEnd.getDate() + followupWeeks * 7);
    if (freeEnd > new Date()) return { ok: true, tier: 'free', features: [], freeUntil: freeEnd.toISOString() };
    return { ok: false, tier: 'expired', features: [], expiredAt: freeEnd.toISOString() };
  }
  return { ok: true, tier: 'free', features: [] };
}

// Quick helper -- use anywhere in plan rendering
function zpHasFeature(visit, feature) {
  const a = zpCheckAccess(visit);
  return a.features.includes(feature);
}

}

function zpRenderPaywall(patId, visitId, pat) {

  const allNRS = logs.filter(l => l.nrs != null).map(l => l.nrs);

  const totalWeeks = visit?.form?.followup || 4;
  const visitDate = visit?.date;
  const weeksSince = visitDate ? Math.floor((Date.now() - new Date(visitDate)) / (7*24*60*60*1000)) : totalWeeks;

  const achievements = [
    { val: completedSessions || 0, lbl: 'Pass\navklarade', hi: completedSessions >= 8 },
    { val: weeksSince + ' v', lbl: 'Veckor\nmed träning', hi: weeksSince >= 3 },

      : { val: firstNRS != null ? firstNRS + '/10' : '--', lbl: 'NRS vid\nstart', hi: false },
  ];

  // -- Active length selector state ------------------------------------------
  window._zpRenewalLength = window._zpRenewalLength || 'quarter';

function parseBirthdate(val) {
  if (!val) return '';
  val = val.trim().replace(/\s/g,'');
  if (/^\d{6}$/.test(val)) {
    const yy = parseInt(val.slice(0,2));
    const yyyy = yy <= (new Date().getFullYear() % 100) ? 2000+yy : 1900+yy;
    return yyyy + '-' + val.slice(2,4) + '-' + val.slice(4,6);
  }
  if (/^\d{8}$/.test(val)) return val.slice(0,4)+'-'+val.slice(4,6)+'-'+val.slice(6,8);
  if (/^\d{4}-\d{2}-\d{2}$/.test(val)) return val;
  return val;
}
function birthdateToYear(bd) {
  if (!bd) return 1980;
  const m = (bd+'').match(/^(\d{4})/);
  return m ? parseInt(m[1]) : 1980;
}

function loadPats(){
  const seen=new Set();
  const pats=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(!k)continue;
    // Match ALL patient key formats: kansei-data:xxx, pat:xxx, pat_xxx, kpat_xxx
    const isPatKey=k.startsWith('kansei-data:')||k.startsWith('pat:')||
                   (k.startsWith('pat_')&&!k.includes(':'))||
                   (k.startsWith('kpat_')&&!k.includes(':'));
    if(isPatKey){
      try{
        const v=localStorage.getItem(k);
        if(!v)continue;
        const p=JSON.parse(v);
        if(p&&p.id&&typeof p.id==='string'&&!seen.has(p.id)){
          seen.add(p.id);pats.push(p);
        }
      }catch{}
    }
  }
  S.patients=pats;
  S.patients.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
  // Re-save under canonical key so future loads are consistent
  S.patients.forEach(p=>{try{localStorage.setItem('kansei-data:'+p.id,JSON.stringify(p));}catch{}});
}

// Create a new inbox item
// type: 'urgent' | 'ai_action' | 'info'
// category: 'pain_spike' | 'new_pain_location' | 'low_completion' | 'inactivity' | 'never_logged' | 'stagnation' | 'low_energy' | 'intake_pending' | 'unanswered_message' | 'negative_response' | 'access_expiring' | 'patient_reply' | 'plan_adjusted' | 'plan_progressed' | 'message_sent' | 'flag'
function addInboxItem(patId, patName, type, category, title, body, actions) {
  const items = getInbox();
  // Deduplicate -- don't add same category for same patient within 24h
  const recent = items.find(x =>
    x.patId === patId && x.category === category &&
    Date.now() - x.ts < 24*60*60*1000
  );
  if (recent) return;
  const item = {
    id: 'ibx_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    patId, patName, type, category, title, body,
    actions: actions || [],
    ts: Date.now(),
    read: false,
  };
  items.unshift(item);
  // Keep max 100 items
  if (items.length > 100) items.splice(100);
  saveInbox(items);
  updateInboxBadge();
}

const NOTIF_KEY = 'hael:notif-seen';

function _velaNotifSupported() {
  return typeof Notification !== 'undefined';
}

async function requestNotifPermission() {
  if (!_velaNotifSupported()) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  const result = await Notification.requestPermission();
  return result === 'granted';
}

function velaNotify(title, body, patId) {
  // Update tab title with badge
  _updateTabTitle();
  if (!_velaNotifSupported() || Notification.permission !== 'granted') return;
  // Don't notify if tab is visible
  if (!document.hidden) return;
  try {
    const n = new Notification('Vela — ' + title, {
      body: body || '',
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="8" fill="%230d9b8a"/><text x="16" y="22" font-size="18" text-anchor="middle" fill="white" font-family="sans-serif">V</text></svg>',
      tag: patId || 'vela',
      requireInteraction: false,
    });
    n.onclick = () => {
      window.focus();
      n.close();
      if (patId) {
        const pat = S.patients.find(x => x.id === patId);
        if (pat) { S.pat = pat; go('detail'); }
      }

    setTimeout(() => n.close(), 8000);

function _checkNewPatientActivity(patients) {
  const seen = (() => { try { return new Set(JSON.parse(localStorage.getItem(NOTIF_KEY)||'[]')); } catch(e) { return new Set(); }})();
  const newSeen = new Set(seen);
  let notified = false;
  (patients||[]).forEach(p => {
    (p.messages||[]).forEach(m => {
      if (m.from !== 'patient' || m.read) return;
      const key = m.id || (p.id + ':' + m.ts);
      if (!seen.has(key)) {
        newSeen.add(key);
        if (!notified) {
          const firstName = (p.name||'Patient').split(' ')[0];
          velaNotify(firstName + ' svarade', (m.text||'').slice(0, 80), p.id);
          notified = true;
        }
      }
    });
  });
  if (newSeen.size !== seen.size) {
    try { localStorage.setItem(NOTIF_KEY, JSON.stringify([...newSeen].slice(-200))); } catch(e) {}
  }
}

          ${pat?'<div class="inbox-item-body">'+e(pat.name)+(item.body?' — '+e(item.body.slice(0,80)):'')+'</div>':item.body?'<div class="inbox-item-body">'+e(item.body.slice(0,100))+'</div>':''}
          <div class="inbox-item-time">${timeStr}${!item.read?' · <span style="color:var(--teal);font-weight:700">Ny</span>':''}</div>
        </div>
      </div>
      ${item.type==='urgent'&&pat?`<div style="display:flex;gap:6px;margin-top:8px;padding-left:42px">
        <button onclick="event.stopPropagation();closeInbox();openPat('${pat.id}')" class="inbox-act-btn inbox-act-primary">Öppna kundkort</button>
        <button onclick="event.stopPropagation();markInboxRead('${item.id}');this.closest('.inbox-item').style.opacity='.4'" class="inbox-act-btn inbox-act-ghost">Ignorera</button>
      </div>`:''}
    </div>`;
  }).join('') : `<div class="inbox-empty">
    <svg viewBox="0 0 24 24"><path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>
    <div class="inbox-empty-title">Inget att visa</div>
    <div class="inbox-empty-sub">Inga händelser i denna kategori</div>
  </div>`;

  dr.innerHTML = `
  <div class="inbox-hdr">
    <div>
      <div class="inbox-title">Inkorg</div>
      <div class="inbox-subtitle">${all.length} händelse${all.length!==1?'r':''} · ${unread} oläst${unread!==1?'a':''}</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      ${unread>0?`<button onclick="markAllInboxRead();renderInboxDrawer()" style="background:none;border:none;font-size:11px;color:var(--teal);cursor:pointer;font-family:var(--font);font-weight:600">Markera alla lästa</button>`:''}
      <button class="inbox-close" onclick="closeInbox()">×</button>
    </div>
  </div>
  <div class="inbox-tabs">
    ${tabs.map((t,i)=>`<button class="inbox-tab${S_tab===i?' active':''}" onclick="document.getElementById('inbox-drawer')._tab=${i};renderInboxDrawer()">${t}${i===1&&all.filter(x=>x.type==='urgent').length>0?' <span style=\'background:var(--red);color:white;font-size:9px;padding:1px 5px;border-radius:8px;font-weight:700\'>'+(all.filter(x=>x.type==='urgent').length)+'</span>':''}</button>`).join('')}
  </div>
  <div class="inbox-body">${itemsHtml}</div>`;
}

    stagnation:        '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',

    negative_response: '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
    plan_pending_approval:'<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
    renewal_abandoned:     '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>',
    patient_reply:     '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',

    plan_progressed:   '<polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/>',

function formatInboxTime(ts) {
  const diff = Date.now() - ts;
  if (diff < 60*1000) return 'Just nu';
  if (diff < 60*60*1000) return Math.floor(diff/60000) + ' min';
  if (diff < 24*60*60*1000) return Math.floor(diff/3600000) + ' h';
  return new Date(ts).toLocaleDateString('sv-SE',{day:'numeric',month:'short'});
}

function inboxOpenPatient(patId) {
  closeInbox();
  const p = S.patients.find(x => x.id === patId);
  if (p) { S.pat = p; go('detail'); }
}

function inboxAction(itemId, fnName) {
  markInboxRead(itemId);
  // fnName is a safe pre-defined string, not user input
  const safeFns = {
    'openDetail': () => { const item = getInbox().find(x=>x.id===itemId); if(item) inboxOpenPatient(item.patId); },
    'markRead':   () => { markInboxRead(itemId); renderInboxDrawer(); },
  };
  // For patId-scoped actions stored as 'fnname:patId:visitId'
  const [fn, patId, visitId] = fnName.split(':');
  if (fn === 'openDetail' && patId) {
    closeInbox();
    const p = S.patients.find(x => x.id === patId);
    if (p) { S.pat = p; go('detail'); }
  } else if (fn === 'adjustPlan' && patId && visitId) {
    closeInbox();
    const p = S.patients.find(x => x.id === patId);
    if (p) { S.pat = p; S.visitId = visitId; go('detail');
      setTimeout(() => analyzePlanAdjustment(patId, visitId), 400); }
  } else if (fn === 'openMsg' && patId) {
    closeInbox();
    const p = S.patients.find(x => x.id === patId);
    if (p) { S.pat = p; go('detail');
      setTimeout(() => { togMsgPanel(patId); }, 400); }
  } else if (fn === 'extendAccess' && patId && visitId) {
    closeInbox();
    const p = S.patients.find(x => x.id === patId);
    if (p) { S.pat = p; go('detail');
      setTimeout(() => zpOpenExtendPanel(patId, visitId), 400); }
  } else if (safeFns[fn]) {
    safeFns[fn]();
  }
  renderInboxDrawer();
}

// -- AI AGENT -- scans patients and creates inbox items -------------------------

const AGENT_LAST_RUN_KEY = 'zenya:agent-last-run';

async function runInboxAgent(patients) {
  patients = patients || S.patients || [];
  _checkNewPatientActivity(patients);
  _updateTabTitle();
  if (!getKey()) return;
  const lastRun = parseInt(localStorage.getItem(AGENT_LAST_RUN_KEY) || '0');
  // Run at most every 5 minutes to avoid hammering
  if (Date.now() - lastRun < 5 * 60 * 1000) {
    updateInboxBadge(); return;
  }
  localStorage.setItem(AGENT_LAST_RUN_KEY, String(Date.now()));

  for (const p of patients) {
    if (!(p.visits||[]).length) continue;
    await _agentScanPatient(p);
  }
  updateInboxBadge();
}

async function _agentScanPatient(p) {
  const logs = getPassLogs(p.id);
  const recentLogs = logs.slice(0, 10);
  const lastVisit  = p.visits?.[0];
  if (!lastVisit) return;

  const now = Date.now();
  const DAY = 1000*60*60*24;

  // Helper: has inbox item of this category been added within N days?
  function recentInbox(category, days) {
    return getInbox().some(i => i.patId === p.id && i.category === category &&
      now - new Date(i.ts||0).getTime() < days*DAY);
  }
  // Helper: has AI message of this type been sent within N days?
  function recentMsg(type, days) {
    return (p.messages||[]).some(m => m.type === type && now - new Date(m.ts).getTime() < days*DAY);
  }

  // -- T1. SMÄRTÖKNING (NRS >=7 eller +2 steg) -------------------------- hög
  if (recentLogs.length >= 2) {
    const latest3 = recentLogs.slice(0, 3);
    const avgLatest = latest3.reduce((s,l) => s+(l.pain||0), 0) / latest3.length;
    const older = recentLogs.slice(3, 6);
    const avgOlder = older.length ? older.reduce((s,l) => s+(l.pain||0), 0) / older.length : null;
    const spike = avgLatest >= 7 || (avgOlder !== null && avgLatest - avgOlder >= 2);
    if (spike && !recentInbox('pain_spike', 2)) {
      // Auto: send empathetic check-in message
      if (!recentMsg('ai_pain_checkin', 3)) await _agentSendPainCheckIn(p, avgLatest);
      addInboxItem(p.id, p.name, 'urgent', 'pain_spike',
        'Smärtökning detekterad',
        `Snitt NRS ${avgLatest.toFixed(1)}/10${avgOlder ? ' -- upp från ' + avgOlder.toFixed(1) : ' -- kritisk nivå'}. AI skickade omtänksamt meddelande.`,
        [
          { label:'Öppna kundkort', style:'primary', fn:`openDetail:${p.id}` },
          { label:'Justera plan', style:'secondary', fn:`adjustPlan:${p.id}:${lastVisit.id}` },
        ]
      );
    }
  }

  // -- T2. NY SMÄRTLOKAL I ANTECKNING (nyckelord) ---------------------- hög
  if (recentLogs.length > 0 && !recentInbox('new_pain_location', 7)) {
    const redFlagWords = /sadelbedövning|perianal|känselbortfall|förlamning|blåsa|tarm|nattsvett|feber|svullnad|ny lokal|strålar|domning|stickningar/i;
    const recentNotes = recentLogs.slice(0,3).map(l => l.note||'').join(' ');
    if (redFlagWords.test(recentNotes)) {
      addInboxItem(p.id, p.name, 'urgent', 'new_pain_location',
        'Möjlig röd flagga i patientrapport',
        'Patienten beskriver symptom som kan kräva klinisk bedömning -- kontrollera anteckning.',
        [
          { label:'Läs rapport', style:'primary', fn:`openDetail:${p.id}` },
        ]
      );
    }
  }

  // -- T3. LÅG GENOMFÖRANDEGRAD ---------------------------------------- medel
  if (recentLogs.length >= 3 && !recentInbox('low_completion', 3)) {
    const sample = recentLogs.slice(0,5);
    const lowCount = sample.filter(l => l.done === 'few' || l.done === 'partial' || l.done === 'none').length;
    const rate = Math.round(lowCount / sample.length * 100);
    if (rate >= 60) {
      if (!recentMsg('ai_compliance', 3)) await _agentSendComplianceMsg(p, rate);
      addInboxItem(p.id, p.name, 'ai_action', 'low_completion',
        'Låg genomförandegrad -- AI skickade uppmuntran',
        `${rate}% av senaste passen ofullständiga. AI har skickat meddelande.`,
        [{ label:'Granska meddelande', style:'secondary', fn:`openMsg:${p.id}` }]
      );
    }
  }

  // -- T4. INAKTIVITET (aktiv fas: 7 dagar, underhåll: 14 dagar) ------- hög
  const lastLogTime = recentLogs.length > 0 ? new Date(recentLogs[0].ts||recentLogs[0].date).getTime() : null;
  const visitStart  = lastVisit.date ? new Date(lastVisit.date).getTime() : null;
  if (lastLogTime || visitStart) {
    const referenceTime = lastLogTime || visitStart;
    const daysSince = Math.round((now - referenceTime) / DAY);
    const totalWeeks = lastVisit.plan?.totalWeeks || lastVisit.form?.followup || 4;
    const weeksSinceVisit = visitStart ? Math.round((now - visitStart) / (7*DAY)) : 0;
    const isMaintenancePhase = weeksSinceVisit >= totalWeeks;
    const threshold = isMaintenancePhase ? 14 : 7;
    if (daysSince >= threshold && !recentInbox('inactivity', threshold)) {
      if (!recentMsg('ai_inactivity', threshold)) await _agentSendInactivityMsg(p, daysSince);
      addInboxItem(p.id, p.name, 'urgent', 'inactivity',
        `Inget loggat pass på ${daysSince} dagar`,
        `${isMaintenancePhase ? 'Underhållsfas' : 'Aktiv rehabfas'} -- patienten har inte rapporterat sedan ${new Date(referenceTime).toLocaleDateString('sv-SE')}.`,
        [
          { label:'Skicka påminnelse', style:'primary', fn:`openMsg:${p.id}` },
          { label:'Öppna kundkort', style:'secondary', fn:`openDetail:${p.id}` },
        ]
      );
    }
  }

  // -- T5. PLAN ÖPPNAD MEN ALDRIG LOGGAD (5 dagar) -------------------- medel
  if (recentLogs.length === 0 && visitStart && !recentInbox('never_logged', 5)) {
    const daysSinceVisit = Math.round((now - visitStart) / DAY);
    if (daysSinceVisit >= 5) {
      addInboxItem(p.id, p.name, 'info', 'never_logged',
        'Ingen träning loggad sedan besöket',
        `Hael-plan skapad ${lastVisit.date} -- inga pass registrerade på ${daysSinceVisit} dagar.`,
        [
          { label:'Skicka påminnelse', style:'primary', fn:`openMsg:${p.id}` },
          { label:'Öppna kundkort', style:'secondary', fn:`openDetail:${p.id}` },
        ]
      );
    }
  }

  // -- T6. UTEBLIVEN PROGRESS (3 veckor stagnation) ------------------- medel
  if (recentLogs.length >= 6 && !recentInbox('stagnation', 7)) {
    const w1 = recentLogs.slice(0,3).reduce((s,l) => s+(l.pain||0),0) / 3;
    const w3 = recentLogs.slice(3,6).reduce((s,l) => s+(l.pain||0),0) / 3;
    if (Math.abs(w1 - w3) < 0.5) { // less than 0.5 NRS change = stagnation
      addInboxItem(p.id, p.name, 'info', 'stagnation',
        'Ingen smärtförbättring på 3 veckor',
        `Snitt NRS ${w3.toFixed(1)} -> ${w1.toFixed(1)} -- planen kan behöva ses över.`,
        [
          { label:'Justera plan', style:'primary', fn:`adjustPlan:${p.id}:${lastVisit.id}` },
          { label:'Öppna kundkort', style:'secondary', fn:`openDetail:${p.id}` },
        ]
      );
    }
  }

  // -- T7. KONSEKVENT LÅG BELASTNING (energi låg 3+ pass) ------------- låg
  if (recentLogs.length >= 3 && !recentInbox('low_energy', 5)) {
    const lowEnergy = recentLogs.slice(0,3).every(l => l.energy === '1');
    if (lowEnergy) {
      addInboxItem(p.id, p.name, 'info', 'low_energy',
        'Konsekvent låg energi rapporterad',
        '3 pass i rad med låg ork -- kan signalera rädsla, smärta eller missförstånd av planen.',
        [
          { label:'Öppna kundkort', style:'primary', fn:`openDetail:${p.id}` },
          { label:'Skicka meddelande', style:'secondary', fn:`openMsg:${p.id}` },
        ]
      );
    }
  }

  // -- T8. INTAKE-SVAR MED SIGNIFIKANT AVVIKELSE ----------------------- hög
  const latestIntake = (p.intakeForms||[]).slice().sort((a,b)=>new Date(b.ts)-new Date(a.ts))[0];
  if (latestIntake && !latestIntake._reviewedAt) {
    const noVisitsYet = !(p.visits||[]).length;
    if (noVisitsYet && !latestIntake._planGenerated && !latestIntake._planGenerating && !latestIntake._planError) {
      // First plan -- generate automatically from intake
      await generatePlanFromIntake(p.id, latestIntake.ts);
    } else if (!noVisitsYet) {
      // Returning patient -- generate suggestions for existing plan
      if (latestIntake.aiSuggestions === null || latestIntake.aiSuggestions === undefined) {
        await generateIntakeSuggestions(p.id, latestIntake.ts);
      }
      if (!recentInbox('intake_pending', 3)) {
        const sugCount = (latestIntake.aiSuggestions||[]).length;
        addInboxItem(p.id, p.name, 'urgent', 'intake_pending',
          'Intake-svar inväntar din granskning',
          `Patienten har fyllt i formuläret -- AI har ${sugCount > 0 ? sugCount + ' förslag på planändringar' : 'analyserat svaren'}.`,
          [{ label:'Granska förslag', style:'primary', fn:`openDetail:${p.id}` }]
        );
      }
    }
  }

  // -- T9. PATIENTMEDDELANDE UTAN SVAR (48h) -------------------------- hög
  const unanswered = (p.messages||[]).find(m => {
    if (m.from !== 'patient' || m.read) return false;
    return now - new Date(m.ts).getTime() > 48*60*60*1000;
  });
  if (unanswered && !recentInbox('unanswered_message', 1)) {
    addInboxItem(p.id, p.name, 'urgent', 'unanswered_message',
      'Obesvarat meddelande (>48h)',
      `Patienten väntade på svar sedan ${new Date(unanswered.ts).toLocaleDateString('sv-SE')}.`,
      [{ label:'Svara nu', style:'primary', fn:`openMsg:${p.id}` }]
    );
  }

  // -- T10. NEGATIVT SVAR PÅ AUTOMATISK UPPFÖLJNING ------------------- medel
  if (!recentInbox('negative_response', 3)) {
    const negativeReply = (p.messages||[]).find(m =>
      m.from === 'patient' && !m.read &&
      /sämre|ont|svårt|kan inte|orkar inte|ger upp|hopplöst|funkar inte/i.test(m.text||'')
    );
    if (negativeReply) {
      addInboxItem(p.id, p.name, 'urgent', 'negative_response',
        'Patient uttrycker frustration eller svårighet',
        'Patientens senaste meddelande innehåller negativa signaler -- kan kräva din uppmärksamhet.',
        [{ label:'Läs & svara', style:'primary', fn:`openMsg:${p.id}` }]
      );
    }
  }

  // -- T11. TILLGÅNG LÖPER UT OM 7 DAGAR ------------------------------ låg
  if (!recentInbox('access_expiring', 6)) {
    const visit = (p.visits||[]).find(v => v.paidUntil);
    if (visit?.paidUntil) {
      const expiry = new Date(visit.paidUntil).getTime();
      const daysLeft = Math.round((expiry - now) / DAY);
      if (daysLeft >= 0 && daysLeft <= 7) {
        addInboxItem(p.id, p.name, 'info', 'access_expiring',
          `Tillgång löper ut om ${daysLeft} dag${daysLeft !== 1 ? 'ar' : ''}`,
          `${p.name}s Hael-plan tappar åtkomst ${new Date(visit.paidUntil).toLocaleDateString('sv-SE')} -- förläng eller avsluta.`,
          [{ label:'Hantera tillgång', style:'primary', fn:`extendAccess:${p.id}:${visit.id}` }]
        );
      }
    }
  }

  // -- T13. PATIENT SÅGS PÅ FÖRNYELSESIDAN MEN KÖPTE INTE ----------- hög
  if (!recentInbox('renewal_abandoned', 3)) {
    try {
      const abandonKey = 'zp-renewal-viewed:' + p.id;
      const viewedAt = localStorage.getItem(abandonKey);
      if (viewedAt) {
        const hoursAgo = (now - parseInt(viewedAt)) / (60*60*1000);
        const hasPaid = (p.visits||[]).some(v => v.paidUntil && new Date(v.paidUntil) > new Date());
        if (hoursAgo >= 2 && hoursAgo <= 72 && !hasPaid) {
          addInboxItem(p.id, p.name, 'urgent', 'renewal_abandoned',
            `${p.name.split(' ')[0]} tittade på förnyelsesidan men köpte inte`,
            `Besökte sidan för ${Math.round(hoursAgo)} timmar sedan -- ett personligt meddelande nu ökar chansen att de fortsätter.`,
            [
              { label: 'Skicka meddelande', style: 'primary', fn: `openDetail:${p.id}` },
            ]
          );
        }
      }
    } catch(e) {}
  }

  // -- T12. AUTO-PROGRESS (smärta låg + hög följsamhet) ---------------- autonom (nivå 1)
  if (recentLogs.length >= 4) {
    const last4 = recentLogs.slice(0, 4);
    const allLow  = last4.every(l => (l.pain||10) <= 3);
    const allDone = last4.filter(l => l.done === 'all').length >= 3;
    if (allLow && allDone && lastVisit?.plan) {
      const alreadyProgressed = lastVisit.plan._agentProgressed &&
        now - new Date(lastVisit.plan._agentProgressed).getTime() < 7*DAY;
      if (!alreadyProgressed) await _agentProgressPlan(p, lastVisit);
    }
  }

  // -- T3c. ÅTERBESÖKSPÅMINNELSE (3 dagar innan) ----------------------- autonom (nivå 1)
  if (lastVisit?.form?.followup && lastVisit.date) {
    const followupDate = new Date(lastVisit.date);
    followupDate.setDate(followupDate.getDate() + (lastVisit.form.followup * 7));

      await _agentSendFollowupReminder(p, daysUntil);
    }
  }

// -- SPÅR 2: KONTEXTUELLA MEDDELANDEN PÅ PATIENTSIDAN ------------------------
// Körs i patientens webbläsare -- ingen inloggning, ingen server.
// Läser zenya:exsession:* från localStorage och räknar ut passhistorik.

function zpGetExSessionHistory(patId, visitId) {
  const prefix = 'zenya:exsession:' + patId + ':' + visitId + ':';
  const sessions = [];
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(prefix)) {
        const date = k.slice(prefix.length);
        const state = JSON.parse(localStorage.getItem(k) || '{}');
        const done = Object.values(state).filter(Boolean).length;
        sessions.push({ date, done, state });
      }
    }
  } catch(e) {}
  // Sort newest first
  return sessions.sort((a,b) => b.date.localeCompare(a.date));
}

// -- NUDGE ENGINE -- max 2/vecka, datadrivet, aldrig irriterande ---------------
// Nudge throttle key per patient
function _nudgeKey(patId) { return 'hael:nudges:' + patId; }
function _getNudgeLog(patId) {
  try { return JSON.parse(localStorage.getItem(_nudgeKey(patId)) || '[]'); } catch(e) { return []; }
}
function _logNudge(patId, type) {
  const log = _getNudgeLog(patId);
  log.push({ type, ts: Date.now() });
  // Keep last 20
  try { localStorage.setItem(_nudgeKey(patId), JSON.stringify(log.slice(-20))); } catch(e) {}
}
function _nudgesThisWeek(patId) {
  const monday = new Date(); monday.setDate(monday.getDate() - monday.getDay() + 1); monday.setHours(0,0,0,0);
  return _getNudgeLog(patId).filter(n => n.ts >= monday.getTime()).length;
}
function _shownThisWeek(patId, type) {
  const monday = new Date(); monday.setDate(monday.getDate() - monday.getDay() + 1); monday.setHours(0,0,0,0);
  return _getNudgeLog(patId).some(n => n.type === type && n.ts >= monday.getTime());
}

function zpContextualMsg(pat, visitId, plan) {
  return zpNudgeEngine(pat, visitId, plan);
}

function zpNudgeEngine(pat, visitId, plan) {
  const patId = pat?.id;
  if (!patId || !visitId) return '';

  // Collect data
  const sessions = zpGetExSessionHistory(patId, visitId);
  const logs = ((() => { try { return JSON.parse(localStorage.getItem('hael:symptoms:' + patId) || '[]'); } catch(e) { return []; } })());
  const total = (plan?.exercises||[]).length;
  const today = new Date().toISOString().slice(0,10);
  const dayOfWeek = new Date().getDay(); // 0=sun,1=mon...6=sat

  const todaySession = sessions.find(s => s.date === today);
  const todayDone = todaySession ? Object.values(todaySession.state||{}).filter(Boolean).length : 0;
  const lastSession = sessions[0];
  const daysSinceLast = lastSession ? Math.round((Date.now() - new Date(lastSession.date)) / 86400000) : null;
  const fullPasses = sessions.filter(s => total > 0 && s.done >= total).length;
  const totalPasses = sessions.filter(s => s.done > 0).length;

  // Streak
  let streak = 0;
  for (let i = 0; i < 30; i++) {
    const ds = new Date(Date.now() - i*86400000).toISOString().slice(0,10);
    const s = sessions.find(x => x.date === ds);
    if (s && s.done > 0) streak++;
    else if (i > 0) break;
  }

  // Visit age in days
  const visit = (pat.visits||[]).find(v => v.id === visitId);
  const visitAge = visit?.date ? Math.round((Date.now() - new Date(visit.date)) / 86400000) : 0;

  // NRS trend from symptom logs
  const nrsLogs = logs.filter(l => l.nrs != null).slice(-7);
  const firstNRS = visit?.form?.pain ?? null;
  const latestNRS = nrsLogs.length ? nrsLogs[nrsLogs.length-1].nrs : null;
  const nrsDrop = (firstNRS != null && latestNRS != null) ? Math.round((firstNRS - latestNRS) * 10) / 10 : null;

  // Throttle -- max 2 per week, skip if already shown today
  const canShow = _nudgesThisWeek(patId) < 2;
  const shownToday = _getNudgeLog(patId).some(n => {
    const d = new Date(n.ts).toISOString().slice(0,10); return d === today;
  });
  if (!canShow || shownToday) {
    // Still show immediate feedback (today done) -- not counted as nudge
    if (total > 0 && todayDone >= total) return _zpFeedback('done', fullPasses, total);
    return '';
  }

  // -- PRIORITY ORDER -- pick the single most relevant nudge ------------------

  // P1: Just finished all exercises today -- immediate positive feedback (not throttled)
  if (total > 0 && todayDone >= total) {
    return _zpFeedback('done', fullPasses, total);
  }

  // P2: Significant pain improvement -- most motivating possible moment
  if (nrsDrop !== null && nrsDrop >= 1.5 && !_shownThisWeek(patId, 'pain_drop')) {
    _logNudge(patId, 'pain_drop');
    return _zpNudge({
      type: 'insight',
      title: 'Din smärta har minskat',
      body: `Sedan du började har smärtan gått från ${firstNRS} till ${latestNRS} -- en minskning på ${nrsDrop} enheter. Det är ett tydligt tecken på att kroppen svarar på träningen.`,
      locked: true,
      lockedLabel: 'Se din smärtkurva',
      lockedSub: 'Full smärtgraf med veckotrend ingår i Standard.',
      patId, visitId,
      color: 'teal',
    });
  }

  // P3: Milestone -- 10 passes
  if (totalPasses >= 10 && totalPasses < 12 && !_shownThisWeek(patId, 'milestone_10')) {
    _logNudge(patId, 'milestone_10');
    return _zpNudge({
      type: 'milestone',
      title: '10 pass avklarade',
      body: 'Du har lagt ner ett seriöst arbete. De flesta slutar innan de når hit -- du har inte gjort det.',
      locked: false,
      patId, visitId,
      color: 'gold',
    });
  }

  // P4: Streak 5+ days -- momentum moment
  if (streak >= 5 && !_shownThisWeek(patId, 'streak')) {
    _logNudge(patId, 'streak');
    return _zpNudge({
      type: 'streak',
      title: `${streak} dagar i rad`,
      body: 'Du håller ett starkt momentum. Forskning visar att rörelsevanor befästs efter 3 veckor -- du är på väg.',
      locked: false,
      patId, visitId,
      color: 'gold',
    });
  }

  // P5: Pattern detected (mid-week, enough data) -- teaser for analysis
  if (visitAge >= 14 && totalPasses >= 5 && (dayOfWeek === 3 || dayOfWeek === 4) && !_shownThisWeek(patId, 'pattern_teaser')) {
    _logNudge(patId, 'pattern_teaser');
    return _zpNudge({
      type: 'insight',
      title: 'Vi ser ett mönster i dina data',
      body: `Du har tränat ${totalPasses} gånger på ${visitAge} dagar. AI har identifierat när din återhämtning är som bäst och hur planen kan anpassas.`,
      locked: true,
      lockedLabel: 'Se din veckoanalys',
      lockedSub: 'AI-analys av ditt tränings- och återhämtningsmönster ingår i Standard.',
      patId, visitId,
      color: 'teal',
    });
  }

  // P6: Week summary (fri/lör)
  if ((dayOfWeek === 5 || dayOfWeek === 6) && totalPasses > 0 && !_shownThisWeek(patId, 'week_summary')) {
    const weekSessions = sessions.filter(s => {
      const monday = new Date(); monday.setDate(monday.getDate() - monday.getDay() + 1); monday.setHours(0,0,0,0);
      return new Date(s.date) >= monday && s.done > 0;
    }).length;
    if (weekSessions > 0) {
      _logNudge(patId, 'week_summary');
      return _zpNudge({
        type: 'summary',
        title: `${weekSessions} pass den här veckan`,
        body: weekSessions >= 3
          ? 'Stark vecka. Din kropp har fått regelbunden stimulans -- det är precis vad som behövs.'
          : weekSessions === 2
          ? 'Två pass är bättre än inget. Nästa vecka -- sikta på ett till.'
          : 'Varje pass räknas. Kom igång igen nästa vecka -- kroppen glömmer inte.',
        locked: weekSessions >= 3,
        lockedLabel: 'Se veckans framstegsrapport',
        lockedSub: 'Detaljerad veckosammanfattning med jämförelse mot förra veckan ingår i Standard.',
        patId, visitId,
        color: weekSessions >= 3 ? 'teal' : 'neutral',
      });
    }
  }

  // P7: Returned after break
  if (daysSinceLast !== null && daysSinceLast >= 5 && daysSinceLast < 14 && !_shownThisWeek(patId, 'return')) {
    _logNudge(patId, 'return');
    return _zpNudge({
      type: 'return',
      title: 'Välkommen tillbaka',
      body: 'Det är okej att ha tagit en paus. Börja mjukt idag -- lite rörelse är alltid bättre än ingen alls.',
      locked: false,
      patId, visitId,
      color: 'neutral',
    });
  }

  return '';
}

function getBriefingCache(patId) {
  try {
    const raw = sessionStorage.getItem(BRIEFING_CACHE_KEY + patId);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (Date.now() - obj.ts > BRIEFING_TTL_MS) return null;
    return obj;
  } catch(e) { return null; }
}
function setBriefingCache(patId, data) {
  try { sessionStorage.setItem(BRIEFING_CACHE_KEY + patId, JSON.stringify({ ts: Date.now(), data })); } catch(e) {}

async function generateBriefing(pat) {
  const key = getKey();
  if (!key || !pat) return;
  if ((pat.visits || []).length === 0) {
    const wrap = document.getElementById('briefing-' + pat.id);
    if (wrap) wrap.style.display = 'none';
    return;
  }

  // Check cache
  const cached = getBriefingCache(pat.id);
  if (cached) {
    const wrap = document.getElementById('briefing-' + pat.id);
    if (wrap) wrap.outerHTML = renderBriefingContent(pat.id, cached.data);
    return;
  }

  // Build context
  const visits = (pat.visits || []);
  const lastVisit = visits[0];
  const passLogs = getPassLogs(pat.id);
  const recentLogs = passLogs.slice(0, 6);
  const avgPain = recentLogs.length
    ? (recentLogs.reduce((s,l) => s + (l.pain||0), 0) / recentLogs.length).toFixed(1)
    : null;
  const completionRate = recentLogs.length
    ? Math.round(recentLogs.filter(l => l.done === 'all' || l.done === 'most').length / recentLogs.length * 100)
    : null;

  const visitSummaries = visits.slice(0, 3).map((v, i) => {
    const soap = v.soap ? Object.entries(v.soap).filter(([,val])=>val).map(([k,val])=>`${k}: ${val}`).join(' | ') : '';
    const pain = v.form?.pain ?? v.soapMeta?.pain ?? '--';
    return `Besök ${i+1} (${v.date||'okänt'}): NRS ${pain}/10${soap ? ' | '+soap : ''}`;
  }).join('\n');

  const passContext = recentLogs.length
    ? `Senaste ${recentLogs.length} pass: snittsmärta ${avgPain}/10, genomförandegrad ${completionRate}%`
    : 'Inga loggade hempass ännu.';

  const diagList = pat.diagnoses?.length ? pat.diagnoses.join(', ') : (pat.diagnosis || '--');
  const daysSinceLast = lastVisit?.date
    ? Math.round((Date.now() - new Date(lastVisit.date)) / (1000*60*60*24))
    : null;

  const prompt = `Du är en erfaren klinisk kollega som briefar en naprapatt/fysioterapeut inför ett patientbesök. Ge en KORTFATTAD, KLINISKT RELEVANT briefing. Svara ENBART med JSON utan backticks.

Patient: ${pat.name||'Okänd'}, ${pat.birthdate||'ålder okänd'}
Diagnoser: ${diagList}
Antal besök totalt: ${visits.length}
${daysSinceLast !== null ? `Dagar sedan senaste besök: ${daysSinceLast}` : ''}

Besökshistorik (senaste 3):
${visitSummaries}

Hemträning:
${passContext}

JSON-format:
{
  "points": [
    {"text": "kort klinisk observation (max 25 ord)", "color": "green|amber|red|teal|blue"},
    ...max 5 punkter
  ],
  "questions": ["Fråga att ställa idag (konkret, max 15 ord)", ...max 3 frågor]
}

Regler:
- Varje punkt ska vara KONKRET och HANDLINGSBAR -- inte generell
- Använd red för varningssignaler, amber för saker att bevaka, green för positiv trend, teal för neutral info, blue för frågor/osäkerhet
- Om smärtan ökat: red. Om genomförandegrad under 50%: amber. Om god progress: green.
- Frågorna ska vara specifika och kliniskt relevanta för just den här patienten
- Max 5 punkter, max 3 frågor`;

  try {
    const result = await callAPI(prompt, MODEL_HAIKU, false);
    const clean = result.replace(/```json|```/g, '').trim();
    const briefing = JSON.parse(clean);
    setBriefingCache(pat.id, briefing);
    const wrap = document.getElementById('briefing-' + pat.id);
    if (wrap) wrap.outerHTML = renderBriefingContent(pat.id, briefing);
  } catch (err) {
    const wrap = document.getElementById('briefing-' + pat.id);
    if (wrap) wrap.innerHTML = `<div class="briefing-error">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Kunde inte generera briefing. <button class="briefing-regen" style="margin-left:6px" onclick="regenBriefing('${e(pat.id)}')">Försök igen</button>
    </div>`;
  }
}

function sendQuickMsg(patId, idx) {
  const q = MSG_QUICK[idx];
  if (!q) return;

function sendCustomMsg(patId) {
  const inp = document.getElementById('msg-input-' + patId);
  const text = inp ? inp.value.trim() : '';
  if (!text) return;
  _dispatchMsg(patId, text, 'custom');
  if (inp) inp.value = '';
}

function _dispatchMsg(patId, text, type) {
  const p = S.patients.find(x => x.id === patId) || S.pat;
  if (!p) return;
  if (!p.messages) p.messages = [];
  const msg = {
    id: 'msg_' + Date.now(),
    from: 'therapist',
    type,
    text,
    ts: new Date().toISOString(),
    read: true,
    reply: null,
    replyTs: null,
  };
  p.messages.unshift(msg); // newest first in storage
  savePat(p);
  // Re-render panel
  const panel = document.getElementById('msg-panel-' + patId);
  if (panel) {
    panel.outerHTML = renderMsgPanel(patId);
    // Re-open
    const newBody = document.getElementById('msg-panel-body-' + patId);
    const newChev = document.getElementById('msg-panel-chev-' + patId);
    if (newBody) newBody.style.display = 'block';
    if (newChev) newChev.style.transform = 'rotate(90deg)';
    setTimeout(() => {
      const list = document.getElementById('msg-list-' + patId);
      if (list) list.scrollTop = list.scrollHeight;
    }, 50);
  }
}

// Called from public plan -- patient taps a reply button
async function submitPatientReply(patId, msgId, replyText) {
  // We need to load fresh from Supabase, update, and push back
  const btn = document.getElementById('zp-reply-btn-' + replyText.replace(/\s/g,''));
  document.querySelectorAll('.zp-reply-btn').forEach(b => b.disabled = true);
  const statusEl = document.getElementById('zp-reply-status');
  if (statusEl) statusEl.textContent = 'Skickar...';

  try {
    // Fetch latest patient data from Supabase
    const res = await fetch(`${SB_URL}/rest/v1/patients?id=eq.${encodeURIComponent(patId)}&select=data`, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    if (!res.ok) throw new Error('fetch failed');
    const rows = await res.json();
    if (!rows.length) throw new Error('patient not found');
    const pat = typeof rows[0].data === 'string' ? JSON.parse(rows[0].data) : rows[0].data;

    // Find message and attach reply
    const msg = (pat.messages || []).find(m => m.id === msgId);
    if (msg && !msg.reply) {
      msg.reply = replyText;
      msg.replyTs = new Date().toISOString();
      // Add a patient-from message too for thread view
      if (!pat.messages) pat.messages = [];
      pat.messages.unshift({
        id: 'msg_' + Date.now(),
        from: 'patient',
        type: 'reply',
        text: replyText,
        ts: new Date().toISOString(),
        read: false,
        replyToId: msgId,
      });
    }

    // Push back to Supabase
    const upsertRes = await fetch(`${SB_URL}/rest/v1/patients?id=eq.${encodeURIComponent(patId)}`, {
      method: 'PATCH',
      headers: {
        'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json', 'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ data: pat, updated_at: new Date().toISOString() })
    });

    if (upsertRes.ok) {
      if (statusEl) {
        statusEl.innerHTML = '<span style="color:#3dcfbd;font-weight:600">OK Svar skickat!</span>';
      }
      document.querySelectorAll('.zp-reply-btn').forEach(b => {
        if (b.textContent.trim() === replyText) b.classList.add('selected');
      });
    } else {
      throw new Error('upsert failed');
    }
  } catch(err) {
    if (statusEl) statusEl.textContent = 'Kunde inte skicka -- försök igen.';
    document.querySelectorAll('.zp-reply-btn').forEach(b => b.disabled = false);
  }
}

async function pubSendBookingRequest(patId, visitId) {
  const noteEl = document.getElementById('booking-note-' + patId);
  const statusEl = document.getElementById('booking-status-' + patId);
  const note = noteEl ? noteEl.value.trim() : '';
  const btn = document.querySelector(`#booking-section-${patId} button`);
  if (btn) { btn.disabled = true; btn.textContent = 'Skickar...'; }

  try {
    // Load fresh patient from Supabase and add booking request message
    const res = await fetch(`${SB_URL}/rest/v1/patients?id=eq.${encodeURIComponent(patId)}&select=data`, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    if (!res.ok) throw new Error('fetch failed');
    const rows = await res.json();
    if (!rows.length) throw new Error('not found');
    const pat = typeof rows[0].data === 'string' ? JSON.parse(rows[0].data) : rows[0].data;
    if (!pat.messages) pat.messages = [];

    const msg = {
      id: 'msg_' + Date.now(),
      from: 'patient',
      type: 'booking_request',
      text: 'Bokningsförfrågan' + (note ? ': ' + note : ' — vill boka återbesök.'),
      ts: new Date().toISOString(),
      read: false,
      reply: null,
    };
    pat.messages.unshift(msg);

    const patchRes = await fetch(`${SB_URL}/rest/v1/patients?id=eq.${encodeURIComponent(patId)}`, {
      method: 'PATCH',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify({ data: pat, updated_at: new Date().toISOString() })
    });
    if (!patchRes.ok) throw new Error('patch failed');

    // Mark as sent locally
    try { localStorage.setItem('hael:booking-sent:' + patId, '1'); } catch(e) {}

    // Replace section with confirmation
    const section = document.getElementById('booking-section-' + patId);
    if (section) {
      section.innerHTML = `<div style="display:flex;align-items:center;gap:8px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0d9b8a" stroke-width="2.5" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        <div style="font-size:13px;font-weight:600;color:rgba(255,255,255,.8)">Bokningsförfrågan skickad</div>
      </div>
      <div style="font-size:12px;color:rgba(255,255,255,.4);margin-top:4px;margin-left:24px">${e(CLINIC.name||'Kliniken')} hör av sig snart.</div>`;
    }
  } catch(err) {
    if (btn) { btn.disabled = false; btn.textContent = 'Skicka bokningsförfrågan'; }
    if (statusEl) { statusEl.textContent = 'Kunde inte skicka — försök igen.'; statusEl.style.display = 'block'; }
  }
}

function pubShareSectionHTML(pat, plan) {
  const logs = getPassLogs(pat?.id || '');
  const symptomLogs = (pat?.symptomLogs || []).filter(l => l.nrs != null)
    .sort((a,b) => (a.date||'') < (b.date||'') ? -1 : 1);

  const totalSessions = logs.length;
  if (totalSessions < 3 && !symptomLogs.length) return ''; // Not enough to share

  const firstNRS = symptomLogs[0]?.nrs ?? plan?.form?.pain ?? logs[logs.length-1]?.pain ?? null;
  const lastNRS  = symptomLogs[symptomLogs.length-1]?.nrs ?? logs[0]?.pain ?? firstNRS;
  const nrsDelta = (firstNRS != null && lastNRS != null && firstNRS !== lastNRS)
    ? Math.round((lastNRS - firstNRS) * 10) / 10 : null;
  const streak = calcStreak(logs);
  const diagShort = (plan?.diagnosis || '').split('(')[0].trim().slice(0, 40);
  const weeksSince = plan?.form?.visitDate || pat?.visits?.[0]?.date
    ? Math.max(1, Math.floor((Date.now() - new Date(pat?.visits?.[0]?.date || Date.now())) / (7 * 86400000)))
    : null;

  // Build share text
  function buildShareText() {
    const parts = [];
    if (weeksSince) parts.push(`${weeksSince} veckor aktiv rehab`);
    if (totalSessions) parts.push(`${totalSessions} träningspass`);
    if (nrsDelta !== null && nrsDelta < -1) parts.push(`smärtan minskade ${Math.abs(nrsDelta)} enheter`);
    if (streak >= 5) parts.push(`${streak} pass i rad`);

    const summary = parts.length >= 2
      ? parts.slice(0, 2).join(' · ')
      : parts[0] || `${totalSessions} pass genomförda`;

    return `Jag rehabiliterar${diagShort ? ' ' + diagShort.toLowerCase() : ''} med Hael — ${summary}. ${window.location.href.split('?')[0]}`;
  }

  async function handleShare() {
    const text = buildShareText();
    if (navigator.share) {
      try {
        await navigator.share({ title: 'Min rehabresa med Hael', text, url: window.location.href });
        return;
      } catch(e) { if (e.name === 'AbortError') return; }
    }
    // Fallback: copy to clipboard
    try {
      await navigator.clipboard.writeText(text);
      const btn = document.getElementById('hael-share-btn');
      if (btn) { btn.textContent = '✓ Kopierat!'; setTimeout(() => btn.textContent = 'Dela min resa', 2500); }
    } catch(e) {}
  }

  // Store share handler on window for onclick
  window._haelShareHandler = handleShare;

  const statChips = [
    totalSessions >= 1 && `<span style="background:rgba(13,155,138,.15);border:1px solid rgba(13,155,138,.25);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:rgba(255,255,255,.8)">${totalSessions} pass</span>`,
    weeksSince && `<span style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:5px 12px;font-size:12px;color:rgba(255,255,255,.6)">${weeksSince} veckor</span>`,
    nrsDelta !== null && nrsDelta < -1 && `<span style="background:rgba(10,171,124,.15);border:1px solid rgba(10,171,124,.25);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:#0aab7c">NRS ${nrsDelta}</span>`,
    streak >= 5 && `<span style="background:rgba(240,192,64,.12);border:1px solid rgba(240,192,64,.2);border-radius:20px;padding:5px 12px;font-size:12px;color:rgba(240,192,64,.9)">${streak}-i-rad 🔥</span>`,
  ].filter(Boolean);

  return `<div style="margin:0 14px 20px;padding:20px 18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;text-align:center">
    <div style="font-family:'Fraunces',Georgia,serif;font-size:16px;font-weight:300;color:rgba(255,255,255,.85);margin-bottom:6px">Din rehabiliteringsresa</div>
    <div style="font-size:12px;color:rgba(255,255,255,.35);line-height:1.6;margin-bottom:16px">${diagShort ? e(diagShort) + ' · ' : ''}${totalSessions} pass genomförda</div>

    ${statChips.length ? `<div style="display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:18px">${statChips.join('')}</div>` : ''}

    <button id="hael-share-btn" onclick="window._haelShareHandler()"
      style="width:100%;padding:13px;background:rgba(255,255,255,.1);color:white;border:1px solid rgba(255,255,255,.15);border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:background .2s"
      onmouseover="this.style.background='rgba(255,255,255,.15)'"
      onmouseout="this.style.background='rgba(255,255,255,.1)'">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="margin-right:6px;vertical-align:-2px"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
      Dela min resa
    </button>
    <div style="font-size:10px;color:rgba(255,255,255,.2);margin-top:10px">Delar länk till din plan — inga personuppgifter</div>
  </div>`;
}

function goBack(){
  const s = S.screen;
  const hasPat = !!S.pat;
  if (s === 'meeting') {
    stopListening(); go(hasPat ? 'detail' : 'list');
  } else if (s === 'soap') {
    // SOAP review -- came from meeting, go back to detail to not lose data
    go(hasPat ? 'detail' : 'list');
  } else if (s === 'manualsoap' || s === 'sbs-soap') {
    autoSaveJournalDraft();
    go(hasPat ? 'detail' : 'list');
  } else if (s === 'form' || s === 'editex') {
    go(hasPat ? 'detail' : 'list');
  } else if (s === 'doc') {
    go(hasPat ? 'detail' : 'list');
  } else if (s === 'editpat') {
    go(hasPat ? 'detail' : 'list');
  } else if (s === 'journaldoc' || s === 'patjournal') {
    go(hasPat ? 'detail' : 'list');
  } else if (s === 'detail') {
    go('list');
  } else if (s === 'list') {
    go('dashboard');
  } else {
    go('dashboard');
  }
}

// rDashboard v1 removed
function rDashboard() {
  const now = new Date();
  const hour = now.getHours();
  const dayName = now.toLocaleDateString('sv-SE',{weekday:'long'});
  const dateStr = now.toLocaleDateString('sv-SE',{day:'numeric',month:'long',year:'numeric'});
  const greeting = hour < 5 ? 'God natt' : hour < 12 ? 'God morgon' : hour < 17 ? 'God eftermiddag' : 'God kväll';
  const clinicName = CLINIC.name || (_authUser?.email?.split('@')[0]) || 'Doktorn';

  // ── DATA ──────────────────────────────────────────────────
  const total  = S.patients.length;
  const active = S.patients.filter(p => (p.visits||[])[0]?.status === 'Aktiv').length;
  const urgent = S.patients.map(p => ({ p, pr: _clinPriority(p) })).filter(x => x.pr.level >= 3);
  const needsFollowup = S.patients.map(p => ({ p, pr: _clinPriority(p) })).filter(x => x.pr.level >= 2);

  // Revenue
  const thisMonth = now.getMonth(); const thisYear = now.getFullYear();
  let monthRevenue = 0, lastMonthRevenue = 0;
  const last8weeks = Array(8).fill(0);
  S.patients.forEach(p => (p.visits||[]).forEach(v => {
    const d = new Date(v.date||''); if (isNaN(d)) return;
    const amt = v.servicePrice || 0;
    if (d.getMonth() === thisMonth && d.getFullYear() === thisYear) monthRevenue += amt;
    if (d.getMonth() === (thisMonth-1+12)%12 && d.getFullYear() === (thisMonth===0?thisYear-1:thisYear)) lastMonthRevenue += amt;
    const weeksAgo = Math.floor((now - d) / (7*86400000));
    if (weeksAgo >= 0 && weeksAgo < 8) last8weeks[7-weeksAgo] += amt;
  }));
  const revDelta = lastMonthRevenue > 0 ? Math.round(((monthRevenue-lastMonthRevenue)/lastMonthRevenue)*100) : null;

  // Overdue
  const overdue = S.patients.filter(p => {
    const v = (p.visits||[])[0]; if (!v?.date) return false;
    const due = new Date(v.date); due.setDate(due.getDate() + (v.form?.followup||4)*7);
    return due <= now;
  });

  // Dropout risk — active patients with no session log in 10+ days
  const dropoutRisk = S.patients.filter(p => {
    const v = (p.visits||[])[0]; if (!v?.plan) return false;
    const logs = getPassLogs(p.id);
    if (!logs.length) {
      const daysSinceVisit = Math.floor((now - new Date(v.date||0)) / 86400000);
      return daysSinceVisit >= 10;
    }
    const daysSinceLast = Math.floor((now - new Date(logs[0].ts||0)) / 86400000);
    return daysSinceLast >= 10;
  });
  const dropoutRevRisk = dropoutRisk.length * 1800; // avg 1800 kr per patient

  // Adherence
  const withPlan = S.patients.filter(p => (p.visits||[]).some(v => v.plan)).length;
  const activeLogs = S.patients.filter(p => {
    const logs = getPassLogs(p.id);
    return logs.length > 0 && Math.floor((now - new Date(logs[0].ts||0))/86400000) <= 7;
  }).length;
  const adherence = withPlan > 0 ? Math.round(activeLogs/withPlan*100) : 0;

  // Conversion: patients with intake → patients with plan
  const withIntake = S.patients.filter(p => (p.intakeForms||[]).length > 0 || (p.visits||[]).length > 0).length;
  const conversion = withIntake > 0 ? Math.round(withPlan/withIntake*100) : 0;

  // Recent activity
  const recent = [...S.patients].sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0)).slice(0,5);

  function spark(data, color, filled) {
    const max = Math.max(...data, 1);

      const x = pad + (i/(data.length-1||1))*(W-pad*2);

let _listSort   = 'priority';
let _listFilter = '';

function _clinPriority(p) {
  // Returns { level: 0-3, signals: [], primary: string }
  // 0=stable, 1=monitor, 2=attention, 3=urgent
  const now = Date.now();
  const DAY  = 86400000;
  const visit = (p.visits||[])[0];
  if (!visit) return { level: 0, signals: [], primary: 'Ny patient' };

  const signals = [];
  let level = 0;

  // Unanswered patient message
  const unread = (p.messages||[]).find(m => m.from === 'patient' && !m.read);
  if (unread) {
    const h = Math.round((now - new Date(unread.ts)) / 3600000);
    if (h >= 48) { level = Math.max(level, 3); signals.push({ w: 3, text: `Obesvarat meddelande ${h}h` }); }
    else { level = Math.max(level, 2); signals.push({ w: 2, text: `Nytt meddelande (${h}h sedan)` }); }
  }

  // NRS trend from symptomLogs
  const nrs = (p.symptomLogs||[]).filter(l => l.nrs != null).sort((a,b) => (a.date||'') < (b.date||'') ? -1 : 1);
  if (nrs.length >= 3) {
    const trend = nrs[nrs.length-1].nrs - nrs[0].nrs;
    if (trend >= 2) { level = Math.max(level, 3); signals.push({ w: 3, text: `Smärta ökar +${trend.toFixed(1)} NRS` }); }
    else if (trend >= 1) { level = Math.max(level, 2); signals.push({ w: 2, text: `Smärtökning observerad` }); }
    else if (trend <= -1.5) { signals.push({ w: 0, text: `Smärta minskar (${Math.abs(trend).toFixed(1)} NRS)` }); }
  }
  if (nrs.length > 0 && nrs[nrs.length-1].nrs >= 8) {
    level = Math.max(level, 3);
    signals.push({ w: 3, text: `Hög smärta NRS ${nrs[nrs.length-1].nrs}/10` });
  }

  // Inactivity via sessionLogs or symptomLogs
  const lastActive = (() => {
    const sl = (p.sessionLogs||[]).map(l => new Date(l.date||l.updatedAt||0)).sort((a,b) => b-a)[0];
    const sy = (p.symptomLogs||[]).map(l => new Date(l.date||0)).sort((a,b) => b-a)[0];
    if (sl && sy) return sl > sy ? sl : sy;
    return sl || sy || null;
  })();
  if (lastActive) {
    const days = Math.round((now - lastActive) / DAY);
    if (days >= 10) { level = Math.max(level, 3); signals.push({ w: 3, text: `Inaktiv ${days} dagar` }); }
    else if (days >= 5) { level = Math.max(level, 2); signals.push({ w: 2, text: `${days} dagar sedan aktivitet` }); }
  }

  // Overdue follow-up
  if (visit.date) {
    const fw = visit.form?.followup || 4;
    const due = new Date(visit.date); due.setDate(due.getDate() + fw * 7);
    const over = Math.round((now - due) / DAY);
    if (over > 14) { level = Math.max(level, 2); signals.push({ w: 2, text: `Återbesök ${over}d försenat` }); }
  }

  // No Hael plan
  if (!(p.visits||[]).some(v => v.plan)) {
    level = Math.max(level, 1);
    signals.push({ w: 1, text: 'Ingen Hael-plan skapad' });
  }

  // Prereq update pending
  if (visit.prereqUpdatePending) {
    level = Math.max(level, 2);
    signals.push({ w: 2, text: 'Uppdaterade förutsättningar väntar' });
  }

  // Sort signals by weight descending
  signals.sort((a,b) => b.w - a.w);
  const primary = signals[0]?.text || _lastActiveLabel(lastActive, now, DAY) || 'Stabil';

  return { level, signals: signals.slice(0,3), primary };
}

function _lastActiveLabel(lastActive, now, DAY) {
  if (!lastActive) return null;
  const days = Math.round((now - lastActive) / DAY);
  if (days === 0) return 'Aktiv idag';
  if (days === 1) return 'Aktiv igår';
  if (days < 7)  return `Aktiv för ${days} dagar sedan`;
  return `Senast aktiv ${lastActive.toLocaleDateString('sv-SE', { day:'numeric', month:'short' })}`;
}

function _clinPriorityLabel(level) {
  return ['Stabil', 'Observera', 'Uppföljning krävs', 'Åtgärd omgående'][level];
}

function _clinNextAction(p, priority) {
  const visit = (p.visits||[])[0];
  const unread = (p.messages||[]).find(m => m.from === 'patient' && !m.read);
  const pid = p.id.replace(/'/g, "\\'");

  // All actions navigate to detail first, then trigger the action
  if (unread) return {
    label: 'Svara',
    fn: `openPat('${pid}');setTimeout(()=>togMsgPanel('${pid}'),400)`
  };
  if (priority.level >= 2) return {
    label: 'Kontakta',
    fn: `openPat('${pid}');setTimeout(()=>togMsgPanel('${pid}'),400)`
  };
  if (!(visit?.plan)) return {
    label: 'Skapa plan',
    fn: `openPat('${pid}');setTimeout(()=>newVisit(),500)`
  };
  if (!visit?.soap?.S) return {
    label: 'Ny journal',
    fn: `openPat('${pid}');setTimeout(()=>startManualSOAP(),500)`
  };
  return {
    label: 'Öppna',
    fn: `openPat('${pid}')`
  };
}


function rList(){
  const now = Date.now();
  const q = S.search.toLowerCase();

  // Score all patients
  const scored = S.patients.map(p => ({ p, pr: _clinPriority(p) }));

  // Filter by search
  let list = scored.filter(({p}) =>
    !q ||
    (p.name||'').toLowerCase().includes(q) ||
    (p.diagnosis||'').toLowerCase().includes(q) ||
    (p.birthdate||'').includes(q)
  );

  // Apply smart filters
  if (_listFilter === 'needs_attention') {
    list = list.filter(({pr}) => pr.level >= 2);
  } else if (_listFilter === 'inactive') {
    list = list.filter(({p}) => {
      const last = (p.sessionLogs||[]).sort((a,b) => (b.date||'') > (a.date||'') ? 1 : -1)[0];
      if (!last) return true;
      return (now - new Date(last.date||0)) > 7 * 86400000;
    });
  } else if (_listFilter === 'no_plan') {
    list = list.filter(({p}) => !(p.visits||[]).some(v => v.plan));
  } else if (_listFilter === 'overdue') {
    list = list.filter(({p}) => {
      const v = (p.visits||[])[0];
      if (!v?.date) return false;
      const fw = v.form?.followup || 4;
      const due = new Date(v.date); due.setDate(due.getDate() + fw * 7);
      return due < new Date();
    });
  } else if (_listFilter === 'pain_up') {
    list = list.filter(({pr}) => pr.signals.some(s => s.text.includes('Smärta ökar')));
  }

  // Sort
  if (_listSort === 'priority') {
    list.sort((a,b) => b.pr.level - a.pr.level || (b.p.updatedAt||0) - (a.p.updatedAt||0));
  } else if (_listSort === 'name') {
    list.sort((a,b) => (a.p.name||'').localeCompare(b.p.name||'','sv'));
  } else if (_listSort === 'phase') {
    list.sort((a,b) => (a.p.phase||1) - (b.p.phase||1));
  } else {
    list.sort((a,b) => (b.p.updatedAt||0) - (a.p.updatedAt||0));
  }

  // Filter counts for badges
  const counts = {
    needs_attention: scored.filter(({pr}) => pr.level >= 2).length,
    inactive: scored.filter(({p}) => {
      const last = (p.sessionLogs||[]).sort((a,b) => (b.date||'') > (a.date||'') ? 1 : -1)[0];
      return !last || (now - new Date(last.date||0)) > 7 * 86400000;
    }).length,
    no_plan: scored.filter(({p}) => !(p.visits||[]).some(v => v.plan)).length,
    overdue: scored.filter(({p}) => {
      const v = (p.visits||[])[0]; if (!v?.date) return false;
      const fw = v.form?.followup || 4;
      const due = new Date(v.date); due.setDate(due.getDate() + fw*7);
      return due < new Date();
    }).length,
  };

  // -- FILTER CHIPS --
  const filters = [
    { key: '',                label: 'Alla',            count: S.patients.length },
    { key: 'needs_attention', label: 'Kräver uppföljning', count: counts.needs_attention },
    { key: 'inactive',        label: 'Inaktiva >7d',    count: counts.inactive },
    { key: 'no_plan',         label: 'Utan Hael-plan',  count: counts.no_plan },
    { key: 'overdue',         label: 'Förfallet besök', count: counts.overdue },

  const filterHTML = filters.map(f => `
    <button onclick="_listFilter='${f.key}';rList()"
